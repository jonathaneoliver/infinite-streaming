name: Claude PR Review

# Opt-in PR review: fires when an authorised user posts the literal
# phrase `@claude review` as a comment on a PR. The previous
# auto-review-on-every-push behaviour was burning the Max-plan token
# budget on routine PRs (dep bumps, docs, small fixes) where the
# author didn't want a review pass anyway.
#
# To request a review: comment `@claude review` on the PR.
# `claude.yml` (the general @claude handler) explicitly excludes this
# exact phrase so the two workflows don't double-fire.
#
# Auth: CLAUDE_CODE_OAUTH_TOKEN (Max plan) — same secret as claude.yml.

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '@claude review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/pull/${{ github.event.issue.number }}/head

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request for correctness, security, regressions,
            and adherence to project conventions (see CLAUDE.md and AGENTS.md
            in the repo root).

            Post specific findings as inline review comments on the changed
            lines. If you have no concerns, post a single approval comment
            summarizing what the PR does and why it looks good.

            Focus on: logic errors, race conditions, missing error handling at
            real boundaries, security issues (command injection, path traversal,
            etc.), and divergence from existing patterns. Do not flag stylistic
            nits unless they obscure intent.
          # Sonnet on a higher turn budget: routine PR review is the
          # canonical Sonnet workload (logic / security / pattern
          # checks), and Opus burns the Max-plan quota fast on big
          # multi-platform PRs while still hitting --max-turns. Bumped
          # from 40 → 80 after PRs touching iOS + tvOS + Android +
          # go-proxy + dashboard ran the tank dry.
          claude_args: "--max-turns 80 --model claude-sonnet-4-6"
