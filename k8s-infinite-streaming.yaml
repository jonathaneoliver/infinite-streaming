apiVersion: apps/v1
kind: Deployment
metadata:
  name: infinite-streaming
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: infinite-streaming
  template:
    metadata:
      labels:
        app: infinite-streaming
    spec:
      containers:
      - name: go-server
        image: ${K3S_REGISTRY}/infinite-streaming:latest
        imagePullPolicy: Always
        command: ["/sbin/launch.sh", "1"]
        ports:
        - containerPort: 30000
        - containerPort: 30081
        - containerPort: 30181
        - containerPort: 30281
        - containerPort: 30381
        - containerPort: 30481
        - containerPort: 30581
        - containerPort: 30681
        - containerPort: 30781
        - containerPort: 30881
        env:
        - name: INFINITE_STREAM_ROOT
          value: "/media"
        - name: INFINITE_STREAM_UPLOADS_DIR
          value: "/media/uploads"
        - name: INFINITE_STREAM_SOURCES_DIR
          value: "/media/originals"
        - name: INFINITE_STREAM_OUTPUT_DIR
          value: "/media/dynamic_content"
        - name: INFINITE_STREAM_DATABASE_DIR
          value: "/media/data"
        - name: INFINITE_STREAM_TEMP_DIR
          value: "/media/tmp"
        - name: INFINITE_STREAM_CONTENT_DIR
          value: "/content"
        - name: TMPDIR
          value: "/media/tmp"
        - name: GO_LIVE_OUTPUT_DIR
          value: "/go-live"
        - name: GO_UPLOAD_ADDR
          value: ":8003"
        - name: INFINITE_STREAM_LISTEN_PORT
          value: "30000"
        - name: INFINITE_STREAM_UPSTREAM_HOST
          value: "127.0.0.1"
        - name: INFINITE_STREAM_UPSTREAM_PORT
          value: "30000"
        - name: INFINITE_STREAM_MAX_SESSIONS
          value: "8"
        - name: INFINITE_STREAM_TC_INTERFACE
          value: "eth0"
        # Pairing rendezvous (substituted by envsubst at deploy time).
        - name: INFINITE_STREAM_RENDEZVOUS_URL
          value: "${INFINITE_STREAM_RENDEZVOUS_URL}"
        - name: INFINITE_STREAM_ANNOUNCE_URL
          value: "${INFINITE_STREAM_ANNOUNCE_URL_K3S_RELEASE}"
        - name: INFINITE_STREAM_ANNOUNCE_LABEL
          value: "${INFINITE_STREAM_ANNOUNCE_LABEL_K3S_RELEASE}"
        # Distinct from k8s-infinite-streaming-dev.yaml so dev + release
        # don't share the persisted /media/data/server_id and overwrite
        # each other's announces on the rendezvous.
        - name: INFINITE_STREAM_SERVER_ID
          value: "infinite-streaming-release"
        securityContext:
          privileged: true
          capabilities:
            add: ["NET_ADMIN"]
        volumeMounts:
        - name: media-vol
          mountPath: /media
        - name: certs-vol
          mountPath: /etc/nginx/certs
          readOnly: true
        - name: go-live-tmpfs
          mountPath: /go-live

      volumes:
      - name: media-vol
        hostPath:
          path: ${K3S_MEDIA_DIR}
          type: Directory
      - name: certs-vol
        hostPath:
          path: ${K3S_CERTS_DIR}
          type: Directory
      - name: go-live-tmpfs
        emptyDir:
          medium: Memory
          sizeLimit: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: infinite-streaming
spec:
  selector:
    app: infinite-streaming
  ports:
    - name: p30000
      port: 30000
      targetPort: 30000
      nodePort: 30000
    - name: p30081
      port: 30081
      targetPort: 30081
      nodePort: 30081
    - name: p30181
      port: 30181
      targetPort: 30181
      nodePort: 30181
    - name: p30281
      port: 30281
      targetPort: 30281
      nodePort: 30281
    - name: p30381
      port: 30381
      targetPort: 30381
      nodePort: 30381
    - name: p30481
      port: 30481
      targetPort: 30481
      nodePort: 30481
    - name: p30581
      port: 30581
      targetPort: 30581
      nodePort: 30581
    - name: p30681
      port: 30681
      targetPort: 30681
      nodePort: 30681
    - name: p30781
      port: 30781
      targetPort: 30781
      nodePort: 30781
    - name: p30881
      port: 30881
      targetPort: 30881
      nodePort: 30881
  type: NodePort
