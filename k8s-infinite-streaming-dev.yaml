apiVersion: apps/v1
kind: Deployment
metadata:
  name: infinite-streaming-dev
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: infinite-streaming-dev
  template:
    metadata:
      labels:
        app: infinite-streaming-dev
    spec:
      containers:
      - name: go-server
        image: ${K3S_REGISTRY}/infinite-streaming:dev
        imagePullPolicy: Always
        command: ["/sbin/launch.sh", "1"]
        ports:
        - containerPort: 30000
        - containerPort: 30081
        - containerPort: 30181
        - containerPort: 30281
        - containerPort: 30381
        - containerPort: 30481
        - containerPort: 30581
        - containerPort: 30681
        - containerPort: 30781
        - containerPort: 30881
        env:
        - name: INFINITE_STREAM_ROOT
          value: "/media"
        - name: INFINITE_STREAM_UPLOADS_DIR
          value: "/media/uploads"
        - name: INFINITE_STREAM_SOURCES_DIR
          value: "/media/originals"
        - name: INFINITE_STREAM_OUTPUT_DIR
          value: "/media/dynamic_content"
        - name: INFINITE_STREAM_DATABASE_DIR
          value: "/media/data"
        - name: INFINITE_STREAM_TEMP_DIR
          value: "/media/tmp"
        - name: INFINITE_STREAM_CONTENT_DIR
          value: "/content"
        - name: TMPDIR
          value: "/media/tmp"
        - name: GO_LIVE_OUTPUT_DIR
          value: "/go-live"
        - name: GO_UPLOAD_ADDR
          value: ":8003"
        - name: INFINITE_STREAM_LISTEN_PORT
          value: "30000"
        - name: INFINITE_STREAM_UPSTREAM_HOST
          value: "127.0.0.1"
        - name: INFINITE_STREAM_UPSTREAM_PORT
          value: "30000"
        - name: INFINITE_STREAM_MAX_SESSIONS
          value: "8"
        - name: INFINITE_STREAM_TC_INTERFACE
          value: "eth0"
        - name: EXTERNAL_PORT_BASE
          value: "40081"
        - name: INTERNAL_PORT_BASE
          value: "30081"
        - name: PORT_RANGE_COUNT
          value: "9"
        - name: INFINITE_STREAM_TC_DEBUG
          value: "1"
        # Pairing rendezvous (substituted by envsubst at deploy time).
        - name: INFINITE_STREAM_RENDEZVOUS_URL
          value: "${INFINITE_STREAM_RENDEZVOUS_URL}"
        - name: INFINITE_STREAM_ANNOUNCE_URL
          value: "${INFINITE_STREAM_ANNOUNCE_URL_K3S_DEV}"
        - name: INFINITE_STREAM_ANNOUNCE_LABEL
          value: "${INFINITE_STREAM_ANNOUNCE_LABEL_K3S_DEV}"
        securityContext:
          privileged: true
          capabilities:
            add: ["NET_ADMIN"]
        volumeMounts:
        - name: media-vol
          mountPath: /media
        - name: certs-vol
          mountPath: /etc/nginx/certs
          readOnly: true
        - name: go-live-tmpfs
          mountPath: /go-live

      volumes:
      - name: media-vol
        hostPath:
          path: ${K3S_MEDIA_DIR}
          type: Directory
      - name: certs-vol
        hostPath:
          path: ${K3S_CERTS_DIR}
          type: Directory
      - name: go-live-tmpfs
        emptyDir:
          medium: Memory
          sizeLimit: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: infinite-streaming-dev
spec:
  externalTrafficPolicy: Local
  selector:
    app: infinite-streaming-dev
  ports:
    - name: p40000
      port: 40000
      targetPort: 30000
      nodePort: 40000
    - name: p40081
      port: 40081
      targetPort: 30081
      nodePort: 40081
    - name: p40181
      port: 40181
      targetPort: 30181
      nodePort: 40181
    - name: p40281
      port: 40281
      targetPort: 30281
      nodePort: 40281
    - name: p40381
      port: 40381
      targetPort: 30381
      nodePort: 40381
    - name: p40481
      port: 40481
      targetPort: 30481
      nodePort: 40481
    - name: p40581
      port: 40581
      targetPort: 30581
      nodePort: 40581
    - name: p40681
      port: 40681
      targetPort: 30681
      nodePort: 40681
    - name: p40781
      port: 40781
      targetPort: 30781
      nodePort: 40781
    - name: p40881
      port: 40881
      targetPort: 30881
      nodePort: 40881
  type: NodePort
