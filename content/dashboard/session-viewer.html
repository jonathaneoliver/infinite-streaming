<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Viewer - InfiniteStream</title>
    <link rel="stylesheet" href="/shared-styles.css">
    <style>
        .page-header {
            margin-bottom: 20px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 400;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .panel {
            background: var(--bg-primary);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            padding: 16px;
            margin-bottom: 18px;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-message {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .session-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .session-tab {
            border: 1px solid #c7d2fe;
            background: #eef2ff;
            color: #1e1b4b;
            padding: 10px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .session-tab:hover {
            background: #e0e7ff;
            box-shadow: 0 6px 14px rgba(59, 130, 246, 0.2);
            transform: translateY(-1px);
        }

        .session-tab.active {
            background: #1e40af;
            color: #fff;
            border-color: #1e40af;
            box-shadow: 0 8px 18px rgba(30, 64, 175, 0.35);
        }

        .session-tab.grouped {
            border-left: 4px solid #10b981;
            padding-left: 10px;
        }

        .session-tab.grouped.active {
            border-left-color: #34d399;
        }

        .group-badge {
            display: inline-block;
            background: #10b981;
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .session-tab.active .group-badge {
            background: #34d399;
        }

        .group-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }

        .session-checkbox {
            margin-right: 8px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .group-info {
            font-size: 12px;
            color: #10b981;
            font-weight: 600;
            margin-top: 8px;
            padding: 6px 10px;
            background: #d1fae5;
            border-radius: 6px;
            display: inline-block;
        }

        .unlink-btn {
            font-size: 11px;
            padding: 4px 10px;
            margin-left: 8px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .unlink-btn:hover {
            background: #dc2626;
        }

        /* Network Log Styles */
        .network-log-section {
            padding: 12px 0;
        }

        .network-log-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .network-log-filter {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }

        .network-log-filter input[type="checkbox"] {
            cursor: pointer;
        }

        .network-log-table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border-color, #ddd);
            border-radius: 6px;
            background: var(--bg-primary, #fff);
        }

        .network-log-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .network-log-table th {
            background: var(--bg-secondary, #f5f5f5);
            padding: 8px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--border-color, #ddd);
            white-space: nowrap;
        }

        .network-log-table td {
            padding: 6px 8px;
            border-bottom: 1px solid var(--border-color, #eee);
            vertical-align: middle;
        }

        .network-log-table tbody tr:hover {
            background: var(--bg-hover, #f9f9f9);
        }

        .network-log-table tbody tr.faulted {
            background: #fef2f2;
        }

        .network-log-table tbody tr.faulted:hover {
            background: #fee2e2;
        }

        .network-log-empty td {
            text-align: center;
            color: var(--text-secondary, #666);
            padding: 20px;
            font-style: italic;
        }

        .net-col-method {
            width: 60px;
        }

        .net-col-path {
            min-width: 200px;
            max-width: 400px;
        }

        .net-col-type {
            width: 90px;
        }

        .net-col-status {
            width: 60px;
        }

        .net-col-size {
            width: 80px;
        }

        .net-col-timing {
            width: 200px;
        }

        .net-path {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: monospace;
            font-size: 11px;
        }

        .net-status {
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            text-align: center;
            display: inline-block;
            min-width: 40px;
        }

        .net-status-2xx {
            background: #d1fae5;
            color: #065f46;
        }

        .net-status-3xx {
            background: #dbeafe;
            color: #1e40af;
        }

        .net-status-4xx {
            background: #fed7aa;
            color: #92400e;
        }

        .net-status-5xx {
            background: #fecaca;
            color: #991b1b;
        }

        .net-type {
            font-size: 11px;
            font-weight: 500;
            text-transform: capitalize;
        }

        .net-size {
            font-family: monospace;
            font-size: 11px;
            text-align: right;
        }

        .net-timing-bar {
            display: flex;
            height: 20px;
            background: #f3f4f6;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .net-timing-segment {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 600;
            color: #fff;
            transition: all 0.2s;
        }

        .net-timing-dns {
            background: #8b5cf6;
        }

        .net-timing-connect {
            background: #f59e0b;
        }

        .net-timing-tls {
            background: #10b981;
        }

        .net-timing-ttfb {
            background: #3b82f6;
        }

        .net-timing-transfer {
            background: #6366f1;
        }

        .net-timing-total {
            margin-left: 8px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary, #666);
        }

        .net-fault-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            background: #fca5a5;
            color: #7f1d1d;
            margin-left: 6px;
        }

        .net-fault-injected {
            font-style: italic;
            color: var(--text-secondary, #666);
            font-size: 11px;
        }

        .chart-wrap {
            position: relative;
        }

        /* Session Viewer (replay) mode: this page is the same testing.html,
         * but rendered against archived snapshots. Hide every collapsible
         * section that exists to mutate state — fault injection, server
         * timeouts, network shaping, player characterization. Also hide
         * the page-level grouping / refresh / clear-sessions buttons that
         * don't apply to a single historical session. The chart toolbars
         * (reset zoom, pause/live, expand) stay because they only affect
         * the viewport. */
        body.replay-mode #refreshSessions,
        body.replay-mode #clearSessions,
        body.replay-mode #linkSelectedSessions,
        body.replay-mode .session-checkbox,
        body.replay-mode .unlink-btn,
        body.replay-mode #compareModeToggle,
        body.replay-mode label[for="compareModeToggle"],
        body.replay-mode .session-card [data-section="fault-injection"],
        body.replay-mode .session-card [data-section="server-timeouts"],
        body.replay-mode .session-card [data-section="network-shaping"],
        body.replay-mode .session-card [data-section="player-characterization"] {
            display: none !important;
        }
        /* Defensive: also disable any leftover inputs/buttons inside the
         * session card that didn't end up inside one of the hidden
         * sections (e.g. inline controls in headers). Chart toolbar
         * buttons are excluded so zoom/pause/expand still work. */
        body.replay-mode .session-card input:not([data-action]),
        body.replay-mode .session-card select:not([data-action]),
        body.replay-mode .session-card textarea {
            pointer-events: none !important;
            opacity: 0.55 !important;
        }
        body.replay-mode .session-card button:not(.chart-expand-btn):not([data-action^="reset-"]):not([data-action^="pause-"]):not([data-action^="expand-"]):not([data-action^="collapse-"]) {
            pointer-events: none !important;
            opacity: 0.45 !important;
            filter: grayscale(0.5);
        }

    </style>
</head>
<body class="replay-mode">
    <div class="ism-content-wide">
        <div class="page-header">
            <div class="page-title">Session Viewer</div>
            <div class="page-subtitle" id="testingSubtitle">Browse and replay archived streaming sessions from the analytics tier.</div>
        </div>

        <span id="sseMissedBadge" hidden></span>
        <div id="sessionsContainer"></div>
    </div>

    <script src="/shared/shared-nav.js"></script>
    <script>
        (() => {
            const subtitle = document.getElementById('testingSubtitle');
            if (!subtitle) return;
            let port = window.location.port || (window.location.protocol === 'https:' ? '443' : '80');
            if (window.ISMNav && typeof window.ISMNav.normalizeTestingBaseUrl === 'function') {
                try {
                    const normalized = window.ISMNav.normalizeTestingBaseUrl(window.location.origin);
                    const parsed = new URL(normalized);
                    port = parsed.port || port;
                } catch (err) {
                    console.warn('Failed to resolve testing port', err);
                }
            }
            subtitle.textContent = `Launch sessions on port ${port} and tune failure settings per session.`;
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css">
    <script src="https://cdn.jsdelivr.net/npm/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link rel="stylesheet" href="/dashboard/testing-session-refactored.css">
    <script src="/dashboard/testing-session-ui.js"></script>
    <script src="/dashboard/player-characterization.js"></script>
    <script src="/shared/session-shell.js"></script>
    <script src="/shared/session-replay.js"></script>
</body>
</html>
