<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing - InfiniteStream</title>
    <link rel="stylesheet" href="/shared-styles.css">
    <style>
        .page-header {
            margin-bottom: 20px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 400;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .panel {
            background: var(--bg-primary);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            padding: 16px;
            margin-bottom: 18px;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .session-card {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }

        .session-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .session-tab {
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .session-tab.active {
            background: var(--primary-blue);
            color: #fff;
            border-color: var(--primary-blue);
        }

        .session-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        .session-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .session-meta {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'Courier New', monospace;
        }

        .session-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 10px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .session-item {
            background: var(--bg-primary);
            border-radius: 6px;
            padding: 8px 10px;
        }

        .session-item .label {
            color: var(--text-secondary);
            font-weight: 600;
            display: block;
            margin-bottom: 2px;
        }

        .session-item .value {
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            word-break: break-word;
        }

        .failure-groups {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
        }

        .failure-group {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 10px;
            border: 1px solid var(--border-color);
        }

        .failure-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .radio-group label,
        .checkbox-group label {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .range-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .range-row input[type="range"] {
            flex: 1;
        }

        .range-value {
            font-size: 11px;
            color: var(--text-primary);
            min-width: 32px;
            text-align: right;
        }

        .session-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .session-actions .btn {
            font-size: 12px;
        }

        .status-message {
            font-size: 12px;
            color: var(--text-secondary);
        }

    </style>
</head>
<body>
    <div class="boss-content-wide">
        <div class="page-header">
            <div class="page-title">Testing</div>
            <div class="page-subtitle">Launch sessions on port 30081 and tune failure settings per session.</div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Active Sessions</div>
                <div class="btn-row">
                    <button class="btn btn-secondary" id="refreshSessions">Refresh</button>
                    <button class="btn btn-danger" id="clearSessions">Release All Sessions</button>
                </div>
            </div>
            <div id="sessionsContainer"></div>
        </div>
    </div>

    <script src="/shared-nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="/dashboard/testing-session-ui.js"></script>
    <script>
        const failureTypes = [
            { value: 'none', text: 'None' },
            { value: '404', text: '404' },
            { value: '500', text: '500' },
            { value: 'timeout', text: 'Timeout' },
            { value: 'connection_refused', text: 'Conn Refused' },
            { value: 'dns_failure', text: 'DNS Failure' },
            { value: 'rate_limiting', text: 'Rate Limit' },
            { value: 'hung', text: 'Hung' }
        ];

        const unitOptions = [
            { value: 'requests', text: 'Requests' },
            { value: 'seconds', text: 'Seconds' }
        ];

        const sessionsById = new Map();
        let activeSessionId = null;
        let isTabLocked = false;
        const bandwidthHistory = new Map();
        const bandwidthCharts = new Map();
        const bandwidthVisibility = new Map();

        const TestingSessionUI = window.TestingSessionUI;

        function renderSessionTabs(sessions) {
            if (!sessions.length) return '';
            return `
                <div class="session-tabs">
                    ${sessions.map(session => {
                        const id = session.session_id;
                        const isActive = id === activeSessionId ? 'active' : '';
                        const label = `Session ${id} · ${session.player_id || 'Unknown Player'}`;
                        return `<button class="session-tab ${isActive}" data-session-tab="${id}">${label}</button>`;
                    }).join('')}
                </div>
            `;
        }

        function renderSessions() {
            const container = document.getElementById('sessionsContainer');
            if (!sessionsById.size) {
                container.innerHTML = '<div class="status-message">No active sessions.</div>';
                return;
            }
            const sessions = Array.from(sessionsById.values());
            const sessionIds = sessions.map(session => session.session_id);
            if (!activeSessionId || !sessionIds.includes(activeSessionId)) {
                activeSessionId = sessionIds[0];
                isTabLocked = false;
            }
            const activeSession = sessions.find(session => session.session_id === activeSessionId);
            container.innerHTML = renderSessionTabs(sessions) + (activeSession ? TestingSessionUI.renderSessionCard(activeSession, { hideTitle: true, showPortItem: true }) : '');
            if (activeSession) {
                pushBandwidthSample(activeSession);
            }
        }

        function pushBandwidthSample(session) {
            const now = Date.now();
            const windowMs = 5 * 60 * 1000;
            const actual = Number(session.mbps_out_avg || session.mbps_out || 0);
            const actual1s = Number(session.mbps_out_1s || 0);
            const active = Number(session.mbps_out_active || 0);
            const limit = Number(session.nftables_bandwidth_mbps || 0);
            const key = session.session_id;
            if (!key) return;
            const series = bandwidthHistory.get(key) || [];
            series.push({ ts: now, actual, actual1s, active, limit });
            const cutoff = now - windowMs;
            const filtered = series.filter(point => point.ts >= cutoff);
            bandwidthHistory.set(key, filtered);
            renderBandwidthChart(key);
        }

        function renderBandwidthChart(sessionId) {
            const series = bandwidthHistory.get(sessionId) || [];
            const card = document.querySelector(`.session-card[data-session-id="${sessionId}"]`);
            if (!card) return;
            const canvas = card.querySelector('canvas.bandwidth-chart');
            if (!canvas || !series.length) return;
            const windowMs = 5 * 60 * 1000;
            const maxTs = series[series.length - 1].ts;
            const windowStart = maxTs - windowMs;
            const points = series
                .filter(point => point.ts >= windowStart)
                .map(point => ({
                    x: (point.ts - windowStart) / 1000,
                    actual: point.actual,
                    actual1s: point.actual1s,
                    active: point.active,
                    limit: point.limit
                }));
            const actualData = points.map(point => ({ x: point.x, y: point.actual }));
            const actual1sData = points.map(point => ({ x: point.x, y: point.actual1s }));
            const activeData = points.map(point => ({ x: point.x, y: point.active }));
            const limitData = points.map(point => ({ x: point.x, y: point.limit }));

            const visibility = bandwidthVisibility.get(sessionId) || {};
            const maxFor = (hidden, data) => (hidden ? [0] : data.map(point => point.y || 0));
            const maxY = Math.min(100, Math.max(1,
                ...maxFor(visibility['Actual (18s)'] === true, actualData),
                ...maxFor(visibility['Actual (1s)'] === true, actual1sData),
                ...maxFor(visibility['Active (18s)'] === true, activeData),
                ...maxFor(visibility['Limit'] === true, limitData)
            ));

            let chart = bandwidthCharts.get(sessionId);
            if (chart && chart.canvas !== canvas) {
                chart.destroy();
                chart = null;
                bandwidthCharts.delete(sessionId);
            }
            if (!chart) {
                chart = new Chart(canvas, {
                    type: 'line',
                    data: {
                        datasets: [
                            {
                                label: 'Actual (18s)',
                                data: actualData,
                                borderColor: '#38bdf8',
                                backgroundColor: 'rgba(56,189,248,0.12)',
                                borderWidth: 2,
                                pointRadius: 0,
                                tension: 0.2,
                                hidden: visibility['Actual (18s)'] === true
                            },
                            {
                                label: 'Actual (1s)',
                                data: actual1sData,
                                borderColor: '#a855f7',
                                backgroundColor: 'rgba(168,85,247,0.12)',
                                borderWidth: 1.5,
                                pointRadius: 0,
                                tension: 0.2,
                                hidden: visibility['Actual (1s)'] === true
                            },
                            {
                                label: 'Active (18s)',
                                data: activeData,
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16,185,129,0.12)',
                                borderWidth: 1.5,
                                pointRadius: 0,
                                tension: 0.2,
                                hidden: visibility['Active (18s)'] === true
                            },
                            {
                                label: 'Limit',
                                data: limitData,
                                borderColor: '#f59e0b',
                                backgroundColor: 'rgba(245,158,11,0.12)',
                                borderWidth: 1.5,
                                pointRadius: 0,
                                stepped: true,
                                hidden: visibility['Limit'] === true
                            }
                        ]
                    },
                    options: {
                        responsive: false,
                        animation: false,
                        plugins: {
                            legend: {
                                display: true,
                                position: 'bottom',
                                labels: {
                                    color: '#6b7280',
                                    font: { family: 'Courier New, monospace', size: 10 }
                                },
                                onClick: (evt, item, legend) => {
                                    const index = item.datasetIndex;
                                    const chartRef = legend.chart;
                                    const label = chartRef.data.datasets[index]?.label;
                                    if (!label) return;
                                    const state = bandwidthVisibility.get(sessionId) || {};
                                    const isVisible = chartRef.isDatasetVisible(index);
                                    chartRef.setDatasetVisibility(index, !isVisible);
                                    state[label] = isVisible;
                                    bandwidthVisibility.set(sessionId, state);
                                    chartRef.update('none');
                                }
                            }
                        },
                        scales: {
                            x: {
                                type: 'linear',
                                min: 0,
                                max: 300,
                                grid: { color: '#e5e7eb' },
                                ticks: {
                                    color: '#6b7280',
                                    font: { family: 'Courier New, monospace', size: 10 },
                                    callback: (value) => {
                                        if (value === 0) return '-5:00';
                                        if (value === 150) return '-2:30';
                                        if (value === 300) return 'now';
                                        return '';
                                    }
                                }
                            },
                            y: {
                                min: 0,
                                max: maxY,
                                grid: { color: '#e5e7eb' },
                                ticks: {
                                    color: '#6b7280',
                                    font: { family: 'Courier New, monospace', size: 10 }
                                },
                                title: {
                                    display: true,
                                    text: 'Mbps',
                                    color: '#6b7280',
                                    font: { family: 'Courier New, monospace', size: 10 }
                                }
                            }
                        }
                    }
                });
                bandwidthCharts.set(sessionId, chart);
            } else {
                chart.data.datasets[0].data = actualData;
                chart.data.datasets[1].data = actual1sData;
                chart.data.datasets[2].data = activeData;
                chart.data.datasets[3].data = limitData;
                chart.data.datasets.forEach((dataset, idx) => {
                    if (Object.prototype.hasOwnProperty.call(visibility, dataset.label)) {
                        const hidden = visibility[dataset.label] === true;
                        dataset.hidden = hidden;
                        chart.setDatasetVisibility(idx, !hidden);
                    }
                });
                chart.options.scales.y.max = maxY;
                chart.update('none');
            }
        }

        function saveSettingsForCard(card) {
            const data = TestingSessionUI.readSessionSettings(card);
            return fetch(`/api/failure-settings/${data.session_id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        }

        function fetchSessions() {
            fetch('/api/sessions')
                .then(response => response.json())
                .then(sessions => {
                    const next = new Map();
                    sessions.forEach(session => {
                        next.set(session.session_id, session);
                    });
                    sessionsById.clear();
                    next.forEach((value, key) => sessionsById.set(key, value));
                    renderSessions();
                })
                .catch(error => {
                    console.error('Error fetching sessions:', error);
                    document.getElementById('sessionsContainer').innerHTML = '<div class="status-message">Failed to load sessions.</div>';
                });
        }


        document.getElementById('refreshSessions').addEventListener('click', fetchSessions);
        document.getElementById('clearSessions').addEventListener('click', () => {
            fetch('/api/clear-sessions', { method: 'POST' })
                .then(() => fetchSessions())
                .catch(error => console.error('Error clearing sessions:', error));
        });

        document.getElementById('sessionsContainer').addEventListener('input', (event) => {
            const input = event.target;
            if (input.matches('input[type="range"]')) {
                const value = input.value;
                const valueEl = input.parentElement.querySelector('.range-value');
                if (valueEl) valueEl.textContent = value;
            }
        });

        document.getElementById('sessionsContainer').addEventListener('change', (event) => {
            const target = event.target;
            const card = target.closest('.session-card');
            if (!card) return;
            if (target.dataset.field === 'playlist_failure_urls' && target.value === 'All') {
                const checks = card.querySelectorAll('input[data-field="playlist_failure_urls"]');
                checks.forEach(input => {
                    input.checked = target.checked;
                });
            }
            if (target.dataset.field === 'segment_failure_urls' && target.value === 'All') {
                const checks = card.querySelectorAll('input[data-field="segment_failure_urls"]');
                checks.forEach(input => {
                    input.checked = target.checked;
                });
            }
            saveSettingsForCard(card).catch(error => console.error('Error saving settings:', error));
        });

        document.getElementById('sessionsContainer').addEventListener('click', (event) => {
            const button = event.target.closest('button');
            if (!button) return;
            if (button.dataset.sessionTab) {
                activeSessionId = button.dataset.sessionTab;
                isTabLocked = true;
                renderSessions();
                return;
            }
            const card = button.closest('.session-card');
            if (!card) return;
            const sessionId = card.dataset.sessionId;
            if (button.dataset.action === 'save-session') {
                saveSettingsForCard(card).catch(error => console.error('Error saving settings:', error));
            }
            if (button.dataset.action === 'delete-session') {
                fetch(`/api/session/${sessionId}`, { method: 'DELETE' })
                    .then(() => fetchSessions())
                    .catch(error => console.error('Error deleting session:', error));
            }
        });

        fetchSessions();
        setInterval(fetchSessions, 5000);
    </script>
</body>
</html>
