            setText('[data-field="server_video_rendition_mbps"]', formatMetricNumber(session.server_video_rendition_mbps, ' Mbps'));
            setText('[data-field="player_metrics_video_quality_pct"]', formatMetricNumber(session.player_metrics_video_quality_pct, '%'));
            setText('[data-field="player_metrics_network_bitrate_mbps"]', formatMetricNumber(session.player_metrics_network_bitrate_mbps, ' Mbps'));
            setText('[data-field="player_metrics_loop_count"]', formatMetricNumber(session.player_metrics_loop_count_player ?? 0));
            setText('[data-field="player_metrics_loop_count_increment"]', formatMetricNumber(session.player_metrics_loop_count_increment ?? 0));
            setText('[data-field="player_metrics_profile_shift_count"]', formatMetricNumber(session.player_metrics_profile_shift_count));
            setText('[data-field="player_metrics_frames_displayed"]', formatMetricNumber(session.player_metrics_frames_displayed));
            setText('[data-field="player_metrics_dropped_frames"]', formatMetricNumber(session.player_metrics_dropped_frames));
            setText('[data-field="player_metrics_stall_count"]', formatMetricNumber(session.player_metrics_stall_count));
            setText('[data-field="player_restarts"]', formatMetricNumber(session.player_restarts));
            setText('[data-field="player_metrics_stall_time_s"]', formatSeconds(session.player_metrics_stall_time_s));
            setText('[data-field="player_metrics_last_stall_time_s"]', formatSeconds(session.player_metrics_last_stall_time_s));
            setText('[data-field="player_metrics_error"]', session.player_metrics_error || '—');
            setText('[data-field="player_metrics_source"]', session.player_metrics_source || '—');
        }

        function bandwidthSeriesKey(label) {
            return String(label || '').replace(/\s*\(V\d+\)$/, '');
        }

        function isVariantSeriesLabel(label) {
            const s = String(label || '');
            return s === 'Variants' || /^_?Variant V?\d+$/.test(s);
        }

        function buildVariantLadder(variants) {
            if (!Array.isArray(variants) || !variants.length) return [];
            const ladder = variants
                .map((variant) => Number(variant?.bandwidth || 0))
                .filter((bandwidth) => Number.isFinite(bandwidth) && bandwidth > 0)
                .map((bandwidth) => Math.round((bandwidth / 1000000) * 1000) / 1000)
                .filter((value, index, array) => array.indexOf(value) === index)
                .sort((a, b) => a - b);
            return ladder.map((mbps, index) => ({
                vx: `V${index + 1}`,
                mbps
            }));
        }

        function parseBandwidthChartEventType(rawEventType) {
            const eventType = String(rawEventType || '').trim().toLowerCase();
            if (!eventType) return null;
            if (eventType.includes('stall')) return 'STALL';
            if (eventType.includes('restart')) return 'RESTART';
            if (eventType.includes('loop')) return 'LOOP';
            return null;
        }

        function getBandwidthChartEventTimestampMs(session, fallbackMs) {
            const candidates = [
                session?.player_metrics_last_event_at,
                session?.player_metrics_event_time,
                session?.control_revision
            ];
            for (const candidate of candidates) {
                const parsed = Date.parse(String(candidate || ''));
                if (Number.isFinite(parsed) && parsed > 0) {
                    return parsed;
                }
            }
            return fallbackMs;
        }

        function formatBitrateChartAbsoluteTick(windowStartMs, offsetSeconds) {
            const ts = Number(windowStartMs) + (Number(offsetSeconds) * 1000);
            if (!Number.isFinite(ts)) return '';
            return new Date(ts).toLocaleTimeString([], {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function formatBitrateChartRange(windowStartMs, windowEndMs) {
            const start = formatBitrateChartAbsoluteTick(windowStartMs, 0);
            const end = formatBitrateChartAbsoluteTick(windowStartMs, (Number(windowEndMs) - Number(windowStartMs)) / 1000);
            if (!start || !end) return 'Window: —';
            return `Window: ${start} → ${end}`;
        }

        function pinBitrateChartToLiveEdge(chartRef) {
            const xScale = chartRef?.scales?.x;
            if (!xScale) return;
            const domainMin = 0;
            const domainMax = 600;
            const currentMin = Number(xScale.min);
            const currentMax = Number(xScale.max);
            if (!Number.isFinite(currentMin) || !Number.isFinite(currentMax)) return;
            const span = Math.max(2, Math.min(domainMax - domainMin, currentMax - currentMin));
            const nextMax = domainMax;
            const nextMin = Math.max(domainMin, nextMax - span);
            if (typeof chartRef.zoomScale === 'function') {
                // Store via plugin so the pin survives future chart.update() calls.
                // zoomScale does not fire onZoomComplete so this is safe to call here.
                chartRef.zoomScale('x', { min: nextMin, max: nextMax }, 'none');
            } else if (chartRef.options?.scales?.x) {
                chartRef.options.scales.x.min = nextMin;
                chartRef.options.scales.x.max = nextMax;
            }
        }

        function normalizeChartViewport(minValue, maxValue) {
            const domainMin = 0;
            const domainMax = 600;
            let min = Number(minValue);
            let max = Number(maxValue);
            if (!Number.isFinite(min) || !Number.isFinite(max)) return null;
            if (max < min) {
                const tmp = min;
                min = max;
                max = tmp;
            }
            let span = max - min;
            if (!Number.isFinite(span) || span <= 0) {
                return { min: domainMin, max: domainMax };
            }
            span = Math.max(2, Math.min(domainMax - domainMin, span));
            max = Math.min(domainMax, max);
            min = Math.max(domainMin, max - span);
            max = min + span;
            if (max > domainMax) {
                max = domainMax;
                min = domainMax - span;
            }
            if (min < domainMin) {
                min = domainMin;
                max = domainMin + span;
            }
            return { min, max };
        }

        function readChartViewport(chartRef) {
            const xScale = chartRef?.scales?.x;
            if (!xScale) return null;
            return normalizeChartViewport(xScale.min, xScale.max);
        }

        function applyChartViewport(chartRef, viewport) {
            if (!chartRef || !viewport) return;
            if (typeof chartRef.zoomScale === 'function') {
                // Use the plugin API so the zoom state is stored inside the plugin and
                // survives future chart.update() calls (direct options writes get overridden
                // by the plugin's beforeUpdate hook).  zoomScale does NOT fire onZoomComplete.
                chartRef.zoomScale('x', { min: viewport.min, max: viewport.max }, 'none');
            } else if (chartRef.options?.scales?.x) {
                chartRef.options.scales.x.min = viewport.min;
                chartRef.options.scales.x.max = viewport.max;
            }
        }

        function applyStoredChartViewport(sessionId, chartRef) {
            const viewport = chartViewportBySession.get(String(sessionId || ''));
            if (!viewport) return false;
            applyChartViewport(chartRef, viewport);
            return true;
        }

        function getChartsForSession(sessionId) {
            const key = String(sessionId || '');
            return [
                bandwidthCharts.get(key),
                bufferDepthCharts.get(key),
                videoFpsCharts.get(key)
            ].filter((chartRef) => !!chartRef);
        }

        function syncChartViewportAcrossSession(sessionId, sourceChart) {
            const key = String(sessionId || '');
            const viewport = readChartViewport(sourceChart);
            if (!viewport) return;
            chartViewportBySession.set(key, viewport);
            for (const chartRef of getChartsForSession(key)) {
                if (!chartRef || chartRef === sourceChart) continue;
                applyChartViewport(chartRef, viewport);
                // zoomScale (used inside applyChartViewport) calls update internally;
                // only call update explicitly when falling back to direct options writes.
                if (typeof chartRef.zoomScale !== 'function') {
                    chartRef.update('none');
                }
            }
        }

        function buildUnifiedChartZoomOptions(sessionId) {
            const key = String(sessionId || '');
            return {
                pan: {
                    enabled: true,
                    mode: 'x',
                    threshold: 2,
                    // Must be inside pan{} in chartjs-plugin-zoom v2
                    onPanComplete: ({ chart: chartRef }) => {
                        syncChartViewportAcrossSession(key, chartRef);
                    }
                },
                limits: {
                    x: { min: 0, max: 600, minRange: 2 }
                },
                zoom: {
                    wheel: {
                        enabled: true
                    },
                    drag: {
                        enabled: true,
                        modifierKey: 'alt',
                        borderColor: '#1d4ed8',
                        borderWidth: 1,
                        backgroundColor: 'rgba(37, 99, 235, 0.12)'
                    },
                    mode: 'x',
                    // Must be inside zoom{} in chartjs-plugin-zoom v2
                    onZoomComplete: ({ chart: chartRef }) => {
                        pinBitrateChartToLiveEdge(chartRef);
                        syncChartViewportAcrossSession(key, chartRef);
                    }
                }
            };
        }

        let rightPanDragState = null;
        let rightPanListenersInstalled = false;

        function installRightMousePanHandlers(sessionId, chartRef) {
            const canvas = chartRef?.canvas;
            if (!canvas || canvas.dataset.rightPanBound === '1') return;
            canvas.dataset.rightPanBound = '1';
            const key = String(sessionId || '');
            canvas.addEventListener('contextmenu', (event) => {
                event.preventDefault();
            });
            canvas.addEventListener('mousedown', (event) => {
                if (event.button !== 2) return;
                event.preventDefault();
                const viewport = readChartViewport(chartRef) || { min: 0, max: 600 };
                rightPanDragState = {
                    sessionId: key,
                    sourceChart: chartRef,
                    startClientX: event.clientX,
                    startViewport: viewport
                };
            });
            if (rightPanListenersInstalled) return;
            rightPanListenersInstalled = true;
            window.addEventListener('mousemove', (event) => {
                if (!rightPanDragState) return;
                const sourceChart = rightPanDragState.sourceChart;
                const chartArea = sourceChart?.chartArea;
                if (!sourceChart || !chartArea) return;
                const widthPx = Math.max(1, chartArea.right - chartArea.left);
                const span = rightPanDragState.startViewport.max - rightPanDragState.startViewport.min;
                if (!Number.isFinite(span) || span <= 0) return;
                const deltaPx = event.clientX - rightPanDragState.startClientX;
                const deltaValue = (deltaPx / widthPx) * span;
                const viewport = normalizeChartViewport(
                    rightPanDragState.startViewport.min - deltaValue,
                    rightPanDragState.startViewport.max - deltaValue
                );
                if (!viewport) return;
                chartViewportBySession.set(rightPanDragState.sessionId, viewport);
                for (const chart of getChartsForSession(rightPanDragState.sessionId)) {
                    applyChartViewport(chart, viewport);
                    if (typeof chart.zoomScale !== 'function') {
                        chart.update('none');
                    }
                }
            });
            window.addEventListener('mouseup', (event) => {
                if (!rightPanDragState) return;
                if (event.button === 2) {
                    rightPanDragState = null;
                }
            });
            window.addEventListener('blur', () => {
                rightPanDragState = null;
            });
        }

        function isChartPaused(sessionId) {
            return chartPausedBySession.get(String(sessionId || '')) === true;
        }

        function updatePauseButtonAndOverlays(sessionId) {
            const key = String(sessionId || '');
            const paused = isChartPaused(key);
            const card = document.querySelector(`.session-card[data-session-id="${key}"]`);
            if (!card) return;
            const btn = card.querySelector('button[data-action="pause-bitrate-chart"]');
            if (btn) {
                if (paused) {
                    btn.textContent = 'Live';
                    btn.classList.add('chart-live');
                } else {
                    btn.textContent = '⏸ Pause';
                    btn.classList.remove('chart-live');
                }
            }
            for (const wrap of card.querySelectorAll('.chart-wrap')) {
                let badge = wrap.querySelector('.chart-paused-badge');
                if (!badge) {
                    badge = document.createElement('div');
                    badge.className = 'chart-paused-badge';
                    badge.textContent = 'PAUSED';
                    wrap.appendChild(badge);
                }
                wrap.classList.toggle('chart-paused', paused);
            }
        }

        function toggleChartPause(sessionId) {
            const key = String(sessionId || '');
            const wasPaused = isChartPaused(key);
            chartPausedBySession.set(key, !wasPaused);
            updatePauseButtonAndOverlays(key);
            if (wasPaused) {
                renderBandwidthChart(key);
            }
        }

        function installChartClickPauseHandler(sessionId, chartRef) {
            const canvas = chartRef?.canvas;
            if (!canvas || canvas.dataset.pauseHandlerBound === '1') return;
            canvas.dataset.pauseHandlerBound = '1';
            let startX = 0;
            let startY = 0;
            canvas.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                startX = e.clientX;
                startY = e.clientY;
            });
            canvas.addEventListener('click', (e) => {
                if (e.altKey) return;
                if (Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5) return;
                // Only toggle pause for clicks inside the plot area.
                // Clicks in the legend / title regions (outside chartArea) are for
                // Chart.js legend interaction and must not trigger pause.
                const chartArea = chartRef.chartArea;
                if (chartArea) {
                    const rect = canvas.getBoundingClientRect();
                    const cx = e.clientX - rect.left;
                    const cy = e.clientY - rect.top;
                    if (cx < chartArea.left || cx > chartArea.right || cy < chartArea.top || cy > chartArea.bottom) {
                        return;
                    }
                }
                toggleChartPause(sessionId);
            });
        }

        function pushBandwidthSample(session) {
            const now = Date.now();
            const windowMs = 10 * 60 * 1000;
            const key = session.session_id;
            const wireActive6s = Number.isFinite(Number(session.mbps_shaper_rate)) ? Number(session.mbps_shaper_rate) : null;
            const wireActive1s = Number.isFinite(Number(session.mbps_shaper_avg)) ? Number(session.mbps_shaper_avg) : null;
            const segmentWire = session.mbps_transfer_rate != null && Number.isFinite(Number(session.mbps_transfer_rate)) ? Number(session.mbps_transfer_rate) : null;
            const segmentDrain = session.mbps_transfer_complete != null && Number.isFinite(Number(session.mbps_transfer_complete)) ? Number(session.mbps_transfer_complete) : null;
            const fullSegmentNetworkBitrate = Number.isFinite(Number(session.full_segment_network_bitrate_mbps))
                ? Number(session.full_segment_network_bitrate_mbps)
                : null;
            let bufferDepth = null;
            if (video && video.buffered && video.buffered.length > 0) {
                const current = Number(video.currentTime || 0);
                const end = Number(video.buffered.end(video.buffered.length - 1) || 0);
                const depth = end - current;
                if (Number.isFinite(depth)) {
                    bufferDepth = Math.max(0, Math.round(depth * 100) / 100);
                }
            }
            const playerEstimate = Number(playerEstimatedMbps || 0);
            const currentRendition = Number(currentRenditionMbps || 0);
            const framesDisplayed = Number.isFinite(Number(session.player_metrics_frames_displayed))
                ? Number(session.player_metrics_frames_displayed)
                : null;
            const framesDropped = Number.isFinite(Number(session.player_metrics_dropped_frames))
                ? Number(session.player_metrics_dropped_frames)
                : null;
            const serverRendition = Number.isFinite(Number(session.server_video_rendition_mbps))
                ? Number(session.server_video_rendition_mbps)
                : null;
            const metricsAtMs = session.player_metrics_event_time
                ? Date.parse(session.player_metrics_event_time) || null
                : null;
            const variantLadder = buildVariantLadder(session.manifest_variants);
            const patternSteps = Array.isArray(session.nftables_pattern_steps) ? session.nftables_pattern_steps : [];
            const patternStepIndex = Number(session.nftables_pattern_step_runtime || session.nftables_pattern_step || 0);
            const bandwidthTarget = Number(session.nftables_bandwidth_mbps);
            const runtimeTarget = Number(session.nftables_pattern_rate_runtime_mbps);
            const patternEnabled = session.nftables_pattern_enabled === true
                || session.nftables_pattern_enabled === 1
                || session.nftables_pattern_enabled === 'true';
            const runtimeRate = Number.isFinite(runtimeTarget) ? runtimeTarget : NaN;
            let stepRate = NaN;
            if (patternStepIndex > 0 && patternStepIndex <= patternSteps.length) {
                stepRate = Number(patternSteps[patternStepIndex - 1]?.rate_mbps);
            }
            if (Number.isFinite(patternStepIndex) && patternStepIndex > 0 && patternStepIndex !== lastStepIndexLogged) {
                const step = patternSteps[patternStepIndex - 1] || {};
                lastStepIndexLogged = patternStepIndex;
                console.log('[pattern-step index]', {
                    ts: new Date().toISOString(),
                    stepIndex: patternStepIndex,
                    stepRateMbps: Number.isFinite(stepRate) ? stepRate : null,
                    stepEnabled: step.enabled,
                    stepDurationSeconds: step.duration_seconds,
                    runtimeRateMbps: Number.isFinite(runtimeRate) ? runtimeRate : null,
                    sseRevision: sseLastRevision
                });
            }
            if (Number.isFinite(runtimeRate) && runtimeRate !== lastRuntimeRateLogged) {
                lastRuntimeRateLogged = runtimeRate;
                console.log('[pattern-rate runtime]', {
                    ts: new Date().toISOString(),
                    runtimeRateMbps: runtimeRate,
                    sseRevision: sseLastRevision
                });
            }
            if (Number.isFinite(stepRate) && stepRate !== lastStepRateLogged) {
                lastStepRateLogged = stepRate;
                console.log('[pattern-rate step]', {
                    ts: new Date().toISOString(),
                    stepRateMbps: stepRate,
                    stepIndex: patternStepIndex,
                    sseRevision: sseLastRevision
                });
            }
            let target = Number.isFinite(bandwidthTarget) ? bandwidthTarget : NaN;
            let usedRuntime = false;
            if (patternEnabled && Number.isFinite(runtimeTarget)) {
                target = runtimeTarget;
                usedRuntime = true;
            }
            if (!usedRuntime && patternStepIndex > 0 && patternStepIndex <= patternSteps.length) {
                if (Number.isFinite(stepRate) && stepRate >= 0) {
                    target = stepRate;
                }
            }
            if (!patternEnabled) {
                const applied = lastAppliedShaping.get(key);
                if (applied && Date.now() - applied.timestamp < 20000) {
                    if (Number.isFinite(applied.rate) && applied.rate > 0) {
                        if (!Number.isFinite(target) || Math.abs(target - applied.rate) > 0.01) {
                            target = applied.rate;
                        }
                    }
                }
            }
            if (!key) return;

            const numericLoopCount = Number(session.player_metrics_loop_count_player);
            if (Number.isFinite(numericLoopCount) && numericLoopCount >= 0) {
                const loopCount = Math.max(0, Math.round(numericLoopCount));
                const prevLoopCount = lastRecordedLoopCountBySession.get(String(key));
                if (Number.isFinite(prevLoopCount) && loopCount > prevLoopCount) {
                    const stamp = `${String(key)}|player|${loopCount}`;
                    if (lastRecordedLoopEventStampBySession.get(String(key)) !== stamp) {
                        const eventSeries = bandwidthEventHistory.get(key) || [];
                        const loopEventAtMs = getBandwidthChartEventTimestampMs(session, now);
                        eventSeries.push({ ts: loopEventAtMs, type: 'LOOP_PLAYER' });
                        const eventCutoff = now - windowMs;
                        bandwidthEventHistory.set(key, eventSeries.filter((event) => Number(event.ts) >= eventCutoff));
                        lastRecordedLoopEventStampBySession.set(String(key), stamp);
                    }
                }
                lastRecordedLoopCountBySession.set(String(key), loopCount);
            }

            const numericServerLoopCount = Number(session.loop_count_server);
            if (Number.isFinite(numericServerLoopCount) && numericServerLoopCount >= 0) {
                const serverLoopCount = Math.max(0, Math.round(numericServerLoopCount));
                const prevServerLoopCount = lastRecordedServerLoopCountBySession.get(String(key));
                if (Number.isFinite(prevServerLoopCount) && serverLoopCount > prevServerLoopCount) {
                    const stamp = `${String(key)}|server|${serverLoopCount}`;
                    if (lastRecordedServerLoopEventStampBySession.get(String(key)) !== stamp) {
                        const eventSeries = bandwidthEventHistory.get(key) || [];
                        const loopEventAtMs = getBandwidthChartEventTimestampMs(session, now);
                        eventSeries.push({ ts: loopEventAtMs, type: 'LOOP_SERVER' });
                        const eventCutoff = now - windowMs;
                        bandwidthEventHistory.set(key, eventSeries.filter((event) => Number(event.ts) >= eventCutoff));
                        lastRecordedServerLoopEventStampBySession.set(String(key), stamp);
                    }
                }
                lastRecordedServerLoopCountBySession.set(String(key), serverLoopCount);
            }

            const eventType = parseBandwidthChartEventType(session.player_metrics_last_event || session.player_metrics_trigger_type);
            if (eventType) {
                const eventAtMs = getBandwidthChartEventTimestampMs(session, now);
                const eventStamp = `${eventType}|${session.player_metrics_last_event_at || session.player_metrics_event_time || eventAtMs}`;
                const lastStamp = lastRecordedPlayerEventBySession.get(String(key));
                if (eventStamp !== lastStamp) {
                    const eventSeries = bandwidthEventHistory.get(key) || [];
                    eventSeries.push({ ts: eventAtMs, type: eventType });
                    const eventCutoff = now - windowMs;
                    bandwidthEventHistory.set(key, eventSeries.filter((event) => Number(event.ts) >= eventCutoff));
                    lastRecordedPlayerEventBySession.set(String(key), eventStamp);
                }
            }

            const series = bandwidthHistory.get(key) || [];
            if (!Number.isFinite(target)) {
                const lastTarget = series.length > 0 ? series[series.length - 1].target : null;
                if (Number.isFinite(lastTarget)) {
                    target = lastTarget;
                } else {
                    target = 0;
                }
            }
            series.push({
                ts: now,
                wireActive6s,
                wireActive1s,
                segmentWire,
                segmentDrain,
                fullSegmentNetworkBitrate,
                bufferDepth,
                playerEstimate,
                currentRendition,
                framesDisplayed,
                framesDropped,
                metricsAtMs,
                serverRendition,
                target,
                variantLadder
            });
            const cutoff = now - windowMs;
            const filtered = series.filter(point => point.ts >= cutoff);
            bandwidthHistory.set(key, filtered);
            renderBandwidthChart(key);
        }

        function renderBandwidthChart(sessionId) {
            if (isChartPaused(sessionId)) return;
            const series = bandwidthHistory.get(sessionId) || [];
            const eventSeries = bandwidthEventHistory.get(sessionId) || [];
            const card = document.querySelector(`.session-card[data-session-id="${sessionId}"]`);
            if (!card) return;
            const canvas = card.querySelector('canvas.bandwidth-chart');
            if (!canvas) return;
            const windowMs = 10 * 60 * 1000;
            if (series.length === 0) return;
            const maxTs = series[series.length - 1].ts;
            const windowStart = maxTs - windowMs;
            const bitrateChartRangeLabel = card.querySelector('[data-field="bandwidth_chart_range"]');
            if (bitrateChartRangeLabel) {
                bitrateChartRangeLabel.textContent = formatBitrateChartRange(windowStart, maxTs);
            }
            const points = series
                .filter(point => point.ts >= windowStart)
                .map(point => ({
                    x: (point.ts - windowStart) / 1000,
                    wireActive6s: point.wireActive6s,
                    wireActive1s: point.wireActive1s,
                    segmentWire: point.segmentWire,
                    segmentDrain: point.segmentDrain,
                    fullSegmentNetworkBitrate: point.fullSegmentNetworkBitrate,
                    bufferDepth: point.bufferDepth,
                    playerEstimate: point.playerEstimate,
                    currentRendition: point.currentRendition,
                    framesDisplayed: point.framesDisplayed,
                    framesDropped: point.framesDropped,
                    metricsAtMs: point.metricsAtMs,
                    serverRendition: point.serverRendition,
                    target: point.target,
                    variantLadder: point.variantLadder
                }));
            const chartEvents = eventSeries
                .filter((event) => Number(event.ts) >= windowStart)
                .map((event) => ({
                    x: (event.ts - windowStart) / 1000,
                    type: event.type
                }))
                .filter((event) => Number.isFinite(event.x) && event.x >= 0 && event.x <= 600);
            const wireActive6sData = points.map(point => ({ x: point.x, y: point.wireActive6s }));
            const wireActive1sData = points.map(point => ({ x: point.x, y: point.wireActive1s }));
            const segmentWireData = points.map(point => ({ x: point.x, y: point.segmentWire }));
            const segmentDrainData = points.map(point => ({ x: point.x, y: point.segmentDrain }));
            const fullSegmentNetworkBitrateData = points.map(point => ({ x: point.x, y: point.fullSegmentNetworkBitrate }));
            const bufferDepthData = points.map(point => ({ x: point.x, y: Number.isFinite(point.bufferDepth) ? point.bufferDepth : null }));
            const framesDisplayedData = points.map(point => ({ x: point.x, y: Number.isFinite(point.framesDisplayed) ? point.framesDisplayed : null, atMs: point.metricsAtMs || null }));
            const framesDroppedData = points.map(point => ({ x: point.x, y: Number.isFinite(point.framesDropped) ? point.framesDropped : null, atMs: point.metricsAtMs || null }));
            const estimateData = points.map(point => ({ x: point.x, y: point.playerEstimate || null }));
            const renditionData = points.map(point => ({ x: point.x, y: point.currentRendition || null }));
            const serverRenditionData = points.map(point => ({ x: point.x, y: point.serverRendition || null }));

                for (let idx = 0; idx < counterSeries.length; idx += 1) {
                    const currentPoint = counterSeries[idx];
                    const currentCount = Number(currentPoint.y);
                    const currentX = Number(currentPoint.x);
                    if (!Number.isFinite(currentCount) || !Number.isFinite(currentX)) {
                        out.push({ x: currentPoint.x, y: null });
                        continue;
                    }
                    const targetX = currentX - fpsWindowSeconds;
                    let anchorPoint = null;
                    for (let j = idx - 1; j >= 0; j -= 1) {
                        const candidateX = Number(counterSeries[j]?.x);
                        if (!Number.isFinite(candidateX)) continue;
                        if (candidateX <= targetX) {
                            anchorPoint = counterSeries[j];
                            break;
                        }
                    }
                    if (!anchorPoint) {
                        out.push({ x: currentPoint.x, y: null });
                        continue;
                    }
                    const anchorCount = Number(anchorPoint.y);
                    const currentMs = Number(currentPoint.atMs);
                    const anchorMs = Number(anchorPoint.atMs);
                    const deltaSeconds = (Number.isFinite(currentMs) && Number.isFinite(anchorMs) && currentMs > anchorMs)
                        ? (currentMs - anchorMs) / 1000
                        : currentX - Number(anchorPoint.x);
                    const deltaCount = currentCount - anchorCount;
                    if (!Number.isFinite(anchorCount) || deltaSeconds <= 0 || deltaCount < 0) {
                        out.push({ x: currentPoint.x, y: null });
                        continue;
                    }
                    const rate = deltaCount / deltaSeconds;

                        continue;

                                        if (rounded % 60 !== 0) return '';
                                        const startMs = Number(fpsChart?.$windowStartMs || windowStart);
                                        return formatBitrateChartAbsoluteTick(startMs, rounded);
                                    }
                                }
                            },
                            y: {
                                min: 0,
                                max: maxFps,
                                grid: { color: '#e5e7eb' },
                                ticks: {
                                    color: '#6b7280',
                                    font: { family: 'Courier New, monospace', size: 10 }
                                },
                                title: {
                                    display: true,
                                    text: 'Frames/s',
                                    color: '#6b7280',
                                    font: { family: 'Courier New, monospace', size: 10 }
                                }
                            },
                            yDrop: {
                                position: 'right',
                                min: 0,
                                max: maxDroppedFps,
                                grid: { drawOnChartArea: false },
                                ticks: {
                                    color: '#9a3412',
                                    font: { family: 'Courier New, monospace', size: 10 }
                                },
                                title: {
                                    display: true,
                                    text: 'Dropped/s',
                                    color: '#9a3412',
                                    font: { family: 'Courier New, monospace', size: 10 }
                                }
                            }
                        }
                    }
                });
                fpsChart.$windowStartMs = windowStart;
                const restoredFpsViewport = applyStoredChartViewport(sessionId, fpsChart);
                installRightMousePanHandlers(sessionId, fpsChart);
                installChartClickPauseHandler(sessionId, fpsChart);
                if (restoredFpsViewport) {
                    fpsChart.update('none');
                }
                videoFpsCharts.set(sessionId, fpsChart);
            } else {
                fpsChart.data.datasets[0].data = fpsSmoothedData;
                fpsChart.data.datasets[1].data = lowFpsData;
                fpsChart.data.datasets[2].data = baselineData;
                fpsChart.data.datasets[3].data = lowThresholdData;
                fpsChart.data.datasets[4].data = droppedFpsSmoothedData;
                fpsChart.$windowStartMs = windowStart;
                fpsChart.options.scales.y.max = maxFps;
                fpsChart.options.scales.yDrop.max = maxDroppedFps;
                fpsChart.update('none');
            }
        }

        document.addEventListener('testing-session:charts-resize', (event) => {
            const sessionId = event.detail && event.detail.sessionId;
            if (!sessionId) return;
            requestAnimationFrame(() => renderBandwidthChart(sessionId));
        });

        function applySessionUpdate(session) {
            if (!session) return;
            const incomingVersion = getSessionSnapshotVersion(session);
            const currentVersion = getSessionSnapshotVersion(lastServerSession);
            if (
                incomingVersion > 0
                && currentVersion > 0
                && incomingVersion < currentVersion
            ) {
                return;
            }
            const container = document.getElementById('sessionControls');
            const existingCard = container ? container.querySelector('.session-card') : null;
            const serverSession = session;
            // Debug: log changes to session max_height/max_resolution to detect intermittent metadata
            try {
                const prev = lastServerSession;
                const prevMax = prev ? (prev.max_height || prev.max_resolution || null) : null;
                const nextMax = serverSession ? (serverSession.max_height || serverSession.max_resolution || null) : null;
                if (String(prevMax) !== String(nextMax)) {
                    console.debug('Session metadata change', { session_id: serverSession?.session_id, prevMax, nextMax });
                }
            } catch (e) {
                console.warn('Failed to compare session metadata', e);
            }
            lastServerSession = serverSession;
            const serverRestarts = Number(serverSession?.player_restarts);
            if (Number.isFinite(serverRestarts) && serverRestarts >= 0) {
                playerRestartCount = Math.max(playerRestartCount, Math.round(serverRestarts));
            }
            maybeHandleRemoteRestartRequest(serverSession);
            // If server session metadata explicitly indicates 4K, persist that immediately
            try {
                if (serverSession) {
                    if (serverSession.max_height && Number(serverSession.max_height) >= UHD_HEIGHT_THRESHOLD) {
                        setKnown4kForSession(serverSession.session_id);
                    } else if (serverSession.max_resolution && typeof serverSession.max_resolution === 'string') {
                        const s = serverSession.max_resolution.trim();
                        const m1 = s.match(/(\d+)x(\d+)/i);
                        if (m1 && Number(m1[2]) >= UHD_HEIGHT_THRESHOLD) setKnown4kForSession(serverSession.session_id);
                        const m2 = s.match(/(\d+)p$/i);
                        if (m2 && Number(m2[1]) >= UHD_HEIGHT_THRESHOLD) setKnown4kForSession(serverSession.session_id);
                        const m3 = s.match(/^(\d+)$/);
                        if (m3 && Number(m3[1]) >= UHD_HEIGHT_THRESHOLD) setKnown4kForSession(serverSession.session_id);
                    }
                }
            } catch (e) {
                // ignore
            }
            const sessionKey = String(serverSession.session_id || '');
            const pending = pendingShaping.get(String(serverSession.session_id));
            if (pending) {
                if (shapingValuesMatch(serverSession, pending.values)) {
                    pendingShaping.delete(String(serverSession.session_id));
                } else {
                    // Keep local slider state until backend snapshot catches up.
                    session = {
                        ...serverSession,
                        ...pending.values
                    };
                }
            }
            const pendingFailure = pendingFailureEdits.get(String(serverSession.session_id));
            if (pendingFailure && Date.now() - pendingFailure.timestamp < 5000) {
                session = {
                    ...(session || serverSession),
                    ...pendingFailure.values
                };
            }
            if (!session) {
                session = serverSession;
            }
            session = {
                ...session,
                ui_bitrate_axis_max: normalizeBitrateAxisMaxMode(
                    bitrateAxisMaxBySession.get(String(session.session_id)) || session.ui_bitrate_axis_max || 'auto'
                )
            };
            if (session.session_id) {
                const portValue = session.x_forwarded_port_external || session.x_forwarded_port || '';
                const portSuffix = portValue ? ` (Port ${portValue})` : '';
                const titleParts = ['Testing Playback', `Session ${session.session_id}${portSuffix}`];
                if (session.player_id) {
                    titleParts.push(session.player_id);
                }
                const titleText = titleParts.join(' · ');
                document.title = titleText;
                const titleEl = document.getElementById('pageTitle');
                if (titleEl) {
                    titleEl.textContent = titleText;
                }
            }
            currentSessionId = session.session_id;
            if (currentUrl) {
                const isDash = currentUrl.includes('.mpd');
                const derived = deriveCodecAndSegment(currentUrl, session);
                setBadges(
                    isDash,
                    resolvePlayerChoice(currentUrl, getPlayerChoice()),
                    session.group_id || '',
                    derived.codec,
                    derived.codecClass,
                    derived.segment,
                    derived.segmentClass
                );
            }
            updateGroupControls(session, lastSessionsList);
            if (container && existingCard && String(existingCard.dataset.sessionId || '') === sessionKey) {
                // Check if manifest_variants just became available - need to re-render for presets
                const hasVariants = Array.isArray(session.manifest_variants) && session.manifest_variants.length > 0;
                let hadPresets = false;
                const presetsRaw = existingCard.dataset.shapingPresets || '';
                if (presetsRaw) {
                    try {
                        const decoded = JSON.parse(decodeURIComponent(presetsRaw));
                        hadPresets = Array.isArray(decoded) && decoded.length > 0;
                    } catch (err) {
                        hadPresets = presetsRaw !== 'W10%3D' && presetsRaw !== '%5B%5D';
                    }
                }
                if (hasVariants && !hadPresets) {
                    // Re-render to populate presets now that variants are available
                    renderSessionControls(session);
                    updateThroughputSlider(session);
                    pushBandwidthSample(session);
                    return;
                }
                const shouldSync = shouldSyncControls(sessionKey, session);
                if (shouldSync) {
                    syncServerFaultControls(existingCard, session);
                    syncNetworkShapingControls(existingCard, session);
                    syncContentControls(existingCard, session);
                }
                syncServerFaultData(existingCard, session);
                updateSessionDetailData(existingCard, session);
                updateThroughputSlider(session);
                pushBandwidthSample(session);
                return;
            }
            renderSessionControls(session);
            updateSessionDetailData(container.querySelector('.session-card'), session);
            updateThroughputSlider(session);
            pushBandwidthSample(session);
        }

        function refreshSession(playerId) {
            if (!playerId) return;
            if (sessionPollInFlight) {
                return;
            }
            const controller = new AbortController();
            sessionPollController = controller;
            sessionPollInFlight = true;
            const requestSeq = ++sessionPollRequestSeq;
            findSessionByPlayerId(playerId, controller.signal)
                .then(session => {
                    if (requestSeq <= sessionPollLastAppliedSeq) {
                        return;
                    }
                    sessionPollLastAppliedSeq = requestSeq;
                    applySessionUpdate(session);
                })
                .catch(err => {
                    if (err && err.name === 'AbortError') return;
                    console.error('Error fetching session', err);
                })
                .finally(() => {
                    if (sessionPollController === controller) {
                        sessionPollController = null;
                    }
                    sessionPollInFlight = false;
                });
        }

        function startSessionPolling(playerId) {
            if (sessionPollTimer) return;
            sessionPollTimer = setInterval(() => refreshSession(playerId), 1000);
        }

        function startSessionStream(playerId) {
            if (!window.EventSource) return false;
            if (!playerId) return false;
            const source = new EventSource('/api/sessions/stream');
            sessionsStream = source;
            source.addEventListener('sessions', (event) => {
                try {
                    const payload = parseSessionsStreamPayload(event);
                    const sessions = mergeSessionsBySnapshotVersion(payload.sessions);
                    lastSessionsList = sessions;
                    const revision = Number(payload.revision || 0);
                    const dropped = Number(payload.dropped || 0);
                    let missed = 0;
                    if (Number.isFinite(revision) && revision > 0 && sseLastRevision > 0) {
                        const gap = revision - sseLastRevision - 1;
                        if (gap > 0) {
                            missed += gap;
                        }
                    }
                    if (Number.isFinite(dropped) && dropped > 0) {
                        missed += dropped;
                    }
                    if (missed > 0) {
                        sseMissedTotal += missed;
                        updateSseMissedUi();
                        log(`SSE missed ${missed} update${missed === 1 ? '' : 's'}`);
                    }
                    if (Number.isFinite(revision) && revision > 0) {
                        sseLastRevision = revision;
                    }
                    const session = (() => {
                        if (currentSessionId) {
                            const sticky = sessions.find(item => String(item.session_id) === String(currentSessionId));
                            if (sticky) return sticky;
                        }
                        const matches = sessions.filter(item => item.player_id === playerId);
                        if (!matches.length) return null;
                        matches.sort((a, b) => {
                            const aLast = Date.parse(a.last_request || '') || 0;
                            const bLast = Date.parse(b.last_request || '') || 0;
                            if (bLast !== aLast) return bLast - aLast;
                            const aFirst = Date.parse(a.first_request_time || '') || 0;
                            const bFirst = Date.parse(b.first_request_time || '') || 0;
                            return bFirst - aFirst;
                        });
                        return matches[0];
                    })();
                    applySessionUpdate(session);
                } catch (err) {
                    console.error('Error parsing sessions stream payload', err);
                }
            });
            source.addEventListener('error', () => {
                if (source.readyState === EventSource.CLOSED) {
                    source.close();
                    sessionsStream = null;
                    startSessionPolling(playerId);
                }
            });
            return true;
        }

        function bootstrap() {
            const params = getParams();
            currentPlayerId = params.playerId || '';
            desiredLiveOffsetSeconds = Number(params.liveOffsetSeconds || 0);
            if (!Number.isFinite(desiredLiveOffsetSeconds) || desiredLiveOffsetSeconds < 0) {
                desiredLiveOffsetSeconds = 0;
            }
            if (params.playerId) {
                const titleText = `Testing Playback · ${params.playerId}`;
                document.title = titleText;
                const titleEl = document.getElementById('pageTitle');
                if (titleEl) {
                    titleEl.textContent = titleText;
                }
            }
            if (!params.url) {
                document.getElementById('playerUrl').textContent = 'Missing stream URL.';
                return;
            }
            if (desiredLiveOffsetSeconds > 0) {
                log(`LIVE OFFSET: target ${desiredLiveOffsetSeconds.toFixed(1)}s behind live`);
            }
            const savedPlayer = localStorage.getItem('testing_session_player');
            setPlayerChoice(params.player || savedPlayer || 'auto');
            attachVideoEvents();
            loadStream(params.url);
            bindSessionControls();
            bindGroupControls();
            refreshSession(params.playerId);
            if (!startSessionStream(params.playerId)) {
                startSessionPolling(params.playerId);
            }
            setInterval(updateStats, 500);
            scheduleMetricsHeartbeat();
            const setNetworkShapingVisibility = (enabled) => {
                document.querySelectorAll('[data-net-shaping]').forEach(el => {
                    el.style.display = enabled ? '' : 'none';
                });
            };
            fetch('/api/nftables/capabilities')
                .then(res => res.json())
                .then(info => {
                    if (info.status !== 'enabled') {
                        const banner = document.getElementById('networkShapingBanner');
                        if (banner) {
                            const reason = info.reason || 'Traffic shaping is unavailable.';
                            banner.textContent = `Network shaping disabled (${info.platform || 'unknown'}): ${reason}`;
                            banner.style.display = 'block';
                        }
                        setNetworkShapingVisibility(false);
                    } else {
                        setNetworkShapingVisibility(true);
                    }
                })
                .catch(() => {
                    setNetworkShapingVisibility(false);
                });
            document.getElementById('retryPlayback').addEventListener('click', () => {
                log('RETRY: playback');
                retryPlayback();
            });
            document.getElementById('restartPlayback').addEventListener('click', () => {
                performPlaybackRestart('manual');
            });
            document.getElementById('reloadPage').addEventListener('click', () => {
                log('RELOAD: page');
                window.location.reload();
            });
            const playerSelect = document.getElementById('playerSelect');
            if (playerSelect) {
                playerSelect.addEventListener('change', () => {
                    localStorage.setItem('testing_session_player', playerSelect.value);
                    if (currentUrl) {
                        resetPlayback();
                        loadStream(currentUrl);
                    }
                });
            }
            const prefer4kToggle = document.getElementById('prefer4kToggle');
            if (prefer4kToggle) {
                prefer4kToggle.checked = localStorage.getItem(NATIVE_4K_KEY) === 'true';
                prefer4kToggle.addEventListener('change', () => {
                    localStorage.setItem(NATIVE_4K_KEY, prefer4kToggle.checked ? 'true' : 'false');
                    if (currentUrl) {
                        resetPlayback();
                        loadStream(currentUrl);
                    }
                });
            }
            const autoRecoveryToggle = document.getElementById('autoRecoveryToggle');
            if (autoRecoveryToggle) {
                const requested = String(params.autoRecovery || '').trim().toLowerCase();
                if (requested === '1' || requested === 'true' || requested === 'yes' || requested === 'on') {
                    autoRecoveryEnabled = true;
                } else if (requested === '0' || requested === 'false' || requested === 'no' || requested === 'off') {
                    autoRecoveryEnabled = false;
                } else {
                    autoRecoveryEnabled = localStorage.getItem(AUTO_RECOVERY_KEY) === 'true';
                }
                autoRecoveryToggle.checked = autoRecoveryEnabled;
                localStorage.setItem(AUTO_RECOVERY_KEY, autoRecoveryEnabled ? 'true' : 'false');
                autoRecoveryToggle.addEventListener('change', () => {
                    autoRecoveryEnabled = !!autoRecoveryToggle.checked;
                    autoRecoveryZeroStartedAtMs = null;
                    localStorage.setItem(AUTO_RECOVERY_KEY, autoRecoveryEnabled ? 'true' : 'false');
                    sendSessionMetrics('state_change', {
                        player_auto_recovery_enabled: autoRecoveryEnabled
                    });
                });
            }
        }

        document.addEventListener('DOMContentLoaded', bootstrap);
        document.addEventListener('DOMContentLoaded', initContextMenu);

        // ── Picture-in-Picture ───────────────────────────────────────
        // Toggle the video into a native floating browser window so the
        // main page frees up vertical space for shaping controls + chart.
        // The video element stays in the DOM, so all metrics collection
        // (buffered end, frames, stalls, etc.) keeps working unchanged.
        function initVideoPip() {
            const btn = document.getElementById('videoPipBtn');
            const video = document.getElementById('player');
            const frame = document.querySelector('.player-frame');
            if (!btn || !video || !frame) return;

            const pipSupported = 'pictureInPictureEnabled' in document && !video.disablePictureInPicture;
            if (!pipSupported) {
                btn.disabled = true;
                btn.title = 'Picture-in-Picture not supported in this browser';
                btn.style.opacity = '0.5';
                return;
            }

            btn.addEventListener('click', async () => {
                try {
                    if (document.pictureInPictureElement === video) {
                        await document.exitPictureInPicture();
                    } else {
                        await video.requestPictureInPicture();
                    }
                } catch (err) {
                    console.warn('PiP toggle failed:', err);
                }
            });

            video.addEventListener('enterpictureinpicture', () => {
                frame.classList.add('pip-active');
                btn.classList.add('active');
                btn.textContent = '📺 Exit PiP';
            });
            video.addEventListener('leavepictureinpicture', () => {
                frame.classList.remove('pip-active');
                btn.classList.remove('active');
                btn.textContent = '📺 PiP';
            });
        }
        document.addEventListener('DOMContentLoaded', initVideoPip);
    </script>
