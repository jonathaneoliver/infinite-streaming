<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Playback - InfiniteStream</title>
    <link rel="stylesheet" href="/shared-styles.css">
    <link href="https://vjs.zencdn.net/8.21.1/video-js.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.0/dist/shaka-player.compiled.js"></script>
    <script src="https://vjs.zencdn.net/8.21.1/video.min.js"></script>
    <style>
            try {
                const prev = lastServerSession;
                const prevMax = prev ? (prev.max_height || prev.max_resolution || null) : null;
                const nextMax = serverSession ? (serverSession.max_height || serverSession.max_resolution || null) : null;
                if (String(prevMax) !== String(nextMax)) {

                }
            } catch (e) {
                if (isDeveloperMode) console.warn('Failed to compare session metadata', e);
            }
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .page-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .player-card {
            background: var(--bg-primary);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            padding: 12px;
        }

        .player-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .player-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 8px;
        }

        .panel-badge.videojs { background: #fce7f3; color: #9d174d; }
        .panel-badge.native { background: #e0f2fe; color: #0369a1; }
        .panel-badge.group { background: #fde68a; color: #92400e; }

        .context-menu {
            position: fixed;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 12px 30px rgba(0,0,0,0.35);
            border-radius: 8px;
            padding: 6px;
            display: none;
            z-index: 9999;
            min-width: 200px;
        }

        .context-menu button {
            width: 100%;
            background: transparent;
            border: none;
            text-align: left;
            padding: 8px 10px;
            font-size: 12px;
            color: #e5e7eb;
            border-radius: 6px;
            cursor: pointer;
        }

        .context-menu button:hover {
            background: rgba(59, 130, 246, 0.2);
        }
        .group-controls-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 8px;
            background: #f8fafc;
        }
        .group-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 6px 8px;
            border-radius: 10px;
            border: 1px solid #bbf7d0;
            background: #ecfdf3;
            color: #166534;
            font-weight: 600;
        }
        .group-banner .group-meta {
            font-weight: 500;
        }
        .group-banner .group-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .group-controls-row .group-select-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .group-controls-row select {
            min-width: 220px;
        }
        .group-controls-row .group-hint {
            color: #6b7280;
        }

        .player-frame {
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            max-height: 68vh;
        }

        .player-frame video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }

        .stats-grid {
            margin-top: 8px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 8px;
            font-size: 12px;
        }

        .stats-item {
            background: var(--bg-secondary);
            border-radius: 6px;
            padding: 6px 8px;
        }

        .stats-item .label {
            color: var(--text-secondary);
            font-weight: 600;
            display: block;
            margin-bottom: 2px;
        }

        .stats-item .value {
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
        }

        .debug-log {
            margin-top: 8px;
            background: #0b1220;
            color: #e5e7eb;
            border-radius: 10px;
            padding: 8px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            max-height: 200px;
            overflow: auto;
        }

        .session-panel {
            margin-top: 12px;
            background: var(--bg-primary);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            padding: 12px;
        }

        .session-panel h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .session-card {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 10px;
            border: 1px solid var(--border-color);
        }

        .session-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 6px;
        }

        .session-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .session-meta {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'Courier New', monospace;
        }

        .session-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 10px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .session-item {
            background: var(--bg-primary);
            border-radius: 6px;
            padding: 8px 10px;
        }

        .session-item .label {
            color: var(--text-secondary);
            font-weight: 600;
            display: block;
            margin-bottom: 2px;
        }

        .session-item .value {
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            word-break: break-word;
        }

        .failure-groups {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
        }

        .failure-group {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 10px;
            border: 1px solid var(--border-color);
        }

        .failure-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .radio-group label,
        .checkbox-group label {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .range-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .range-row input[type="range"] {
            flex: 1;
        }

        .range-value {
            font-size: 11px;
            color: var(--text-primary);
            min-width: 32px;
            text-align: right;
        }

        .range-row.range-row-disabled {
            opacity: 0.55;
        }

        .range-row.range-row-disabled input[type="range"] {
            pointer-events: none;
        }

        .btn-mini {
            font-size: 11px;
            padding: 4px 8px;
            min-height: 28px;
        }

        .shape-pattern-block {
            margin-top: 8px;
            border-top: 1px dashed var(--border-color);
            padding-top: 8px;
        }

        .shape-step-defaults {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 6px;
            align-items: center;
            margin-bottom: 8px;
        }

        .shape-step-defaults label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .shape-default-seconds {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: right;
            white-space: nowrap;
        }

        .shape-template-row {
            display: grid;
            grid-template-columns: auto minmax(320px, 1fr) auto minmax(90px, 130px) 1fr;
            gap: 6px;
            align-items: center;
            margin-bottom: 8px;
        }

        .shape-template-row label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .shape-template-row select {
            width: 100%;
            min-width: 0;
            padding: 4px 6px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 11px;
        }

        .shape-pattern-modes {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .shape-margin-modes {
            flex-wrap: nowrap;
        }

        .shape-pattern-mode {
            margin: 0;
        }

        .shape-pattern-mode input {
            display: none;
        }

        .shape-pattern-mode span {
            display: inline-block;
            padding: 4px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-primary);
            background: #f8fafc;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease;
        }

        .shape-pattern-mode input:checked + span {
            background: #1d4ed8;
            border-color: #1d4ed8;
            color: #fff;
            box-shadow: 0 0 0 2px rgba(29, 78, 216, 0.2);
        }

        .shape-pattern-mode input:focus-visible + span {
            outline: 2px solid #2563eb;
            outline-offset: 1px;
        }

        .shape-step-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 8px;
        }

        .shape-step-row {
            display: grid;
            grid-template-columns: auto minmax(120px, 180px) auto minmax(68px, 100px) auto minmax(68px, 100px) auto;
            gap: 6px;
            align-items: center;
        }

        .shape-step-row label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .shape-step-row input,
        .shape-step-row select {
            width: 100%;
            min-width: 0;
            padding: 4px 6px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 11px;
        }

        .shape-step-actions {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .chart-axis-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .chart-axis-row > label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .shape-step-enabled {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .shape-step-row.shape-step-disabled {
            opacity: 0.55;
        }

        .shape-step-row.shape-step-risk {
            border: 1px solid #ef4444;
            border-radius: 8px;
            padding: 4px;
            background: rgba(239, 68, 68, 0.08);
        }

        .session-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .chart-wrap {
            position: relative;
            margin-top: 10px;
            background: #ffffff;
            border-radius: 8px;
            padding: 6px;
            border: 1px solid #e5e7eb;
            width: 100%;
        }

        .chart-paused-badge {
            display: none;
            position: absolute;
            top: 8px;
            right: 10px;
            background: rgba(30, 41, 59, 0.72);
            color: #f8fafc;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 0.1em;
            padding: 2px 7px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 10;
        }
        .chart-wrap.chart-paused .chart-paused-badge {
            display: block;
        }
        .chart-wrap.chart-paused {
            cursor: pointer;
        }

        button[data-action="pause-bitrate-chart"].chart-live {
            color: #16a34a;
            border-color: #16a34a;
            font-weight: 600;
        }
        @keyframes chart-pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }
        button[data-action="pause-bitrate-chart"].chart-live::before {
            content: '● ';
            animation: chart-pulse-dot 1.2s ease-in-out infinite;
        }

        .bandwidth-chart {
            width: 100%;
            height: 220px;
            display: block;
        }

        .buffer-depth-chart {
            width: 100%;
            height: 170px;
            display: block;
        }

        .video-fps-chart {
            width: 100%;
            height: 170px;
            display: block;
        }

        .abrchar-panel {
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-secondary);
            padding: 8px;
        }

        .abrchar-summary {
            cursor: pointer;
            font-weight: 600;
            color: var(--text-primary);
        }

        .abrchar-body {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .abrchar-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: flex-end;
        }

        .abrchar-controls label {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .abrchar-controls input,
        .abrchar-controls select {
            min-width: 96px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 4px 6px;
            font-size: 12px;
        }

        .abrchar-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .abrchar-progress {
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            padding: 8px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        .abrchar-summary-box {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            padding: 8px;
            font-size: 12px;
            color: var(--text-primary);
        }

        .abrchar-report-box {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            padding: 8px;
            font-size: 12px;
            color: var(--text-primary);
            white-space: pre-wrap;
            max-height: 260px;
            overflow: auto;
        }

        .abrchar-downloads {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .abrchar-ruler-wrap {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            padding: 8px;
        }

        .abrchar-ruler-head {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .abrchar-ruler {
            position: relative;
            height: 124px;
            overflow: visible;
        }

        .abrchar-ruler-track {
            position: absolute;
            left: 0;
            right: 0;
            top: 70px;
            height: 2px;
            background: var(--border-color);
        }

        .abrchar-ruler-marker {
            position: absolute;
            top: 18px;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 2;
        }

        .abrchar-ruler-line {
            width: 2px;
            margin-top: 14px;
            height: calc(54px + (var(--label-lane, 0) * 16px));
            margin-left: auto;
            margin-right: auto;
            background: #64748b;
        }

        .abrchar-ruler-marker.variant .abrchar-ruler-line { background: #64748b; }
        .abrchar-ruler-marker.limit .abrchar-ruler-line { background: #f59e0b; }
        .abrchar-ruler-marker.throughput .abrchar-ruler-line { background: #14b8a6; }
        .abrchar-ruler-marker.wire-active-1s .abrchar-ruler-line { background: #059669; }
        .abrchar-ruler-marker.wire-throughput .abrchar-ruler-line { background: #2563eb; }
        .abrchar-ruler-marker.player-estimate .abrchar-ruler-line { background: #0ea5e9; }
        .abrchar-ruler-marker.top-range .abrchar-ruler-line { background: #dc2626; }
        .abrchar-ruler-marker.current-variant { z-index: 5; }
        .abrchar-ruler-marker.current-variant .abrchar-ruler-line {
            background: #7c3aed;
            width: 4px;
            margin-top: 14px;
            height: calc(60px + (var(--label-lane, 0) * 16px));
            box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.2);
        }

        .abrchar-ruler-label {
            margin-top: calc(2px + (var(--label-lane, 0) * 16px));
            font-size: 10px;
            color: var(--text-primary);
            white-space: nowrap;
            transform: translateY(2px);
        }
        .abrchar-ruler-marker.variant .abrchar-ruler-label {
            position: absolute;
            left: 50%;
            top: calc(-2px - (var(--label-lane, 0) * 16px));
            margin-top: 0;
            transform: translateX(-50%);
            color: #64748b;
        }
        .abrchar-ruler-marker.limit .abrchar-ruler-label { color: #b45309; }
        .abrchar-ruler-marker.throughput .abrchar-ruler-label { color: #0f766e; }
        .abrchar-ruler-marker.wire-active-1s .abrchar-ruler-label { color: #047857; }
        .abrchar-ruler-marker.wire-throughput .abrchar-ruler-label { color: #1d4ed8; }
        .abrchar-ruler-marker.player-estimate .abrchar-ruler-label { color: #0369a1; }
        .abrchar-ruler-marker.top-range .abrchar-ruler-label { color: #b91c1c; }
        .abrchar-ruler-marker.current-variant .abrchar-ruler-label {
            font-weight: 800;
            color: #5b21b6;
        }

        .abrchar-ruler-max,
        .abrchar-ruler-min {
            position: absolute;
            bottom: 0;
            font-size: 10px;
            color: var(--text-secondary);
        }

        .abrchar-ruler-min { left: 0; }
        .abrchar-ruler-max { right: 0; }

        .abrchar-line {
            margin-bottom: 4px;
        }

        .abrchar-event { color: #0f766e; }
        .abrchar-warn { color: #b45309; }
        .abrchar-error { color: #b91c1c; }
        .abrchar-success { color: #166534; }

        /* ── Picture-in-Picture support ─────────────────────────────── */
        #videoPipBtn {
            font-size: 12px;
            padding: 4px 10px;
        }
        #videoPipBtn.active {
            background: #0f766e;
            color: #fff;
            border-color: #0f766e;
        }
        /* When video is in PiP mode, collapse the frame to a thin strip so
           the main page reclaims space for shaping controls and chart. */
        .player-frame.pip-active {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 32px;
            max-height: 32px;
            padding: 0 12px;
            background: rgba(15, 118, 110, 0.08);
            border: 1px dashed rgba(15, 118, 110, 0.4);
            border-radius: 6px;
            color: #0f766e;
            font-size: 12px;
            font-weight: 500;
        }
        .player-frame.pip-active video {
            display: none;
        }
        .player-frame.pip-active::after {
            content: "📺 Video is in Picture-in-Picture";
        }
    </style>
</head>
<body data-boss-no-sidebar data-boss-no-header data-boss-active-page="testing-session">
    <div class="boss-content-wide">
        <div class="page-header">
            <div>
                <div class="page-title" id="pageTitle">Testing Playback</div>
                <div class="page-subtitle" id="playerUrl">Loading…</div>
            </div>
            <div class="panel-badges" id="playerBadges"></div>
            <button class="btn btn-secondary" id="videoPipBtn" title="Pop video into a floating window (Picture-in-Picture)" style="margin-left: 12px;">📺 PiP</button>
        </div>

        <div class="player-card">
            <div class="player-actions">
                <button class="btn btn-secondary" id="retryPlayback">Retry Fetch</button>
                <button class="btn btn-secondary" id="restartPlayback">Restart Playback</button>
                <button class="btn btn-secondary" id="reloadPage">Reload Page</button>
                <label>
                    Player
                    <select id="playerSelect" class="player-select">
                        <option value="auto">Auto</option>
                        <option value="hlsjs">HLS.js</option>
                        <option value="shaka">Shaka</option>
                        <option value="videojs">Video.js</option>
                        <option value="native">Native</option>
                    </select>
                </label>
                <label>
                    <input id="prefer4kToggle" type="checkbox">
                    Allow 4K
                </label>
                <label>
                    <input id="autoRecoveryToggle" type="checkbox">
                    Auto-Recovery
                </label>
            </div>
            <div class="player-frame">
                <video id="player" controls autoplay muted playsinline></video>
            </div>
            <div class="stats-grid">
                <div class="stats-item"><span class="label">State</span><span class="value" id="statState">Idle</span></div>
                <div class="stats-item"><span class="label">Time</span><span class="value" id="statTime">--</span></div>
                <div class="stats-item"><span class="label">Buffered End</span><span class="value" id="statBufferedEnd">--</span></div>
                <div class="stats-item"><span class="label">Buffer Depth</span><span class="value" id="statBufferDepth">--</span></div>
                <div class="stats-item"><span class="label">Live Offset</span><span class="value" id="statLiveOffset">--</span></div>
                <div class="stats-item"><span class="label">Bitrate</span><span class="value" id="statBitrate">--</span></div>
                <div class="stats-item"><span class="label">SSE Missed</span><span class="value" id="statSseMissed">0</span></div>
                <div class="stats-item"><span class="label">Dropped Frames</span><span class="value" id="statDropped">0</span></div>

        // Helper: persist known-4K per session to localStorage so SSE or /api/session gaps
        // won't remove the badge once we've observed 4K for a session.
        function setKnown4kForSession(sessionId) {
            if (!sessionId) return;

            if (!sessionId) return false;

            } catch (e) {}
            try {
                return localStorage.getItem('bossKnown4k:session:' + String(sessionId)) === 'true';

                return false;
            }
        }
        let sseLastRevision = 0;

        let lastRuntimeRateLogged = null;
        let lastStepRateLogged = null;
        let lastStepIndexLogged = null;
        let metricsHeartbeatTimer = null;

        function isTruthySessionFlag(value) {
            if (value === true || value === 1) return true;
            const text = String(value || '').trim().toLowerCase();
            return text === 'true' || text === '1' || text === 'yes' || text === 'on';
        }

        function maybeHandleRemoteRestartRequest(session) {
            if (!session || !currentSessionId) return;
            const requestId = String(session.player_restart_request_id || '').trim();
            const requested = isTruthySessionFlag(session.player_restart_requested);
            if (!requested || !requestId) return;
            if (remoteRestartInFlight) return;
            if (requestId === lastHandledRemoteRestartRequestId) return;

            remoteRestartInFlight = true;
            lastHandledRemoteRestartRequestId = requestId;
            const reasonRaw = String(session.player_restart_request_reason || '').trim();
            const reason = reasonRaw || 'remote_command';
            performPlaybackRestart(reason);

            const handledAt = new Date().toISOString();
            fetch(`/api/session/${currentSessionId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    set: {
                        player_restart_requested: false,
                        player_restart_request_state: 'completed',
                        player_restart_request_handled_at: handledAt,
                        player_restart_request_handled_by: `web:${currentPlayerId || 'unknown'}`,
                        player_restart_request_error: '',
                        player_restart_request_id: requestId
                    },
                    fields: [
                        'player_restart_requested',
                        'player_restart_request_state',
                        'player_restart_request_handled_at',
                        'player_restart_request_handled_by',
                        'player_restart_request_error',
                        'player_restart_request_id'
                    ],
                    base_revision: getSessionBaseRevision()
                })
            }).catch((err) => {
                console.warn('Remote restart ack failed', err);
            }).finally(() => {
                remoteRestartInFlight = false;
            });
        }

        function getSessionSnapshotVersion(session) {
            const uiVersion = Number(session?.ui_state_version);
            if (Number.isFinite(uiVersion) && uiVersion > 0) {
                return uiVersion;
            }
            const controlRevisionMs = Date.parse(String(session?.control_revision || ''));
            if (Number.isFinite(controlRevisionMs) && controlRevisionMs > 0) {
                return controlRevisionMs;
            }
            return 0;
        }

        function mergeSessionsBySnapshotVersion(incomingSessions) {
            const incomingList = Array.isArray(incomingSessions) ? incomingSessions : [];
            const incomingMaxVersion = incomingList.reduce((max, session) => {
                const version = getSessionSnapshotVersion(session);
                return version > max ? version : max;
            }, 0);
            if (
                incomingMaxVersion > 0
                && lastAppliedSnapshotVersion > 0
                && incomingMaxVersion < lastAppliedSnapshotVersion
            ) {
                return lastSessionsList;
            }

            const nextById = new Map();
            incomingList.forEach((incomingSession) => {
                const key = String(incomingSession?.session_id || '');
                if (!key) return;
                const existingSession = lastSessionsList.find((item) => String(item?.session_id || '') === key);
                if (!existingSession) {
                    nextById.set(key, incomingSession);
                    return;
                }
                const incomingVersion = getSessionSnapshotVersion(incomingSession);
                const existingVersion = getSessionSnapshotVersion(existingSession);
                if (incomingVersion === 0 && existingVersion > 0) {
                    nextById.set(key, existingSession);
                } else if (existingVersion === 0 || incomingVersion >= existingVersion) {
                    nextById.set(key, incomingSession);
                } else {
                    nextById.set(key, existingSession);
                }
            });

            if (incomingMaxVersion > lastAppliedSnapshotVersion) {
                lastAppliedSnapshotVersion = incomingMaxVersion;
            }
            return Array.from(nextById.values());
        }

        function getStoredCollapseState(key) {
            try {
                const value = localStorage.getItem(`${collapseStoragePrefix}${key}`);
                if (value === null) return undefined;
                return value === 'true';
            } catch (err) {
                return undefined;
            }
        }

        function setStoredCollapseState(key, value) {
            try {
                localStorage.setItem(`${collapseStoragePrefix}${key}`, value ? 'true' : 'false');
            } catch (err) {
                collapseState.set(key, !!value);
            }
        }

        function applyOpenFoldsFromQuery() {
            let params;
            try {
                params = new URLSearchParams(window.location.search);
            } catch (err) {
                return;
            }
            const raw = params.get('open_folds') || params.get('open') || '';
            if (!raw) return;
            const requested = raw
                .split(',')
                .map((item) => item.trim().toLowerCase())
                .filter(Boolean);
            if (!requested.length) return;
            requested.forEach((section) => {
                collapseState.set(section, true);
                setStoredCollapseState(section, true);
            });
        }

        applyOpenFoldsFromQuery();

        window.TestingSessionUICollapseState = {
            get: (key) => {
                const stored = getStoredCollapseState(key);
                if (typeof stored === 'boolean') return stored;
                if (collapseState.has(key)) return collapseState.get(key);
                return collapseDefaults[key];
            },
            set: (key, value) => {
                collapseState.set(key, !!value);
                setStoredCollapseState(key, value);
            }
        };

        function log(message) {
            const line = document.createElement('div');
            line.textContent = `${new Date().toLocaleTimeString()} ${message}`;
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function sendPlayerStateChange(nextState) {
            if (!nextState || nextState === lastPlayerState) return;
            const previous = lastPlayerState;
            lastPlayerState = nextState;
            const extra = {
                player_metrics_state: nextState,
                player_metrics_state_to: nextState
            };
            if (previous !== null && previous !== undefined) {
                extra.player_metrics_state_from = previous;
            }
            sendSessionMetrics('state_change', extra);
        }

        function logPatternDebug(message, data) {
            const payload = data ? ` ${JSON.stringify(data)}` : '';
            console.warn(`[pattern-debug] ${new Date().toISOString()} ${message}${payload}`);
        }

        function updateSseMissedUi() {
            if (!sseMissedEl) return;
            sseMissedEl.textContent = String(sseMissedTotal);
        }

        function parseSessionsStreamPayload(event) {
            const data = JSON.parse(event.data);
            if (Array.isArray(data)) {
                return { sessions: data, revision: Number(event.lastEventId || 0), dropped: 0 };
            }
            const sessions = Array.isArray(data.sessions) ? data.sessions : [];
            const revision = Number(data.revision || event.lastEventId || 0);
            const dropped = Number(data.dropped || 0);
            return { sessions, revision, dropped };
        }

        function logHttpFailure(source, status, url) {
            if (!status) return;
            const parts = [source, 'HTTP', status];
            if (url) {
                parts.push(url);
            }
            log(parts.join(' '));
            if (Number(status) === 429) {
                showStreamAccessAlert(url);
            }
        }

        let streamLimitAlertShown = false;

        function showStreamAccessAlert(url) {
            const banner = document.getElementById('streamAccessBanner');
            const suffix = url ? ` (${url})` : '';
            const message = `Stream start blocked: external users are limited to 2 active test streams. Close an existing stream and retry${suffix}.`;
            if (banner) {
                banner.textContent = message;
                banner.style.display = 'block';
            }
            if (!streamLimitAlertShown) {
                streamLimitAlertShown = true;
                alert('You reached the external limit of 2 active test streams. Close one and retry.');
            }
        }

        function clearStreamAccessAlert() {
            const banner = document.getElementById('streamAccessBanner');
            if (banner) {
                banner.style.display = 'none';
                banner.textContent = '';
            }
        }

        function toMetricNumber(value) {
            if (value === null || value === undefined) return null;
            const numeric = Number(value);
            if (!Number.isFinite(numeric)) return null;
            return Math.round(numeric * 100) / 100;
        }

        function toMetricSeconds(value) {
            if (value === null || value === undefined) return null;
            const numeric = Number(value);
            if (!Number.isFinite(numeric)) return null;
            return Math.round(numeric * 1000) / 1000;
        }
        function bpsToMbps(value) {
            const numeric = Number(value);
            if (!Number.isFinite(numeric) || numeric <= 0) return null;
            return Math.round((numeric / 1000000) * 100) / 100;
        }

        function formatResolution(width, height) {
            const w = Number(width);
            const h = Number(height);
            if (!Number.isFinite(w) || !Number.isFinite(h) || w <= 0 || h <= 0) return null;
            return `${Math.round(w)}x${Math.round(h)}`;
        }

        function detectBrowserFamily() {
            const ua = String(navigator.userAgent || '').toLowerCase();
            if (!ua) return null;
            const isSafari = ua.includes('safari')
                && !ua.includes('chrome')
                && !ua.includes('crios')
                && !ua.includes('fxios')
                && !ua.includes('edgios')
                && !ua.includes('opr/')
                && !ua.includes('android');
            if (isSafari) return 'safari';
            if (ua.includes('firefox') || ua.includes('fxios')) return 'firefox';
            if (ua.includes('edg') || ua.includes('edgios')) return 'edge';
            if (ua.includes('chrome') || ua.includes('crios')) return 'chrome';
            return 'other';
        }

        function isNativeSafariPlaybackMode() {
            const browser = detectBrowserFamily();
            if (browser !== 'safari') return false;
            const playerType = resolvePlayerChoice(currentUrl, getPlayerChoice());
            return playerType === 'native';
        }

        function parseVariantResolution(resolution) {
            const value = String(resolution || '').trim().toLowerCase();
            if (!value) return { width: null, height: null };
            const dimensions = value.match(/(\d{3,4})\s*x\s*(\d{3,4})/i);
            if (dimensions) {
                return {
                    width: Number(dimensions[1]),
                    height: Number(dimensions[2])
                };
            }
            const progressive = value.match(/(\d{3,4})\s*p$/i);
            if (progressive) {
                return {
                    width: null,
                    height: Number(progressive[1])
                };
            }
            const numeric = Number(value);
            if (Number.isFinite(numeric) && numeric > 0) {
                return {
                    width: null,
                    height: numeric
                };
            }
            return { width: null, height: null };
        }

        function inferNativeRenditionBandwidth(session, videoEl) {
            const variants = Array.isArray(session?.manifest_variants) ? session.manifest_variants : [];
            if (!variants.length) return null;
            const videoWidth = Number(videoEl?.videoWidth || 0);
            const videoHeight = Number(videoEl?.videoHeight || 0);
            if (!Number.isFinite(videoHeight) || videoHeight <= 0) return null;

            let best = null;
            variants.forEach((variant) => {
                const bandwidth = Number(variant?.bandwidth || 0);
                if (!Number.isFinite(bandwidth) || bandwidth <= 0) return;
                const parsed = parseVariantResolution(variant?.resolution);
                const height = Number(parsed.height || 0);
                const width = Number(parsed.width || 0);
                if (!Number.isFinite(height) || height <= 0) return;

                const heightDelta = Math.abs(height - videoHeight);
                const hasWidth = Number.isFinite(width) && width > 0 && Number.isFinite(videoWidth) && videoWidth > 0;
                const widthDelta = hasWidth ? Math.abs(width - videoWidth) : 0;
                const score = (heightDelta * 10000) + widthDelta;

                if (!best || score < best.score || (score === best.score && bandwidth > best.bandwidth)) {
                    best = { score, bandwidth };
                }
            });

            return best ? best.bandwidth : null;
        }

        function markPlaybackStart() {
            playbackStartAt = performance.now();
            videoFirstFrameS = null;
            videoPlayingTimeS = null;
            firstFrameReported = false;
            playingReported = false;
            profileShiftCount = 0;
            lastRenditionMbps = null;
            playerLoopCount = 0;
        }

        function extractLoopCountFromManifestText(manifestText) {
            const text = String(manifestText || '');
            if (!text) return null;
            const regex = /#EXT-X-DATERANGE:[^\n]*X-LOOP-COUNT\s*=\s*"?(\d+)"?/ig;
            let match = null;
            let loopCount = null;
            while ((match = regex.exec(text)) !== null) {
                const parsed = Number(match[1]);
                if (Number.isFinite(parsed)) {
                    loopCount = Math.max(0, Math.round(parsed));
                }
            }
            return loopCount;
        }

        function applyDetectedPlayerLoopCount(nextCount, source = 'hls_daterange') {
            const numeric = Number(nextCount);
            if (!Number.isFinite(numeric) || numeric < 0) return;
            const normalized = Math.max(0, Math.round(numeric));
            const previous = Math.max(0, Math.round(Number(playerLoopCount || 0)));
            const increment = Math.max(0, normalized - previous);
            if (normalized === previous) return;
            playerLoopCount = normalized;
            console.log('[HLS LOOP MARKER]', {
                source,
                previous,
                current: normalized,
                increment
            });
            sendSessionMetrics('loop_marker', {
                player_metrics_loop_count_player: normalized,
                player_metrics_loop_count_increment: increment,
                player_metrics_loop_source: source
            });
        }

        async function detectLoopCountFromHlsLevel(data) {
            const details = data && data.details ? data.details : null;
            const mediaUrl = details && details.url ? details.url : null;
            if (!mediaUrl) return;
            try {
                const response = await fetch(mediaUrl, { cache: 'no-store' });
                if (!response.ok) return;
                const manifestText = await response.text();
                const loopCount = extractLoopCountFromManifestText(manifestText);
                if (loopCount === null || loopCount === undefined) return;
                applyDetectedPlayerLoopCount(loopCount, 'hls_daterange');
            } catch (err) {
                console.warn('HLS loop marker fetch failed', err);
            }
        }

        function buildMetricsPayload(eventType, extra = {}) {
            const buffered = video.buffered;
            const seekable = video.seekable;
            const current = Number(video.currentTime || 0);
            const displayResolution = formatResolution(video.clientWidth, video.clientHeight);
            const videoResolution = formatResolution(video.videoWidth, video.videoHeight);
            let bufferedEnd = null;
            let bufferDepth = 0;
            let seekableEnd = null;
            if (buffered && buffered.length > 0) {
                const end = buffered.end(buffered.length - 1);
                bufferedEnd = toMetricSeconds(end);
                bufferDepth = toMetricSeconds(Math.max(0, end - current));
            }
            if (seekable && seekable.length > 0) {
                const end = seekable.end(seekable.length - 1);
                seekableEnd = toMetricSeconds(end);
            }
            const liveOffset = (seekableEnd !== null)
                ? toMetricSeconds(Math.max(0, seekableEnd - current))
                : null;
            const quality = video.getVideoPlaybackQuality ? video.getVideoPlaybackQuality() : null;
            const totalFrames = quality ? Number(quality.totalVideoFrames || 0) : null;
            const droppedFrames = quality ? Number(quality.droppedVideoFrames || 0) : null;
            const displayedFrames = (totalFrames !== null && droppedFrames !== null)
                ? Math.max(0, totalFrames - droppedFrames)
                : null;
            const base = {
                player_metrics_source: 'web',
                player_metrics_browser_family: detectBrowserFamily(),
                player_metrics_playback_engine: resolvePlayerChoice(currentUrl, getPlayerChoice()),
                player_metrics_last_event: eventType,
                player_metrics_trigger_type: eventType,
                player_metrics_last_event_at: new Date().toISOString(),
                player_metrics_event_time: new Date().toISOString(),
                player_metrics_state: video.paused ? 'paused' : 'playing',
                player_metrics_position_s: toMetricSeconds(current),
                player_metrics_playback_rate: toMetricNumber(video.playbackRate || 0),
                player_metrics_buffer_depth_s: bufferDepth,
                player_metrics_buffer_end_s: bufferedEnd,
                player_metrics_seekable_end_s: seekableEnd,
                player_metrics_live_edge_s: seekableEnd,
                player_metrics_live_offset_s: liveOffset,
                player_metrics_display_resolution: displayResolution,
                player_metrics_video_resolution: videoResolution,
                player_metrics_video_first_frame_time_s: toMetricSeconds(videoFirstFrameS),
                player_metrics_video_start_time_s: toMetricSeconds(videoPlayingTimeS),
                player_metrics_video_bitrate_mbps: toMetricNumber(currentRenditionMbps),
                player_metrics_network_bitrate_mbps: toMetricNumber(playerEstimatedMbps),
                player_auto_recovery_enabled: autoRecoveryEnabled,
                player_restarts: Math.max(0, Math.round(playerRestartCount || 0)),
                player_metrics_profile_shift_count: Math.max(0, Math.round(profileShiftCount || 0)),
                player_metrics_loop_count_player: Math.max(0, Math.round(Number(playerLoopCount || 0))),
                player_metrics_loop_count_increment: 0,
                player_metrics_frames_displayed: toMetricNumber(displayedFrames),
                player_metrics_total_video_frames: toMetricNumber(totalFrames),
                player_metrics_dropped_frames: droppedFrames,
                player_metrics_stall_count: stallCount,
                player_metrics_stall_time_s: toMetricSeconds(stallTimeS),
                player_metrics_last_stall_time_s: toMetricSeconds(lastStallDurationS)
            };
            const merged = { ...base, ...extra };
            const compact = {};
            Object.entries(merged).forEach(([key, value]) => {
                if (value === null || value === undefined || value === '') return;
                compact[key] = value;
            });
            return compact;
        }

        function performPlaybackRestart(reason = 'manual') {
            if (!currentUrl) return;
            const nowMs = Date.now();
            playerRestartCount = Math.max(0, Number(playerRestartCount || 0)) + 1;
            autoRecoveryLastRestartAtMs = nowMs;
            autoRecoveryZeroStartedAtMs = null;
            log(`RESTART: playback (${reason})`);
            sendSessionMetrics('restart', {
                player_restarts: playerRestartCount,
                player_metrics_restart_reason: String(reason || 'manual')
            });
            resetPlayback();
            loadStream(currentUrl);
        }

        function sendSessionMetrics(eventType, extra = {}) {
            if (!currentSessionId) return;
            const payload = buildMetricsPayload(eventType, extra);
            const fields = Object.keys(payload);
            if (!fields.length) return;
            fetch(`/api/session/${currentSessionId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    set: payload,
                    fields,
                    base_revision: getSessionBaseRevision()
                })
            }).catch(err => console.warn('Metrics patch failed', err));
        }

        function scheduleMetricsHeartbeat() {
            if (metricsHeartbeatTimer) {
                clearInterval(metricsHeartbeatTimer);
            }
            metricsHeartbeatTimer = setInterval(() => {
                sendSessionMetrics('heartbeat');
            }, 1000);
        }

        function normalizeBitrateAxisMaxMode(value) {
            const normalized = String(value || 'auto').toLowerCase();
            return ['auto', '5', '10', '20', '30', '40', '50'].includes(normalized) ? normalized : 'auto';
        }

        function createTestingPlayerId() {
            if (window.BOSSNav && typeof window.BOSSNav.createPlayerId === 'function') {
                return window.BOSSNav.createPlayerId();
            }
            return Math.random().toString(36).slice(2, 10);
        }

        function getProxyPort() {
            const uiPort = window.location.port || '30000';
            return uiPort.slice(0, -3) + '081';
        }

        function normalizeTestingBase(url) {
            if (window.BOSSNav && typeof window.BOSSNav.normalizeTestingBaseUrl === 'function') {
                return window.BOSSNav.normalizeTestingBaseUrl(url);
            }
            const parsed = new URL(url, window.location.origin);
            parsed.port = getProxyPort();
            return parsed.toString();
        }

        function buildTestingUrl(url, playerId) {
            if (window.BOSSNav && typeof window.BOSSNav.buildTestingUrl === 'function') {
                return window.BOSSNav.buildTestingUrl(url, playerId);
            }
            const base = normalizeTestingBase(url);
            const separator = base.includes('?') ? '&' : '?';
            return `${base}${separator}player_id=${encodeURIComponent(playerId)}`;
        }

        function copyTestingUrl(url) {
            if (!url) return;
            if (!navigator.clipboard) {
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                return;
            }
            navigator.clipboard.writeText(url).catch(err => console.warn('Clipboard write failed', err));
        }

        function openTestingWindow(url) {
            if (!url) return;
            let baseUrl = url;
            try {
                const parsed = new URL(url, window.location.origin);
                parsed.searchParams.delete('player_id');
                baseUrl = parsed.toString();
            } catch (err) {
                console.warn('Failed to normalize testing URL', err);
            }
            const playerId = createTestingPlayerId();
            const testingUrl = buildTestingUrl(baseUrl, playerId);
            const pageUrl = `/dashboard/testing-session.html?player_id=${encodeURIComponent(playerId)}&url=${encodeURIComponent(testingUrl)}`;
            const popup = window.open(pageUrl, '_blank');
            if (!popup) {
                alert('Popup blocked. Allow popups for this site.');
            }
        }

        function openHlsjsDemo(url) {
            if (!url || url.includes('.mpd')) {
                alert('HLS.js demo only supports HLS (.m3u8).');
                return;
            }
            const demoUrl = `https://hlsjs.video-dev.org/demo/?src=${encodeURIComponent(url)}`;
            const popup = window.open(demoUrl, '_blank');
            if (!popup) {
                alert('Popup blocked. Allow popups for this site.');

        function extractHlsHttpFailure(data) {
            const response = data && data.response ? data.response : null;
            const network = data && data.networkDetails ? data.networkDetails : null;
            const status = (response && (response.code || response.status)) ||
                (response && response.xhr && response.xhr.status) ||
                (network && network.status) ||
                null;
            const url = (response && (response.url || response.responseURL)) ||
                (response && response.xhr && response.xhr.responseURL) ||
                (data && data.url) ||
                (data && data.frag && data.frag.url) ||
                null;
            return { status, url };
        }

        function extractShakaHttpFailure(detail) {
            if (!detail) return { status: null, url: null };
            let status = null;
            let url = null;
            if (Array.isArray(detail.data)) {
                detail.data.forEach(item => {
                    if (typeof item === 'number' && item >= 400 && item <= 599) {
                        status = item;
                    }
                    if (typeof item === 'string' && item.startsWith('http')) {
                        url = item;
                    }
                });
                if (!url && typeof detail.data[1] === 'string') {
                    url = detail.data[1];
                }
            }
            return { status, url };
        }

        function scheduleAutoRetry(reason) {
            if (!currentUrl) return;
            if (autoRetryCount >= 2) return;
            if (autoRetryTimer) return;
            autoRetryCount += 1;
            const delay = 1000 * autoRetryCount;
            log(`AUTO RETRY (${autoRetryCount}): ${reason}`);
            autoRetryTimer = setTimeout(() => {
                autoRetryTimer = null;
                retryPlayback();
            }, delay);
        }

        function clearLiveOffsetSeekTimer() {
            if (!liveOffsetSeekTimer) return;
            clearInterval(liveOffsetSeekTimer);
            liveOffsetSeekTimer = null;
        }

        function tryApplyLiveOffset(reason = 'startup') {
            if (!(Number.isFinite(desiredLiveOffsetSeconds) && desiredLiveOffsetSeconds > 0)) return false;
            if (!video || !video.seekable || video.seekable.length <= 0) return false;
            const liveEdge = Number(video.seekable.end(video.seekable.length - 1));
            if (!Number.isFinite(liveEdge)) return false;
            const target = Math.max(0, liveEdge - desiredLiveOffsetSeconds);
            if (!Number.isFinite(target)) return false;
            try {
                video.currentTime = target;
            } catch (err) {
                return false;
            }
            log(`LIVE OFFSET: applied ${desiredLiveOffsetSeconds.toFixed(1)}s behind live (${reason})`);
            return true;
        }

        function scheduleLiveOffsetSeek(reason = 'startup') {
            clearLiveOffsetSeekTimer();
            if (!(Number.isFinite(desiredLiveOffsetSeconds) && desiredLiveOffsetSeconds > 0)) return;
            liveOffsetSeekDeadlineMs = Date.now() + 20000;
            const tick = () => {
                if (tryApplyLiveOffset(reason)) {
                    clearLiveOffsetSeekTimer();
                    return;
                }
                if (Date.now() >= liveOffsetSeekDeadlineMs) {
                    log(`LIVE OFFSET: unable to apply ${desiredLiveOffsetSeconds.toFixed(1)}s (seekable not ready)`);
                    clearLiveOffsetSeekTimer();
                }
            };
            tick();
            if (!liveOffsetSeekTimer) {
                liveOffsetSeekTimer = setInterval(tick, 250);
            }
        }

        function getParams() {
            const params = new URLSearchParams(window.location.search);
            let url = params.get('url') || '';
            if (!url) {
                url = localStorage.getItem('bossSelectedUrl') || '';
            }
            if (url && window.BOSSNav && typeof window.BOSSNav.normalizeTestingBaseUrl === 'function') {
                try {
                    url = window.BOSSNav.normalizeTestingBaseUrl(url);
                } catch (err) {
                    console.warn('Failed to normalize Testing Playback URL', err);
                }
            }
            let playerId = params.get('player_id') || '';
            if (!playerId) {
                playerId = localStorage.getItem('bossTestPlaybackPlayerId') || '';
            }
            if (!playerId) {
                if (window.BOSSNav && typeof window.BOSSNav.createPlayerId === 'function') {
                    playerId = window.BOSSNav.createPlayerId();
                } else {
                    playerId = Math.random().toString(36).slice(2, 10);
                }
                try {
                    localStorage.setItem('bossTestPlaybackPlayerId', playerId);
                } catch (err) {
                    console.warn('Failed to persist Testing Playback player id', err);
                }
            }
            if (url) {
                try {
                    const parsed = new URL(url, window.location.origin);
                    if (!parsed.searchParams.get('player_id') && playerId) {
                        parsed.searchParams.set('player_id', playerId);
                    }
                    url = parsed.toString();
                } catch (err) {
                    console.warn('Failed to attach player id to URL', err);
                }
                try {
                    localStorage.setItem('bossSelectedUrl', url);
                } catch (err) {
                    console.warn('Failed to persist selected url', err);
                }
            }
            let liveOffsetSeconds = Number(params.get('live_offset_s') || '0');
            if (!Number.isFinite(liveOffsetSeconds) || liveOffsetSeconds < 0) {
                liveOffsetSeconds = 0;
            }
            return {
                playerId: playerId,
                url: url,
                player: params.get('player') || '',
                autoRecovery: params.get('auto_recovery'),
                liveOffsetSeconds: liveOffsetSeconds
            };
        }

        function setBadges(isDash, playerType, groupId, codecLabel, codecClass, segmentLabel, segmentClass) {
            const badges = document.getElementById('playerBadges');
            badges.innerHTML = '';
            const protocol = document.createElement('span');
            protocol.className = `panel-badge ${isDash ? 'dash' : 'hls'}`;
            protocol.textContent = isDash ? 'DASH' : 'HLS';
            const player = document.createElement('span');
            const label = playerType === 'hlsjs' ? 'HLS.js'
                : playerType === 'shaka' ? 'Shaka'
                : playerType === 'videojs' ? 'Video.js'
                : playerType === 'native' ? 'Native'
                : 'Auto';
            const cls = playerType === 'hlsjs' ? 'hlsjs'
                : playerType === 'shaka' ? 'shaka'
                : playerType === 'videojs' ? 'videojs'
                : playerType === 'native' ? 'native'
                : (isDash ? 'shaka' : 'hlsjs');
            player.className = `panel-badge ${cls}`;
            player.textContent = label;
            badges.appendChild(protocol);
            badges.appendChild(player);

            // Codec badge
            if (codecLabel) {
                const codec = document.createElement('span');
                codec.className = `panel-badge ${codecClass || ''}`.trim();
                codec.textContent = codecLabel;
                badges.appendChild(codec);
            }

            // Segment badge (LL / 2S / 6S)
            if (segmentLabel) {
                const seg = document.createElement('span');
                seg.className = `panel-badge ${segmentClass || ''}`.trim();
                seg.textContent = segmentLabel;
                badges.appendChild(seg);
            }

            // 4K/UHD badge: prefer authoritative session metadata or persisted known-4K state.
            try {
                const UHD_HEIGHT_THRESHOLD = 2160;
                let show4k = false;
                // If the server session metadata indicates 4K, show it.
                if (lastServerSession) {
                    try {
                        const mh = Number(lastServerSession.max_height || 0);
                        if (Number.isFinite(mh) && mh >= UHD_HEIGHT_THRESHOLD) show4k = true;
                    } catch (e) {}
                    try {
                        const mr = String(lastServerSession.max_resolution || '').trim();
                        const m1 = mr.match(/(\d{3,4})x(\d{3,4})/i);
                        if (m1 && Number(m1[2]) >= UHD_HEIGHT_THRESHOLD) show4k = true;
                        const m2 = mr.match(/(\d{3,4})p$/i);
                        if (m2 && Number(m2[1]) >= UHD_HEIGHT_THRESHOLD) show4k = true;
                        const m3 = mr.match(/^(\d{3,4})$/);
                        if (m3 && Number(m3[1]) >= UHD_HEIGHT_THRESHOLD) show4k = true;
                    } catch (e) {}
                }

                // If we've previously recorded this session/content as 4K, prefer that
                if (!show4k && currentSessionId && isKnown4kForSession(String(currentSessionId))) {
                    show4k = true;
                }

                if (show4k) {
                    const badge4k = document.createElement('span');
                    badge4k.className = 'panel-badge uhd';
                    badge4k.textContent = '4K';
                    badges.appendChild(badge4k);
                }
            } catch (e) {}

            if (groupId) {
                const group = document.createElement('span');
                group.className = 'panel-badge group';
                group.textContent = groupId;
                badges.appendChild(group);
            }
        }

        // Derive codec and segment badges from a URL or session metadata
        function deriveCodecAndSegment(url, session) {
            let codec = null;
            let codecClass = '';
            let segment = null;
            let segmentClass = '';

            const source = String(url || session?.master_manifest_url || session?.manifest_url || '').toLowerCase();
            if (source.includes('_h264') || source.includes('h264')) {
                codec = 'H264'; codecClass = 'h264';
            } else if (source.includes('_hevc') || source.includes('hevc') || source.includes('h265')) {
                codec = 'HEVC'; codecClass = 'hevc';
            } else if (source.includes('_av1') || source.includes('av1')) {
                codec = 'AV1'; codecClass = 'av1';
            }

            if (source.includes('master_2s') || source.includes('manifest_2s') || source.includes('_2s')) {
                segment = '2S'; segmentClass = 's2';
            } else if (source.includes('master_6s') || source.includes('manifest_6s') || source.includes('_6s')) {
                segment = '6S'; segmentClass = 's6';
            } else {
                segment = 'LL'; segmentClass = 'll';
            }

            return { codec, codecClass, segment, segmentClass };
        }

        function update4kBadge() {
            const badges = document.getElementById('playerBadges');
            if (!badges || !video) return;

            // Prefer session metadata (max_height / max_resolution) when available.
            // If metadata indicates 4K/UHD, keep the badge persistent regardless of SSE or
            // transient video height changes. Fall back to video.videoHeight when no
            // metadata is available.
            function metadataIndicates4k(session) {
                if (!session) return null;
                // max_height may be numeric
                if (session.max_height && Number(session.max_height)) {
                    if (Number(session.max_height) >= UHD_HEIGHT_THRESHOLD) return true;
                }
                // max_resolution could be '3840x2160' or '2160p' or '2160'
                if (session.max_resolution && typeof session.max_resolution === 'string') {
                    const s = session.max_resolution.trim();
                    const m1 = s.match(/(\d+)x(\d+)/i);
                    if (m1) {
                        const h = Number(m1[2]);
                        if (Number.isFinite(h) && h >= UHD_HEIGHT_THRESHOLD) return true;
                    }
                    const m2 = s.match(/(\d+)p$/i);
                    if (m2) {
                        const h = Number(m2[1]);
                        if (Number.isFinite(h) && h >= UHD_HEIGHT_THRESHOLD) return true;
                    }
                    const m3 = s.match(/^(\d+)$/);
                    if (m3) {
                        const h = Number(m3[1]);
                        if (Number.isFinite(h) && h >= UHD_HEIGHT_THRESHOLD) return true;
                    }
                }
                return null;
            }

            const existing4kBadge = badges.querySelector('.panel-badge.uhd');

            // Prefer server metadata or persisted state. Don't remove the badge
            // simply because runtime videoHeight changed — once 4K is observed or
            // declared it should remain until content metadata changes.
            let metaHas4k = false;
            try {
                if (lastServerSession) {
                    const mh = Number(lastServerSession.max_height || 0);
                    if (Number.isFinite(mh) && mh >= UHD_HEIGHT_THRESHOLD) metaHas4k = true;
                    const mr = String(lastServerSession.max_resolution || '').trim();
                    const m1 = mr.match(/(\d{3,4})x(\d{3,4})/i);
                    if (m1 && Number(m1[2]) >= UHD_HEIGHT_THRESHOLD) metaHas4k = true;
                    const m2 = mr.match(/(\d{3,4})p$/i);
                    if (m2 && Number(m2[1]) >= UHD_HEIGHT_THRESHOLD) metaHas4k = true;
                    const m3 = mr.match(/^(\d{3,4})$/);
                    if (m3 && Number(m3[1]) >= UHD_HEIGHT_THRESHOLD) metaHas4k = true;
                }
            } catch (e) {}

            if (metaHas4k && currentSessionId) setKnown4kForSession(currentSessionId);

            const persistent = currentSessionId && isKnown4kForSession(String(currentSessionId));

            // If metadata/persistence indicates 4K, ensure badge present and do nothing else.
            if ((metaHas4k || persistent) && !existing4kBadge) {
                const badge4k = document.createElement('span');
                badge4k.className = 'panel-badge uhd';
                badge4k.textContent = '4K';
                badges.appendChild(badge4k);
                return;
            }

            // Fallback: if no authoritative metadata/persistence, use runtime height to
            // detect 4K and then persist it so it behaves like metadata going forward.
            const runtime4k = (video.videoHeight || 0) >= UHD_HEIGHT_THRESHOLD;
            if (runtime4k && !existing4kBadge) {
                if (currentSessionId) setKnown4kForSession(currentSessionId);
                const badge4k = document.createElement('span');
                badge4k.className = 'panel-badge uhd';
                badge4k.textContent = '4K';
                badges.appendChild(badge4k);
            }
        }

        function attachVideoEvents() {
            video.addEventListener('loadeddata', () => {
                if (!playbackStartAt || firstFrameReported) return;
                const elapsed = Math.round(((performance.now() - playbackStartAt) / 1000) * 1000) / 1000;
                videoFirstFrameS = elapsed;
                firstFrameReported = true;
                sendSessionMetrics('video_first_frame', {
                    player_metrics_video_first_frame_time_s: elapsed
                });
            });
            video.addEventListener('timeupdate', () => {
                if (!playbackStartAt || playingReported) return;
                if (video.paused) return;
                if (video.currentTime < 0.1) return;
                const elapsed = Math.round(((performance.now() - playbackStartAt) / 1000) * 1000) / 1000;
                videoPlayingTimeS = elapsed;
                playingReported = true;
                sendSessionMetrics('video_start_time', {
                    player_metrics_video_start_time_s: elapsed
                });
            });
            video.addEventListener('waiting', () => {
                sendPlayerStateChange('buffering');
                if (firstFrameReported && !stallStartAt) {
                    stallStartAt = Date.now();
                    stallCount += 1;
                    document.getElementById('statStalls').textContent = `${stallCount}`;
                    sendSessionMetrics('stall_start');
                }
                log('STALL: waiting');
            });
            video.addEventListener('stalled', () => {
                sendPlayerStateChange('buffering');
                if (firstFrameReported && !stallStartAt) {
                    stallStartAt = Date.now();
                    stallCount += 1;
                    document.getElementById('statStalls').textContent = `${stallCount}`;
                    sendSessionMetrics('stall_start');
                }
                log('STALL: stalled');
            });
            video.addEventListener('pause', () => {
                sendPlayerStateChange('paused');
                log('PAUSED');
            });
            video.addEventListener('ended', () => {
                sendPlayerStateChange('ended');
                log('ENDED');
            });
            video.addEventListener('error', () => {
                const err = video.error;
                const code = err && err.code ? ` code=${err.code}` : '';
                log(`ERROR: video error${code}`);
                sendSessionMetrics('error', {
                    player_metrics_error: `video error${code}`.trim(),
                    player_metrics_error_code: err && err.code ? err.code : null
                });
                scheduleAutoRetry('video error');
            });
            video.addEventListener('playing', () => {
                sendPlayerStateChange('playing');
                if (stallStartAt) {
                    const duration = (Date.now() - stallStartAt) / 1000;
                    stallStartAt = null;
                    lastStallDurationS = Math.round(duration * 100) / 100;
                    stallTimeS = Math.round((stallTimeS + duration) * 100) / 100;
                    sendSessionMetrics('stall_end', {
                        player_metrics_last_stall_time_s: lastStallDurationS
                    });
                }
                log('PLAYING');
            });
        }

        function updateStats() {
            const buffered = video.buffered;
            const current = video.currentTime || 0;
            let bufferedEnd = '--';
            let bufferDepth = '--';
            const bitrateEl = document.getElementById('statBitrate');
            if (buffered && buffered.length > 0) {
                const end = buffered.end(buffered.length - 1);
                bufferedEnd = `${end.toFixed(2)}s`;
                bufferDepth = `${Math.max(0, end - current).toFixed(2)}s`;
            }
            document.getElementById('statState').textContent = video.paused ? 'Paused' : (video.muted ? 'Playing (Muted)' : 'Playing');
            document.getElementById('statTime').textContent = `${current.toFixed(2)}s`;
            document.getElementById('statBufferedEnd').textContent = bufferedEnd;
            document.getElementById('statBufferDepth').textContent = bufferDepth;
            document.getElementById('statLiveOffset').textContent = '--';

            const quality = video.getVideoPlaybackQuality ? video.getVideoPlaybackQuality() : null;
            if (quality) {
                document.getElementById('statDropped').textContent = `${quality.droppedVideoFrames || 0}`;
            }

            if (hlsInstance && hlsInstance.currentLevel >= 0 && hlsInstance.levels[hlsInstance.currentLevel]) {
                const bitrate = hlsInstance.levels[hlsInstance.currentLevel].bitrate;
                bitrateEl.textContent = `${Math.round(bitrate / 1000)} kbps`;
                currentRenditionMbps = bpsToMbps(bitrate);
                playerEstimatedMbps = bpsToMbps(hlsInstance.bandwidthEstimate);
            } else if (shakaPlayer) {
                const stats = shakaPlayer.getStats();
                if (stats && stats.estimatedBandwidth) {
                    bitrateEl.textContent = `${Math.round(stats.estimatedBandwidth / 1000)} kbps`;
                    playerEstimatedMbps = bpsToMbps(stats.estimatedBandwidth);
                    if (stats.streamBandwidth) {
                        currentRenditionMbps = bpsToMbps(stats.streamBandwidth);
                    }
                }
            } else if (videojsPlayer) {
                const tech = videojsPlayer.tech && videojsPlayer.tech(true);
                const vhs = tech && tech.vhs ? tech.vhs : (videojsPlayer.vhs || null);
                const bandwidth = vhs && vhs.bandwidth ? vhs.bandwidth : null;
                if (bandwidth) {
                    bitrateEl.textContent = `${Math.round(bandwidth / 1000)} kbps`;
                    playerEstimatedMbps = bpsToMbps(bandwidth);
                    const media = vhs.playlists && vhs.playlists.media ? vhs.playlists.media() : null;
                    const rendition = media && media.attributes ? media.attributes.BANDWIDTH : null;
                    currentRenditionMbps = bpsToMbps(rendition);
                }
            } else {
                playerEstimatedMbps = null;
                const inferredRenditionBps = isNativeSafariPlaybackMode()
                    ? inferNativeRenditionBandwidth(lastServerSession, video)
                    : null;
                if (Number.isFinite(inferredRenditionBps) && inferredRenditionBps > 0) {
                    currentRenditionMbps = bpsToMbps(inferredRenditionBps);
                    bitrateEl.textContent = `~${Math.round(inferredRenditionBps / 1000)} kbps`;
                } else {
                    currentRenditionMbps = null;
                    bitrateEl.textContent = '--';
                }
            }

            if (currentRenditionMbps !== null && currentRenditionMbps !== undefined) {
                const numeric = Number(currentRenditionMbps);
                if (Number.isFinite(numeric)) {
                    if (lastRenditionMbps !== null && lastRenditionMbps !== undefined) {
                        const prev = Number(lastRenditionMbps);
                        if (numeric !== prev) {
                            profileShiftCount = Math.max(0, Number(profileShiftCount || 0)) + 1;
                            sendSessionMetrics('video_bitrate_change', {
                                player_metrics_video_bitrate_from_mbps: Math.round(prev * 100) / 100,
                                player_metrics_video_bitrate_to_mbps: Math.round(numeric * 100) / 100,
                                player_metrics_profile_shift_count: Math.max(0, Math.round(profileShiftCount || 0))
                            });
                        }
                        const delta = numeric - prev;
                        const now = Date.now();
                        if (Math.abs(delta) >= 0.1 && now - lastRateShiftAt > 2000) {
                            const direction = delta > 0 ? 'rate_shift_up' : 'rate_shift_down';
                            sendSessionMetrics(direction, {
                                player_metrics_rate_from_mbps: Math.round(prev * 100) / 100,
                                player_metrics_rate_to_mbps: Math.round(numeric * 100) / 100
                            });
                            lastRateShiftAt = now;
                        }
                    }
                    lastRenditionMbps = numeric;
                }
            }

            // 4K badge is now handled deterministically in setBadges(); removed runtime updater.
        }

        function resetPlayback() {
            clearLiveOffsetSeekTimer();
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            if (shakaPlayer) {
                shakaPlayer.destroy();
                shakaPlayer = null;
            }
            if (videojsPlayer) {
                try {
                    videojsPlayer.dispose();
                } catch (err) {
                    console.warn('Video.js dispose failed', err);
                }
                videojsPlayer = null;
            }
            video.className = '';
            video.pause();
            // runtime update4kBadge removed — 4K is handled deterministically in setBadges().
        }

        function getPlayerChoice() {
            const select = document.getElementById('playerSelect');
            return select ? select.value : 'auto';
        }

        function setPlayerChoice(value) {
            const select = document.getElementById('playerSelect');
            if (select) {
                select.value = value || 'auto';
            }
        }

        function resolvePlayerChoice(url, choice) {
            const isDash = url && String(url).includes('.mpd');
            if (choice === 'hlsjs') return 'hlsjs';
            if (choice === 'shaka') return 'shaka';
            if (choice === 'videojs') return 'videojs';
            if (choice === 'native') return 'native';
            if (isDash) return 'shaka';
            return (typeof Hls !== 'undefined' && Hls.isSupported()) ? 'hlsjs' : 'native';
        }

        function applyActiveFaultTab(card, tabName) {
            if (!card || !tabName) return;
            const container = card.querySelector('.tabs-container');
            if (!container) return;
            const targetButton = container.querySelector(`.tab-button[data-tab="${tabName}"]`);
            const targetPanel = container.querySelector(`.tab-panel[data-panel="${tabName}"]`);
            if (!targetButton || !targetPanel) return;
            container.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            targetButton.classList.add('active');
            container.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            targetPanel.classList.add('active');
        }

        function applyNative4kPreference(videoEl) {
            if (!videoEl) return;
            if (localStorage.getItem(NATIVE_4K_KEY) !== 'true') return;
            videoEl.setAttribute('width', '3840');
            videoEl.setAttribute('height', '2160');
        }

        function loadStream(url) {
            currentUrl = url;
            markPlaybackStart();
            clearLiveOffsetSeekTimer();
            clearStreamAccessAlert();
            autoRetryCount = 0;
            if (autoRetryTimer) {
                clearTimeout(autoRetryTimer);
                autoRetryTimer = null;
            }
            const isDash = url.includes('.mpd');
            const choice = getPlayerChoice();
            const playerType = resolvePlayerChoice(url, choice);
            document.getElementById('playerUrl').textContent = url;
            const derived = deriveCodecAndSegment(url, lastServerSession);
            setBadges(
                isDash,
                playerType,
                lastServerSession?.group_id || '',
                derived.codec,
                derived.codecClass,
                derived.segment,
                derived.segmentClass
            );
            if (playerType === 'shaka') {
                shaka.polyfill.installAll();
                if (!shaka.Player.isBrowserSupported()) {
