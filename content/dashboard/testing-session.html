<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Playback - InfiniteStream</title>
    <link rel="stylesheet" href="/shared-styles.css">
    <link href="https://vjs.zencdn.net/8.21.1/video-js.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.0/dist/shaka-player.compiled.js"></script>
    <script src="https://vjs.zencdn.net/8.21.1/video.min.js"></script>
    <style>
        body {
            background: var(--bg-secondary);
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .page-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .player-card {
            background: var(--bg-primary);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            padding: 12px;
        }

        .player-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .player-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 8px;
        }

        .panel-badge.videojs { background: #fce7f3; color: #9d174d; }
        .panel-badge.native { background: #e0f2fe; color: #0369a1; }
        .panel-badge.group { background: #fde68a; color: #92400e; }

        .context-menu {
            position: fixed;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 12px 30px rgba(0,0,0,0.35);
            border-radius: 8px;
            padding: 6px;
            display: none;
            z-index: 9999;
            min-width: 200px;
        }

        .context-menu button {
            width: 100%;
            background: transparent;
            border: none;
            text-align: left;
            padding: 8px 10px;
            font-size: 12px;
            color: #e5e7eb;
            border-radius: 6px;
            cursor: pointer;
        }

        .context-menu button:hover {
            background: rgba(59, 130, 246, 0.2);
        }
        .group-controls-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 8px;
            background: #f8fafc;
        }
        .group-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 6px 8px;
            border-radius: 10px;
            border: 1px solid #bbf7d0;
            background: #ecfdf3;
            color: #166534;
            font-weight: 600;
        }
        .group-banner .group-meta {
            font-weight: 500;
        }
        .group-banner .group-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .group-controls-row .group-select-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .group-controls-row select {
            min-width: 220px;
        }
        .group-controls-row .group-hint {
            color: #6b7280;
        }

        .player-frame {
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            max-height: 68vh;
        }

        .player-frame video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }

        .stats-grid {
            margin-top: 8px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 8px;
            font-size: 12px;
        }

        .stats-item {
            background: var(--bg-secondary);
            border-radius: 6px;
            padding: 6px 8px;
        }

        .stats-item .label {
            color: var(--text-secondary);
            font-weight: 600;
            display: block;
            margin-bottom: 2px;
        }

        .stats-item .value {
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
        }

        .debug-log {
            margin-top: 8px;
            background: #0b1220;
            color: #e5e7eb;
            border-radius: 10px;
            padding: 8px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            max-height: 200px;
            overflow: auto;
        }

        .session-panel {
            margin-top: 12px;
            background: var(--bg-primary);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            padding: 12px;
        }

        .session-panel h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .session-card {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 10px;
            border: 1px solid var(--border-color);
        }

        .session-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 6px;
        }

        .session-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .session-meta {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'Courier New', monospace;
        }

        .session-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 10px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .session-item {
            background: var(--bg-primary);
            border-radius: 6px;
            padding: 8px 10px;
        }

        .session-item .label {
            color: var(--text-secondary);
            font-weight: 600;
            display: block;
            margin-bottom: 2px;
        }

        .session-item .value {
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            word-break: break-word;
        }

        .failure-groups {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
        }

        .failure-group {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 10px;
            border: 1px solid var(--border-color);
        }

        .failure-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .radio-group label,
        .checkbox-group label {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .range-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .range-row input[type="range"] {
            flex: 1;
        }

        .range-value {
            font-size: 11px;
            color: var(--text-primary);
            min-width: 32px;
            text-align: right;
        }

        .range-row.range-row-disabled {
            opacity: 0.55;
        }

        .range-row.range-row-disabled input[type="range"] {
            pointer-events: none;
        }

        .btn-mini {
            font-size: 11px;
            padding: 4px 8px;
            min-height: 28px;
        }

        .shape-pattern-block {
            margin-top: 8px;
            border-top: 1px dashed var(--border-color);
            padding-top: 8px;
        }

        .shape-step-defaults {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 6px;
            align-items: center;
            margin-bottom: 8px;
        }

        .shape-step-defaults label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .shape-default-seconds {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: right;
            white-space: nowrap;
        }

        .shape-template-row {
            display: grid;
            grid-template-columns: auto minmax(320px, 1fr) auto minmax(90px, 130px) 1fr;
            gap: 6px;
            align-items: center;
            margin-bottom: 8px;
        }

        .shape-template-row label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .shape-template-row select {
            width: 100%;
            min-width: 0;
            padding: 4px 6px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 11px;
        }

        .shape-pattern-modes {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .shape-margin-modes {
            flex-wrap: nowrap;
        }

        .shape-pattern-mode {
            margin: 0;
        }

        .shape-pattern-mode input {
            display: none;
        }

        .shape-pattern-mode span {
            display: inline-block;
            padding: 4px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-primary);
            background: #f8fafc;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease;
        }

        .shape-pattern-mode input:checked + span {
            background: #1d4ed8;
            border-color: #1d4ed8;
            color: #fff;
            box-shadow: 0 0 0 2px rgba(29, 78, 216, 0.2);
        }

        .shape-pattern-mode input:focus-visible + span {
            outline: 2px solid #2563eb;
            outline-offset: 1px;
        }

        .shape-step-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 8px;
        }

        .shape-step-row {
            display: grid;
            grid-template-columns: auto minmax(120px, 180px) auto minmax(68px, 100px) auto minmax(68px, 100px) auto;
            gap: 6px;
            align-items: center;
        }

        .shape-step-row label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .shape-step-row input,
        .shape-step-row select {
            width: 100%;
            min-width: 0;
            padding: 4px 6px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 11px;
        }

        .shape-step-actions {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .chart-axis-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .chart-axis-row > label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .shape-step-enabled {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .shape-step-row.shape-step-disabled {
            opacity: 0.55;
        }

        .shape-step-row.shape-step-risk {
            border: 1px solid #ef4444;
            border-radius: 8px;
            padding: 4px;
            background: rgba(239, 68, 68, 0.08);
        }

        .session-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .chart-wrap {
            margin-top: 10px;
            background: #ffffff;
            border-radius: 8px;
            padding: 6px;
            border: 1px solid #e5e7eb;
            width: 100%;
        }

        .bandwidth-chart {
            width: 100%;
            height: 220px;
            display: block;
        }

        .buffer-depth-chart {
            width: 100%;
            height: 170px;
            display: block;
        }
    </style>
</head>
<body data-boss-no-sidebar data-boss-no-header data-boss-active-page="testing-session">
    <div class="boss-content-wide">
        <div class="page-header">
            <div>
                <div class="page-title" id="pageTitle">Testing Playback</div>
                <div class="page-subtitle" id="playerUrl">Loading…</div>
            </div>
            <div class="panel-badges" id="playerBadges"></div>
        </div>

        <div class="player-card">
            <div class="player-actions">
                <button class="btn btn-secondary" id="retryPlayback">Retry Fetch</button>
                <button class="btn btn-secondary" id="restartPlayback">Restart Playback</button>
                <button class="btn btn-secondary" id="reloadPage">Reload Page</button>
                <label>
                    Player
                    <select id="playerSelect" class="player-select">
                        <option value="auto">Auto</option>
                        <option value="hlsjs">HLS.js</option>
                        <option value="shaka">Shaka</option>
                        <option value="videojs">Video.js</option>
                        <option value="native">Native</option>
                    </select>
                </label>
                <label>
                    Allow 4K
                    <input id="prefer4kToggle" type="checkbox">
                </label>
            </div>
            <div class="player-frame">
                <video id="player" controls autoplay muted playsinline></video>
            </div>
            <div class="stats-grid">
                <div class="stats-item"><span class="label">State</span><span class="value" id="statState">Idle</span></div>
                <div class="stats-item"><span class="label">Time</span><span class="value" id="statTime">--</span></div>
                <div class="stats-item"><span class="label">Buffered End</span><span class="value" id="statBufferedEnd">--</span></div>
                <div class="stats-item"><span class="label">Buffer Depth</span><span class="value" id="statBufferDepth">--</span></div>
                <div class="stats-item"><span class="label">Live Offset</span><span class="value" id="statLiveOffset">--</span></div>
                <div class="stats-item"><span class="label">Bitrate</span><span class="value" id="statBitrate">--</span></div>
                <div class="stats-item"><span class="label">SSE Missed</span><span class="value" id="statSseMissed">0</span></div>
                <div class="stats-item"><span class="label">Dropped Frames</span><span class="value" id="statDropped">0</span></div>
                <div class="stats-item"><span class="label">Stalls</span><span class="value" id="statStalls">0</span></div>
            </div>
            <div class="debug-log" id="debugLog"></div>
        </div>

        <div class="session-panel">
            <h3>Session Controls</h3>
            <div id="networkShapingBanner" class="status-message" style="display:none; margin-bottom: 10px;"></div>
            <div id="sessionGroupControls" class="group-controls-row"></div>
            <div id="sessionControls">Loading session…</div>
        </div>
    </div>

    <script>
        (() => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('nav') === '1') {
                document.body.removeAttribute('data-boss-no-sidebar');
                document.body.removeAttribute('data-boss-no-header');
                document.body.dataset.bossActivePage = 'test-playback';
            }
        })();
    </script>
    <script src="/shared-nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css">
    <script src="https://cdn.jsdelivr.net/npm/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link rel="stylesheet" href="/dashboard/testing-session-refactored.css">
    <script src="/dashboard/testing-session-ui.js"></script>
    <script>
        const logEl = document.getElementById('debugLog');
        const sseMissedEl = document.getElementById('statSseMissed');
        const video = document.getElementById('player');
        const NATIVE_4K_KEY = 'bossPrefer4kNative';
        let hlsInstance = null;
        let shakaPlayer = null;
        let videojsPlayer = null;
        let stallCount = 0;
        let currentSessionId = null;
        let currentPlayerId = '';
        let currentUrl = '';
        let autoRetryCount = 0;
        let autoRetryTimer = null;
        const pendingShaping = new Map();
        const lastAppliedShaping = new Map();
        const pendingFailureEdits = new Map();
        const controlRevisionBySession = new Map();
        const bandwidthHistory = new Map();
        const bandwidthCharts = new Map();
        const bufferDepthCharts = new Map();
        const bandwidthVisibility = new Map();
        const bitrateAxisMaxBySession = new Map();
        let lastSessionsList = [];
        let groupSessionsFetchInFlight = false;
        let groupSelectValue = '';
        let groupSelectSessionId = '';
        let sessionPollController = null;
        let sessionPollInFlight = false;
        let sessionPollRequestSeq = 0;
        let sessionPollLastAppliedSeq = 0;
        let sessionsStream = null;
        let sessionPollTimer = null;
        const failureSaveTimers = new Map();
        const failureSaveFields = new Map();
        let playerEstimatedMbps = null;
        let currentRenditionMbps = null;
        const collapseState = new Map();
        const collapseDefaults = {
            'session-details': true,
            'fault-injection': false,
            'network-shaping': false,
            'bitrate-chart': false
        };
        const collapseStoragePrefix = 'testing_session_collapse_';
        let lastServerSession = null;
        let sseLastRevision = 0;
        let sseMissedTotal = 0;
        let lastRuntimeRateLogged = null;
        let lastStepRateLogged = null;
        let lastStepIndexLogged = null;

        function getStoredCollapseState(key) {
            try {
                const value = localStorage.getItem(`${collapseStoragePrefix}${key}`);
                if (value === null) return undefined;
                return value === 'true';
            } catch (err) {
                return undefined;
            }
        }

        function setStoredCollapseState(key, value) {
            try {
                localStorage.setItem(`${collapseStoragePrefix}${key}`, value ? 'true' : 'false');
            } catch (err) {
                collapseState.set(key, !!value);
            }
        }

        window.TestingSessionUICollapseState = {
            get: (key) => {
                const stored = getStoredCollapseState(key);
                if (typeof stored === 'boolean') return stored;
                if (collapseState.has(key)) return collapseState.get(key);
                return collapseDefaults[key];
            },
            set: (key, value) => {
                collapseState.set(key, !!value);
                setStoredCollapseState(key, value);
            }
        };

        function log(message) {
            const line = document.createElement('div');
            line.textContent = `${new Date().toLocaleTimeString()} ${message}`;
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function logPatternDebug(message, data) {
            const payload = data ? ` ${JSON.stringify(data)}` : '';
            console.warn(`[pattern-debug] ${new Date().toISOString()} ${message}${payload}`);
        }

        function updateSseMissedUi() {
            if (!sseMissedEl) return;
            sseMissedEl.textContent = String(sseMissedTotal);
        }

        function parseSessionsStreamPayload(event) {
            const data = JSON.parse(event.data);
            if (Array.isArray(data)) {
                return { sessions: data, revision: Number(event.lastEventId || 0), dropped: 0 };
            }
            const sessions = Array.isArray(data.sessions) ? data.sessions : [];
            const revision = Number(data.revision || event.lastEventId || 0);
            const dropped = Number(data.dropped || 0);
            return { sessions, revision, dropped };
        }

        function logHttpFailure(source, status, url) {
            if (!status) return;
            const parts = [source, 'HTTP', status];
            if (url) {
                parts.push(url);
            }
            log(parts.join(' '));
        }

        function normalizeBitrateAxisMaxMode(value) {
            const normalized = String(value || 'auto').toLowerCase();
            return ['auto', '5', '10', '20', '40'].includes(normalized) ? normalized : 'auto';
        }

        function createTestingPlayerId() {
            if (window.BOSSNav && typeof window.BOSSNav.createPlayerId === 'function') {
                return window.BOSSNav.createPlayerId();
            }
            return Math.random().toString(36).slice(2, 10);
        }

        function normalizeTestingBase(url) {
            if (window.BOSSNav && typeof window.BOSSNav.normalizeTestingBaseUrl === 'function') {
                return window.BOSSNav.normalizeTestingBaseUrl(url);
            }
            const parsed = new URL(url, window.location.origin);
            parsed.port = '30081';
            return parsed.toString();
        }

        function buildTestingUrl(url, playerId) {
            if (window.BOSSNav && typeof window.BOSSNav.buildTestingUrl === 'function') {
                return window.BOSSNav.buildTestingUrl(url, playerId);
            }
            const base = normalizeTestingBase(url);
            const separator = base.includes('?') ? '&' : '?';
            return `${base}${separator}player_id=${encodeURIComponent(playerId)}`;
        }

        function copyTestingUrl(url) {
            if (!url) return;
            if (!navigator.clipboard) {
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                return;
            }
            navigator.clipboard.writeText(url).catch(err => console.warn('Clipboard write failed', err));
        }

        function openTestingWindow(url) {
            if (!url) return;
            let baseUrl = url;
            try {
                const parsed = new URL(url, window.location.origin);
                parsed.searchParams.delete('player_id');
                baseUrl = parsed.toString();
            } catch (err) {
                console.warn('Failed to normalize testing URL', err);
            }
            const playerId = createTestingPlayerId();
            const testingUrl = buildTestingUrl(baseUrl, playerId);
            const pageUrl = `/dashboard/testing-session.html?player_id=${encodeURIComponent(playerId)}&url=${encodeURIComponent(testingUrl)}`;
            const popup = window.open(pageUrl, '_blank');
            if (!popup) {
                alert('Popup blocked. Allow popups for this site.');
            }
        }

        function openHlsjsDemo(url) {
            if (!url || url.includes('.mpd')) {
                alert('HLS.js demo only supports HLS (.m3u8).');
                return;
            }
            const demoUrl = `https://hlsjs.video-dev.org/demo/?src=${encodeURIComponent(url)}`;
            const popup = window.open(demoUrl, '_blank');
            if (!popup) {
                alert('Popup blocked. Allow popups for this site.');
            }
        }

        function initContextMenu() {
            const isDeveloperMode = new URLSearchParams(window.location.search).get('developer') === '1';
            const menu = document.createElement('div');
            menu.className = 'context-menu';
            menu.id = 'testingContextMenu';
            menu.innerHTML = `
                <button id="contextOpenTesting">Open in Testing Window</button>
                <button id="contextCopyTesting">Copy Testing URL</button>
                ${isDeveloperMode ? '<button id="contextOpenHlsjsDemo">Open in HLS.js Demo</button>' : ''}
            `;
            document.body.appendChild(menu);

            document.getElementById('contextOpenTesting').addEventListener('click', () => {
                const url = menu.dataset.url;
                if (url) openTestingWindow(url);
                menu.style.display = 'none';
            });
            document.getElementById('contextCopyTesting').addEventListener('click', () => {
                const url = menu.dataset.url;
                if (url) copyTestingUrl(url);
                menu.style.display = 'none';
            });
            const hlsjsButton = document.getElementById('contextOpenHlsjsDemo');
            if (hlsjsButton) {
                hlsjsButton.addEventListener('click', () => {
                    const url = menu.dataset.url;
                    if (url) openHlsjsDemo(url);
                    menu.style.display = 'none';
                });
            }

            document.addEventListener('click', () => {
                menu.style.display = 'none';
            });

            const showMenu = (event) => {
                event.preventDefault();
                const url = currentUrl || '';
                if (!url) return;
                menu.dataset.url = url;
                menu.style.left = `${event.clientX}px`;
                menu.style.top = `${event.clientY}px`;
                menu.style.display = 'block';
            };

            video.addEventListener('contextmenu', showMenu);
            const frame = document.querySelector('.player-frame');
            if (frame) {
                frame.addEventListener('contextmenu', showMenu);
            }
        }

        function extractHlsHttpFailure(data) {
            const response = data && data.response ? data.response : null;
            const network = data && data.networkDetails ? data.networkDetails : null;
            const status = (response && (response.code || response.status)) ||
                (response && response.xhr && response.xhr.status) ||
                (network && network.status) ||
                null;
            const url = (response && (response.url || response.responseURL)) ||
                (response && response.xhr && response.xhr.responseURL) ||
                (data && data.url) ||
                (data && data.frag && data.frag.url) ||
                null;
            return { status, url };
        }

        function extractShakaHttpFailure(detail) {
            if (!detail) return { status: null, url: null };
            let status = null;
            let url = null;
            if (Array.isArray(detail.data)) {
                detail.data.forEach(item => {
                    if (typeof item === 'number' && item >= 400 && item <= 599) {
                        status = item;
                    }
                    if (typeof item === 'string' && item.startsWith('http')) {
                        url = item;
                    }
                });
                if (!url && typeof detail.data[1] === 'string') {
                    url = detail.data[1];
                }
            }
            return { status, url };
        }

        function scheduleAutoRetry(reason) {
            if (!currentUrl) return;
            if (autoRetryCount >= 2) return;
            if (autoRetryTimer) return;
            autoRetryCount += 1;
            const delay = 1000 * autoRetryCount;
            log(`AUTO RETRY (${autoRetryCount}): ${reason}`);
            autoRetryTimer = setTimeout(() => {
                autoRetryTimer = null;
                retryPlayback();
            }, delay);
        }

        function getParams() {
            const params = new URLSearchParams(window.location.search);
            let url = params.get('url') || '';
            if (!url) {
                url = localStorage.getItem('bossSelectedUrl') || '';
            }
            if (url && window.BOSSNav && typeof window.BOSSNav.normalizeTestingBaseUrl === 'function') {
                try {
                    url = window.BOSSNav.normalizeTestingBaseUrl(url);
                } catch (err) {
                    console.warn('Failed to normalize Testing Playback URL', err);
                }
            }
            let playerId = params.get('player_id') || '';
            if (!playerId) {
                playerId = localStorage.getItem('bossTestPlaybackPlayerId') || '';
            }
            if (!playerId) {
                if (window.BOSSNav && typeof window.BOSSNav.createPlayerId === 'function') {
                    playerId = window.BOSSNav.createPlayerId();
                } else {
                    playerId = Math.random().toString(36).slice(2, 10);
                }
                try {
                    localStorage.setItem('bossTestPlaybackPlayerId', playerId);
                } catch (err) {
                    console.warn('Failed to persist Testing Playback player id', err);
                }
            }
            if (url) {
                try {
                    const parsed = new URL(url, window.location.origin);
                    if (!parsed.searchParams.get('player_id') && playerId) {
                        parsed.searchParams.set('player_id', playerId);
                    }
                    url = parsed.toString();
                } catch (err) {
                    console.warn('Failed to attach player id to URL', err);
                }
                try {
                    localStorage.setItem('bossSelectedUrl', url);
                } catch (err) {
                    console.warn('Failed to persist selected url', err);
                }
            }
            return {
                playerId: playerId,
                url: url,
                player: params.get('player') || ''
            };
        }

        function setBadges(isDash, playerType, groupId) {
            const badges = document.getElementById('playerBadges');
            badges.innerHTML = '';
            const protocol = document.createElement('span');
            protocol.className = `panel-badge ${isDash ? 'dash' : 'hls'}`;
            protocol.textContent = isDash ? 'DASH' : 'HLS';
            const player = document.createElement('span');
            const label = playerType === 'hlsjs' ? 'HLS.js'
                : playerType === 'shaka' ? 'Shaka'
                : playerType === 'videojs' ? 'Video.js'
                : playerType === 'native' ? 'Native'
                : 'Auto';
            const cls = playerType === 'hlsjs' ? 'hlsjs'
                : playerType === 'shaka' ? 'shaka'
                : playerType === 'videojs' ? 'videojs'
                : playerType === 'native' ? 'native'
                : (isDash ? 'shaka' : 'hlsjs');
            player.className = `panel-badge ${cls}`;
            player.textContent = label;
            badges.appendChild(protocol);
            badges.appendChild(player);
            if (groupId) {
                const group = document.createElement('span');
                group.className = 'panel-badge group';
                group.textContent = groupId;
                badges.appendChild(group);
            }
        }

        function attachVideoEvents() {
            video.addEventListener('waiting', () => {
                stallCount += 1;
                document.getElementById('statStalls').textContent = `${stallCount}`;
                log('STALL: waiting');
            });
            video.addEventListener('stalled', () => {
                stallCount += 1;
                document.getElementById('statStalls').textContent = `${stallCount}`;
                log('STALL: stalled');
            });
            video.addEventListener('error', () => {
                const err = video.error;
                const code = err && err.code ? ` code=${err.code}` : '';
                log(`ERROR: video error${code}`);
                scheduleAutoRetry('video error');
            });
            video.addEventListener('playing', () => {
                log('PLAYING');
            });
        }

        function updateStats() {
            const buffered = video.buffered;
            const current = video.currentTime || 0;
            let bufferedEnd = '--';
            let bufferDepth = '--';
            if (buffered && buffered.length > 0) {
                const end = buffered.end(buffered.length - 1);
                bufferedEnd = `${end.toFixed(2)}s`;
                bufferDepth = `${Math.max(0, end - current).toFixed(2)}s`;
            }
            document.getElementById('statState').textContent = video.paused ? 'Paused' : (video.muted ? 'Playing (Muted)' : 'Playing');
            document.getElementById('statTime').textContent = `${current.toFixed(2)}s`;
            document.getElementById('statBufferedEnd').textContent = bufferedEnd;
            document.getElementById('statBufferDepth').textContent = bufferDepth;
            document.getElementById('statLiveOffset').textContent = '--';

            const quality = video.getVideoPlaybackQuality ? video.getVideoPlaybackQuality() : null;
            if (quality) {
                document.getElementById('statDropped').textContent = `${quality.droppedVideoFrames || 0}`;
            }

            if (hlsInstance && hlsInstance.currentLevel >= 0 && hlsInstance.levels[hlsInstance.currentLevel]) {
                const bitrate = hlsInstance.levels[hlsInstance.currentLevel].bitrate;
                document.getElementById('statBitrate').textContent = `${Math.round(bitrate / 1000)} kbps`;
                currentRenditionMbps = bitrate ? Math.round((bitrate / 1024 / 1024) * 100) / 100 : null;
                playerEstimatedMbps = hlsInstance.bandwidthEstimate
                    ? Math.round((hlsInstance.bandwidthEstimate / 1024 / 1024) * 100) / 100
                    : null;
            } else if (shakaPlayer) {
                const stats = shakaPlayer.getStats();
                if (stats && stats.estimatedBandwidth) {
                    document.getElementById('statBitrate').textContent = `${Math.round(stats.estimatedBandwidth / 1000)} kbps`;
                    playerEstimatedMbps = Math.round((stats.estimatedBandwidth / 1024 / 1024) * 100) / 100;
                    if (stats.streamBandwidth) {
                        currentRenditionMbps = Math.round((stats.streamBandwidth / 1024 / 1024) * 100) / 100;
                    }
                }
            } else if (videojsPlayer) {
                const tech = videojsPlayer.tech && videojsPlayer.tech(true);
                const vhs = tech && tech.vhs ? tech.vhs : (videojsPlayer.vhs || null);
                const bandwidth = vhs && vhs.bandwidth ? vhs.bandwidth : null;
                if (bandwidth) {
                    document.getElementById('statBitrate').textContent = `${Math.round(bandwidth / 1000)} kbps`;
                    playerEstimatedMbps = Math.round((bandwidth / 1024 / 1024) * 100) / 100;
                    const media = vhs.playlists && vhs.playlists.media ? vhs.playlists.media() : null;
                    const rendition = media && media.attributes ? media.attributes.BANDWIDTH : null;
                    currentRenditionMbps = rendition ? Math.round((rendition / 1024 / 1024) * 100) / 100 : null;
                }
            } else {
                playerEstimatedMbps = null;
                currentRenditionMbps = null;
            }
        }

        function resetPlayback() {
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            if (shakaPlayer) {
                shakaPlayer.destroy();
                shakaPlayer = null;
            }
            if (videojsPlayer) {
                try {
                    videojsPlayer.dispose();
                } catch (err) {
                    console.warn('Video.js dispose failed', err);
                }
                videojsPlayer = null;
            }
            video.className = '';
            video.pause();
            video.removeAttribute('src');
            video.load();
            stallCount = 0;
            autoRetryCount = 0;
            if (autoRetryTimer) {
                clearTimeout(autoRetryTimer);
                autoRetryTimer = null;
            }
            document.getElementById('statStalls').textContent = '0';
            document.getElementById('statDropped').textContent = '0';
            document.getElementById('statBitrate').textContent = '--';
        }

        function retryPlayback() {
            if (!currentUrl) return;
            const isDash = currentUrl.includes('.mpd');
            if (hlsInstance) {
                try {
                    hlsInstance.stopLoad();
                } catch (err) {
                    console.warn('HLS stopLoad failed', err);
                }
                try {
                    hlsInstance.startLoad();
                } catch (err) {
                    console.warn('HLS startLoad failed', err);
                }
                log('RETRY: hls.js startLoad');
                return;
            }
            if (shakaPlayer) {
                if (typeof shakaPlayer.retryStreaming === 'function') {
                    shakaPlayer.retryStreaming();
                    log('RETRY: shaka retryStreaming');
                } else {
                    shakaPlayer.load(currentUrl)
                        .then(() => log('RETRY: shaka load'))
                        .catch(err => log(`RETRY ERROR: ${err.message}`));
                }
                return;
            }
            if (videojsPlayer) {
                const type = isDash ? 'application/dash+xml' : 'application/x-mpegURL';
                videojsPlayer.src({ src: currentUrl, type });
                videojsPlayer.ready(() => {
                    videojsPlayer.play().catch(err => log(`RETRY ERROR: ${err.message}`));
                });
                log('RETRY: videojs load');
                return;
            }
            video.load();
            video.play().catch(err => console.warn('Native play failed', err));
            log('RETRY: native load');
        }

        function resolvePlayerChoice(url, choice) {
            const isDash = url.includes('.mpd');
            if (choice === 'hlsjs') return 'hlsjs';
            if (choice === 'shaka') return 'shaka';
            if (choice === 'videojs') return 'videojs';
            if (choice === 'native') return 'native';
            if (isDash) return 'shaka';
            return Hls.isSupported() ? 'hlsjs' : 'native';
        }

        function getPlayerChoice() {
            const select = document.getElementById('playerSelect');
            return select ? select.value : 'auto';
        }

        function setPlayerChoice(value) {
            const select = document.getElementById('playerSelect');
            if (select) {
                select.value = value || 'auto';
            }
        }

        function applyNative4kPreference(videoEl) {
            if (!videoEl) return;
            if (localStorage.getItem(NATIVE_4K_KEY) !== 'true') return;
            videoEl.setAttribute('width', '3840');
            videoEl.setAttribute('height', '2160');
        }

        function loadStream(url) {
            currentUrl = url;
            autoRetryCount = 0;
            if (autoRetryTimer) {
                clearTimeout(autoRetryTimer);
                autoRetryTimer = null;
            }
            const isDash = url.includes('.mpd');
            const choice = getPlayerChoice();
            const playerType = resolvePlayerChoice(url, choice);
            document.getElementById('playerUrl').textContent = url;
            setBadges(isDash, playerType, lastServerSession?.group_id || '');
            if (playerType === 'shaka') {
                shaka.polyfill.installAll();
                if (!shaka.Player.isBrowserSupported()) {
                    log('ERROR: Shaka not supported');
                    return;
                }
                shakaPlayer = new shaka.Player(video);
                shakaPlayer.addEventListener('error', (e) => {
                    log(`ERROR: ${e.detail.code} ${e.detail.message}`);
                    const shakaHttp = extractShakaHttpFailure(e.detail);
                    logHttpFailure('Shaka', shakaHttp.status, shakaHttp.url);
                    scheduleAutoRetry(`shaka ${e.detail.code}`);
                });
                shakaPlayer.load(url).then(() => {
                    log('LOADED');
                    video.play().catch(err => {
                        log(`PLAY ERROR: ${err.message}`);
                        scheduleAutoRetry('shaka play error');
                    });
                }).catch((err) => {
                    log(`LOAD ERROR: ${err.message}`);
                    scheduleAutoRetry('shaka load error');
                });
            } else if (playerType === 'hlsjs') {
                if (Hls.isSupported()) {
                    hlsInstance = new Hls({ enableWorker: true, lowLatencyMode: false });
                    hlsInstance.on(Hls.Events.ERROR, (evt, data) => {
                        log(`HLS ERROR: ${data.type} ${data.details}`);
                        const hlsHttp = extractHlsHttpFailure(data);
                        logHttpFailure('HLS', hlsHttp.status, hlsHttp.url);
                        if (data && data.fatal) {
                            scheduleAutoRetry(`hls ${data.type}`);
                        }
                    });
                    hlsInstance.on(Hls.Events.BUFFER_STALLED, () => {
                        log('HLS: buffer stalled');
                        scheduleAutoRetry('hls stalled');
                    });
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play().catch(err => {
                            log(`PLAY ERROR: ${err.message}`);
                            scheduleAutoRetry('hls play error');
                        });
                    });
                    hlsInstance.loadSource(url);
                    hlsInstance.attachMedia(video);
                } else {
                    applyNative4kPreference(video);
                    video.src = url;
                    video.play().catch(err => {
                        log(`PLAY ERROR: ${err.message}`);
                        scheduleAutoRetry('native play error');
                    });
                }
            } else if (playerType === 'videojs') {
                if (isDash) {
                    log('ERROR: Video.js DASH requires extra plugins. Falling back to Shaka.');
                    setPlayerChoice('shaka');
                    loadStream(url);
                    return;
                }
                video.className = 'video-js vjs-default-skin';
                videojsPlayer = videojs(video, {
                    controls: true,
                    autoplay: true,
                    muted: true,
                    preload: 'auto',
                    liveui: true
                });
                videojsPlayer.on('error', () => {
                    const err = videojsPlayer.error();
                    if (err) {
                        log(`VIDEOJS ERROR: ${err.code} ${err.message || ''}`.trim());
                        const status = err.status || err.responseStatusCode || err.responseCode || null;
                        const url = err.url || err.responseURL || null;
                        logHttpFailure('Video.js', status, url);
                    } else {
                        log('VIDEOJS ERROR');
                    }
                    scheduleAutoRetry('videojs error');
                });
                videojsPlayer.on('vhs-error', (evt, data) => {
                    const status = data && (data.status || data.code || data.responseCode);
                    const url = data && (data.url || data.responseURL);
                    logHttpFailure('Video.js', status, url);
                });
                videojsPlayer.src({ src: url, type: 'application/x-mpegURL' });
                videojsPlayer.ready(() => {
                    videojsPlayer.play().catch(err => {
                        log(`PLAY ERROR: ${err.message}`);
                        scheduleAutoRetry('videojs play error');
                    });
                });
            } else {
                applyNative4kPreference(video);
                video.src = url;
                video.play().catch(err => {
                    log(`PLAY ERROR: ${err.message}`);
                    scheduleAutoRetry('native play error');
                });
            }
        }

        function renderSessionControls(session) {
            const container = document.getElementById('sessionControls');
            container.innerHTML = TestingSessionUI.renderSessionCard(session, {
                showBufferDepthChart: true,
                sectionDefaults: collapseDefaults
            });
            TestingSessionUI.applyCollapsibleState(container);
            const card = container.querySelector('.session-card');
            if (card) {
                const presetsRaw = card.dataset.shapingPresets || '';
                const videoPresetsRaw = card.dataset.shapingVideoPresets || '';
                const hasVariants = Array.isArray(session?.manifest_variants) && session.manifest_variants.length > 0;
                const emptyPresets = presetsRaw === '' || presetsRaw === 'W10%3D';
                if (!hasVariants || emptyPresets) {
                    logPatternDebug('render_session_controls_missing_presets', {
                        sessionId: session?.session_id || null,
                        playerId: session?.player_id || null,
                        manifestVariants: Array.isArray(session?.manifest_variants) ? session.manifest_variants.length : null,
                        manifestUrl: session?.manifest_url || null,
                        masterManifestUrl: session?.master_manifest_url || null,
                        lastRequestUrl: session?.last_request_url || null,
                        lastRequestAt: session?.last_request || null,
                        shapingPresetsRaw: presetsRaw,
                        shapingVideoPresetsRaw: videoPresetsRaw
                    });
                }
            }
        }

        function formatSessionLabel(session) {
            if (!session) return '';
            const portValue = session.x_forwarded_port_external || session.x_forwarded_port || '';
            const portSuffix = portValue ? ` (Port ${portValue})` : '';
            const playerLabel = session.player_id ? ` · ${session.player_id}` : '';
            return `Session ${session.session_id}${portSuffix}${playerLabel}`;
        }

        function formatDate(value) {
            if (window.TestingSessionUI && typeof TestingSessionUI.formatDate === 'function') {
                return TestingSessionUI.formatDate(value);
            }
            if (!value) return '—';
            const date = new Date(value);
            return date.toLocaleString();
        }

        function formatDuration(seconds) {
            if (window.TestingSessionUI && typeof TestingSessionUI.formatDuration === 'function') {
                return TestingSessionUI.formatDuration(seconds);
            }
            if (!seconds && seconds !== 0) return '—';
            const hrs = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const mins = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${hrs}:${mins}:${secs}`;
        }

        function renderGroupControls(session, sessions) {
            if (!session || !session.session_id) return '';
            const currentId = String(session.session_id);
            const groupId = session.group_id || '';
            const allSessions = Array.isArray(sessions) ? sessions : [];
            const hasOtherSessions = allSessions.some(s => String(s.session_id) !== currentId);
            const groupMembers = groupId
                ? allSessions.filter(s => String(s.session_id) !== currentId && s.group_id === groupId)
                : [];
            const memberLabels = groupMembers.map(formatSessionLabel).join(', ');
            const groupSummary = memberLabels || 'No other sessions yet';
            const available = allSessions.filter(s => {
                if (String(s.session_id) === currentId) return false;
                if (!groupId) return true;
                return s.group_id !== groupId;
            });
            const options = available.map(s => {
                const groupSuffix = s.group_id ? ` · ${s.group_id}` : '';
                const label = `${formatSessionLabel(s)}${groupSuffix}`;
                return `<option value="${s.session_id}">${label}</option>`;
            }).join('');
            const selectDisabled = available.length === 0;
            const selectLabel = groupId ? 'Add to group' : 'Group with';
            const banner = groupId ? `
                <div class="group-banner">
                    <div class="group-meta">🔗 Grouped with: ${groupSummary} <span class="panel-badge group">${groupId}</span></div>
                    <div class="group-actions">
                        <button class="btn btn-secondary" data-action="ungroup">Ungroup</button>
                    </div>
                </div>
            ` : '';
            const hint = selectDisabled
                ? (hasOtherSessions ? 'No available sessions to add.' : 'Waiting for other sessions...')
                : '';
            return `
                ${banner}
                <div class="group-select-row">
                    <label>
                        ${selectLabel}
                        <select id="groupWithSelect" ${selectDisabled ? 'disabled' : ''}>
                            <option value="">Select session…</option>
                            ${options}
                        </select>
                    </label>
                    <button class="btn btn-secondary" data-action="group-with" ${selectDisabled ? 'disabled' : ''}>Group</button>
                    ${hint ? `<span class="group-hint">${hint}</span>` : ''}
                </div>
            `;
        }

        function updateGroupControls(session, sessions) {
            const container = document.getElementById('sessionGroupControls');
            if (!container) return;
            container.innerHTML = renderGroupControls(session, sessions);
            const select = container.querySelector('#groupWithSelect');
            if (select) {
                const currentId = session ? String(session.session_id || '') : '';
                if (groupSelectSessionId && currentId === groupSelectSessionId && groupSelectValue) {
                    select.value = groupSelectValue;
                }
            }
            if (session && session.session_id && (!Array.isArray(sessions) || sessions.length <= 1) && !groupSessionsFetchInFlight) {
                groupSessionsFetchInFlight = true;
                fetch('/api/sessions', { cache: 'no-store' })
                    .then(res => res.json())
                    .then(all => {
                        lastSessionsList = Array.isArray(all) ? all : [];
                        container.innerHTML = renderGroupControls(session, lastSessionsList);
                        const retrySelect = container.querySelector('#groupWithSelect');
                        if (retrySelect) {
                            const currentId = String(session.session_id || '');
                            if (groupSelectSessionId && currentId === groupSelectSessionId && groupSelectValue) {
                                retrySelect.value = groupSelectValue;
                            }
                        }
                    })
                    .catch(err => console.error('Error fetching sessions for grouping', err))
                    .finally(() => {
                        groupSessionsFetchInFlight = false;
                    });
            }
        }

        function bindGroupControls() {
            const container = document.getElementById('sessionGroupControls');
            if (!container) return;
            container.addEventListener('change', (event) => {
                const select = event.target.closest('#groupWithSelect');
                if (!select) return;
                groupSelectValue = String(select.value || '');
                const session = lastServerSession;
                groupSelectSessionId = session && session.session_id ? String(session.session_id) : '';
            });
            const requestGroupWith = (session, targetId, sessions) => {
                if (!session || !session.session_id || !targetId) return;
                const list = Array.isArray(sessions) ? sessions : [];
                const targetSession = list.find(item => String(item.session_id) === targetId);
                let groupId = session.group_id || '';
                if (!groupId && targetSession && targetSession.group_id) {
                    groupId = targetSession.group_id;
                }
                const ids = new Set([String(session.session_id), targetId]);
                if (targetSession && targetSession.group_id && targetSession.group_id !== session.group_id) {
                    list
                        .filter(item => item.group_id === targetSession.group_id)
                        .forEach(item => ids.add(String(item.session_id)));
                }
                if (ids.size < 2) {
                    alert('Select a session to group with.');
                    return;
                }
                const payload = {
                    session_ids: Array.from(ids)
                };
                if (groupId) {
                    payload.group_id = groupId;
                }
                fetch('/api/session-group/link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                    .then(() => {
                        groupSelectValue = '';
                        groupSelectSessionId = '';
                        refreshSession(session.player_id);
                    })
                    .catch(err => console.error('Error grouping sessions', err));
            };
            container.addEventListener('click', (event) => {
                const button = event.target.closest('button');
                if (!button) return;
                const session = lastServerSession;
                if (!session || !session.session_id) return;
                if (button.dataset.action === 'group-with') {
                    const select = container.querySelector('#groupWithSelect');
                    const targetId = select ? String(select.value || '') : '';
                    if (!targetId) return;
                    const targetSession = lastSessionsList.find(item => String(item.session_id) === targetId);
                    if (!targetSession) {
                        fetch('/api/sessions', { cache: 'no-store' })
                            .then(res => res.json())
                            .then(all => {
                                lastSessionsList = Array.isArray(all) ? all : [];
                                requestGroupWith(session, targetId, lastSessionsList);
                            })
                            .catch(err => console.error('Error fetching sessions for grouping', err));
                        return;
                    }
                    requestGroupWith(session, targetId, lastSessionsList);
                    return;
                }
                if (button.dataset.action === 'ungroup') {
                    if (!session.group_id) return;
                    fetch('/api/session-group/unlink', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            session_id: String(session.session_id),
                            group_id: session.group_id,
                            unlink_group: true
                        })
                    })
                        .then(() => {
                            groupSelectValue = '';
                            groupSelectSessionId = '';
                            refreshSession(session.player_id);
                        })
                        .catch(err => console.error('Error ungrouping sessions', err));
                }
            });
        }

        function normalizeTransportFaultType(session) {
            const raw = String(session.transport_failure_type || session.transport_fault_type || 'none').toLowerCase();
            if (raw === 'drop' || raw === 'reject') return raw;
            return 'none';
        }

        function normalizeTransportFailureMode(session) {
            const modeRaw = String(session.transport_failure_mode || '').toLowerCase();
            if (modeRaw === 'failures_per_packets' || modeRaw === 'failures_per_packet') {
                return 'failures_per_packets';
            }
            const unitsRaw = String(session.transport_consecutive_units || session.transport_failure_units || '').toLowerCase();
            if (unitsRaw === 'packet' || unitsRaw === 'packets' || unitsRaw === 'pkt' || unitsRaw === 'pkts') {
                return 'failures_per_packets';
            }
            return 'failures_per_seconds';
        }

        function getControlRevision(session) {
            const revision = session ? session.control_revision : null;
            if (revision === undefined || revision === null || revision === '') {
                return null;
            }
            return String(revision);
        }

        function shouldSyncControls(sessionId, session) {
            const key = String(sessionId || session?.session_id || '');
            if (!key) return true;
            const revision = getControlRevision(session);
            const lastRevision = controlRevisionBySession.get(key);
            if (revision === null) {
                if (lastRevision === undefined) {
                    controlRevisionBySession.set(key, null);
                    return true;
                }
                return false;
            }
            if (lastRevision !== revision) {
                controlRevisionBySession.set(key, revision);
                return true;
            }
            return false;
        }

        function syncServerFaultControls(card, session) {
            if (!card || !session) return;
            const sessionId = String(card.dataset.sessionId || session.session_id || '');
            if (!sessionId) return;
            const syncSelect = (namePrefix, value) => {
                const select = card.querySelector(`select[name="${namePrefix}_${sessionId}"]`);
                if (select && value) {
                    select.value = value;
                }
            };
            const syncRange = (field, value, fallback) => {
                const input = card.querySelector(`input[data-field="${field}"]`);
                if (!input) return;
                const numeric = Number(value);
                const resolved = Number.isFinite(numeric) && numeric >= 0 ? numeric : fallback;
                input.value = String(resolved);
                const valueEl = input.parentElement?.querySelector('.range-value');
                if (valueEl) valueEl.textContent = input.value;
            };
            const syncFailureScope = (field, values, allWhenEmpty) => {
                const selected = Array.isArray(values) ? values.map(String) : [];
                const selectedSet = new Set(selected);
                const allChecked = allWhenEmpty
                    ? (selected.length === 0 || selectedSet.has('All'))
                    : selectedSet.has('All');
                card.querySelectorAll(`input[data-field="${field}"]`).forEach(input => {
                    if (input.value === 'All') {
                        input.checked = allChecked;
                        return;
                    }
                    input.checked = allChecked || selectedSet.has(input.value);
                });
            };
            const syncRadio = (namePrefix, value) => {
                const radios = card.querySelectorAll(`input[name="${namePrefix}_${sessionId}"]`);
                radios.forEach((radio) => {
                    radio.checked = radio.value === value;
                });
            };
            syncRadio('segment_failure_type', String(session.segment_failure_type || 'none'));
            syncRadio('manifest_failure_type', String(session.manifest_failure_type || 'none'));
            syncRadio('master_manifest_failure_type', String(session.master_manifest_failure_type || 'none'));
            syncRadio('transport_failure_type', normalizeTransportFaultType(session));
            syncRadio('transport_failure_mode', normalizeTransportFailureMode(session));
            syncSelect('segment_failure_mode', String(session.segment_failure_mode || 'failures_per_seconds'));
            syncSelect('manifest_failure_mode', String(session.manifest_failure_mode || 'failures_per_seconds'));
            syncSelect('master_manifest_failure_mode', String(session.master_manifest_failure_mode || 'failures_per_seconds'));
            syncRange('segment_consecutive_failures', session.segment_consecutive_failures, 1);
            syncRange('segment_failure_frequency', session.segment_failure_frequency, 6);
            syncRange('manifest_consecutive_failures', session.manifest_consecutive_failures, 1);
            syncRange('manifest_failure_frequency', session.manifest_failure_frequency, 6);
            syncRange('master_manifest_consecutive_failures', session.master_manifest_consecutive_failures, 1);
            syncRange('master_manifest_failure_frequency', session.master_manifest_failure_frequency, 6);
            syncFailureScope('segment_failure_urls', session.segment_failure_urls, true);
            syncFailureScope('manifest_failure_urls', session.manifest_failure_urls, false);
            TestingSessionUI.updateTransportModeUi(card);
            const transportConsecutiveInput = card.querySelector('input[data-field="transport_consecutive_failures"]');
            const transportFrequencyInput = card.querySelector('input[data-field="transport_failure_frequency"]');
            if (transportConsecutiveInput) {
                const value = Number(
                    session.transport_consecutive_failures ??
                    session.transport_consecutive_seconds ??
                    session.transport_fault_on_seconds ??
                    0
                );
                transportConsecutiveInput.value = String(Number.isFinite(value) ? value : 0);
                const valueEl = transportConsecutiveInput.parentElement?.querySelector('.range-value');
                if (valueEl) valueEl.textContent = transportConsecutiveInput.value;
            }
            if (transportFrequencyInput) {
                const value = Number(
                    session.transport_failure_frequency ??
                    session.transport_frequency_seconds ??
                    session.transport_fault_off_seconds ??
                    0
                );
                transportFrequencyInput.value = String(Number.isFinite(value) ? value : 0);
                const valueEl = transportFrequencyInput.parentElement?.querySelector('.range-value');
                if (valueEl) valueEl.textContent = transportFrequencyInput.value;
            }
        }

        function syncServerFaultData(card, session) {
            if (!card || !session) return;
            const stateEl = card.querySelector('[data-field="transport_fault_state"]');
            if (stateEl) {
                stateEl.textContent = session.transport_fault_active ? 'Active' : 'Idle';
            }
            const countersEl = card.querySelector('[data-field="transport_fault_counters"]');
            if (countersEl) {
                const dropPackets = Number(session.transport_fault_drop_packets || 0);
                const rejectPackets = Number(session.transport_fault_reject_packets || 0);
                countersEl.textContent = `Drop ${dropPackets} pkts · Reject ${rejectPackets} pkts`;
            }
        }

        function closestStepDuration(seconds) {
            const options = [6, 12, 18, 24];
            const numeric = Number(seconds);
            if (!Number.isFinite(numeric) || numeric <= 0) return 12;
            let best = options[0];
            let bestDiff = Math.abs(numeric - best);
            options.forEach((value) => {
                const diff = Math.abs(numeric - value);
                if (diff < bestDiff) {
                    best = value;
                    bestDiff = diff;
                }
            });
            return best;
        }

        function inferSegmentDurationSeconds(session) {
            const explicit = Number(session?.nftables_pattern_segment_duration_seconds || 0);
            if (Number.isFinite(explicit) && explicit > 0) {
                return explicit;
            }
            const candidates = [
                session?.manifest_url || '',
                session?.master_manifest_url || '',
                session?.last_request_url || ''
            ];
            for (const value of candidates) {
                const match = value.match(/(?:_|\/)(\d+)s(?:[._/?]|$)/i);
                if (match) {
                    const parsed = Number(match[1]);
                    if (Number.isFinite(parsed) && parsed > 0) {
                        return parsed;
                    }
                }
            }
            return 1;
        }

        function resolvePatternDefaults(session) {
            const segmentDurationSeconds = inferSegmentDurationSeconds(session);
            const defaultSegments = Number(session?.nftables_pattern_default_segments || 2);
            const storedDefaultStepSeconds = Number(session?.nftables_pattern_default_step_seconds || 0);
            const defaultStepSeconds = Number.isFinite(storedDefaultStepSeconds) && storedDefaultStepSeconds > 0
                ? storedDefaultStepSeconds
                : segmentDurationSeconds * defaultSegments;
            return {
                segmentDurationSeconds,
                selectedStepSeconds: closestStepDuration(defaultStepSeconds)
            };
        }

        function getTemplateMode(card) {
            const selected = card.querySelector('input[data-field="shaping_template_mode"]:checked');
            return selected ? selected.value : 'sliders';
        }

        function updateTemplateModeUi(card) {
            const mode = getTemplateMode(card);
            const throughputRow = card.querySelector('[data-field="shaping_throughput_row"]');
            const throughputInput = card.querySelector('input[data-field="shaping_throughput_mbps"]');
            const stepList = card.querySelector('[data-field="shaping_pattern_rows"]');
            const stepActions = card.querySelector('.shape-step-actions');
            const applyButton = card.querySelector('[data-field="shaping_apply_pattern_row"]');
            const usePattern = mode !== 'sliders';
            if (throughputRow) {
                throughputRow.classList.toggle('range-row-disabled', usePattern);
            }
            if (throughputInput) throughputInput.disabled = usePattern;
            if (stepList) {
                stepList.style.display = usePattern ? '' : 'none';
            }
            if (stepActions) {
                stepActions.style.display = usePattern ? '' : 'none';
            }
            if (applyButton) {
                applyButton.style.display = usePattern ? '' : 'none';
            }
        }

        function syncNetworkShapingControls(card, session) {
            if (!card || !session) return;
            const sessionId = String(card.dataset.sessionId || session.session_id || '');
            if (!sessionId) return;
            const templateModeRaw = String(session.nftables_pattern_template_mode || '').toLowerCase();
            const templateMode = ['sliders', 'square_wave', 'ramp_up', 'ramp_down', 'pyramid'].includes(templateModeRaw)
                ? templateModeRaw
                : 'sliders';
            card.querySelectorAll(`input[name="shaping_template_mode_${sessionId}"]`).forEach((radio) => {
                radio.checked = radio.value === templateMode;
            });
            const marginRaw = Number(session.nftables_pattern_margin_pct);
            const marginPct = [0, 10, 25, 50].includes(marginRaw) ? marginRaw : 0;
            card.querySelectorAll(`input[name="shaping_template_margin_${sessionId}"]`).forEach((radio) => {
                radio.checked = Number(radio.value) === marginPct;
            });
            const defaults = resolvePatternDefaults(session);
            card.querySelectorAll(`input[name="shaping_default_step_seconds_${sessionId}"]`).forEach((radio) => {
                radio.checked = Number(radio.value) === defaults.selectedStepSeconds;
            });
            if (card) {
                card.dataset.segmentDurationSeconds = String(defaults.segmentDurationSeconds);
            }
            updateTemplateModeUi(card);
        }

        function isFailureRangeField(field) {
            return [
                'segment_consecutive_failures',
                'segment_failure_frequency',
                'manifest_consecutive_failures',
                'manifest_failure_frequency',
                'master_manifest_consecutive_failures',
                'master_manifest_failure_frequency',
                'transport_consecutive_failures',
                'transport_failure_frequency'
            ].includes(field);
        }

        function getSessionBaseRevision() {
            const revision = lastServerSession ? lastServerSession.control_revision : null;
            if (revision === undefined || revision === null) {
                return '';
            }
            return String(revision);
        }

        function queuePendingFailureEdits(sessionId, values) {
            if (!sessionId || !values) return;
            const key = String(sessionId);
            const existing = pendingFailureEdits.get(key);
            const merged = {
                ...(existing ? existing.values : {}),
                ...values
            };
            pendingFailureEdits.set(key, {
                timestamp: Date.now(),
                values: merged
            });
            setTimeout(() => {
                const pending = pendingFailureEdits.get(key);
                if (pending && Date.now() - pending.timestamp > 4500) {
                    pendingFailureEdits.delete(key);
                }
            }, 5000);
        }

        function resolvePendingFailureEdits(sessionId, fields) {
            const key = String(sessionId || '');
            const pending = pendingFailureEdits.get(key);
            if (!pending) return;
            const values = { ...pending.values };
            (fields || []).forEach(field => {
                delete values[field];
            });
            if (Object.keys(values).length === 0) {
                pendingFailureEdits.delete(key);
            } else {
                pendingFailureEdits.set(key, {
                    timestamp: pending.timestamp,
                    values
                });
            }
        }

        function buildSessionPatch(card, fields) {
            const data = TestingSessionUI.readSessionSettings(card);
            const set = {};
            (fields || []).forEach(field => {
                if (Object.prototype.hasOwnProperty.call(data, field)) {
                    set[field] = data[field];
                }
            });
            return {
                sessionId: data.session_id,
                set,
                fields: fields || []
            };
        }

        function applySessionPatchResponse(session) {
            if (!session) return;
            applySessionUpdate(session);
        }

        function sendSessionPatch(card, fields) {
            const patch = buildSessionPatch(card, fields);
            if (!patch.sessionId || Object.keys(patch.set).length === 0) {
                return Promise.resolve();
            }
            queuePendingFailureEdits(patch.sessionId, patch.set);
            return fetch(`/api/session/${patch.sessionId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    set: patch.set,
                    fields: patch.fields,
                    base_revision: getSessionBaseRevision()
                })
            }).then(async response => {
                const body = await response.json().catch(() => ({}));
                if (!response.ok) {
                    if (response.status === 409 && body.session) {
                        resolvePendingFailureEdits(patch.sessionId, patch.fields);
                        pendingFailureEdits.delete(String(patch.sessionId));
                        applySessionPatchResponse(body.session);
                        return;
                    }
                    throw new Error(body.error || `HTTP ${response.status}`);
                }
                if (body.session) {
                    resolvePendingFailureEdits(patch.sessionId, patch.fields);
                    applySessionPatchResponse(body.session);
                }
            }).catch(error => {
                console.error('Error saving settings:', error);
            });
        }

        function scheduleFailureSave(card, field) {
            const sessionId = card?.dataset?.sessionId;
            if (!sessionId || !field) return;
            const key = String(sessionId);
            if (!failureSaveFields.has(key)) {
                failureSaveFields.set(key, new Set());
            }
            failureSaveFields.get(key).add(field);
            if (failureSaveTimers.has(key)) {
                clearTimeout(failureSaveTimers.get(key));
            }
            failureSaveTimers.set(key, setTimeout(() => {
                const fields = Array.from(failureSaveFields.get(key) || []);
                failureSaveFields.delete(key);
                failureSaveTimers.delete(key);
                if (fields.length) {
                    sendSessionPatch(card, fields);
                }
            }, 200));
        }

        function parseSessionControlName(name, sessionId) {
            if (!name || !sessionId) return '';
            const suffix = `_${sessionId}`;
            if (!name.endsWith(suffix)) return '';
            return name.slice(0, -suffix.length);
        }

        function resolveSessionPatchFields(target, sessionId, field) {
            if (field === 'segment_failure_urls' || field === 'manifest_failure_urls') {
                return [field];
            }
            const prefix = parseSessionControlName(target.name, sessionId);
            if (!prefix) return [];
            if (prefix.endsWith('_failure_type')) {
                return [prefix];
            }
            if (prefix.endsWith('_failure_mode')) {
                const base = prefix.replace('_failure_mode', '');
                if (base === 'transport') {
                    return [
                        'transport_failure_mode',
                        'transport_failure_units',
                        'transport_consecutive_units',
                        'transport_frequency_units',
                        'transport_consecutive_failures',
                        'transport_failure_frequency'
                    ];
                }
                return [
                    `${base}_failure_mode`,
                    `${base}_failure_units`,
                    `${base}_consecutive_units`,
                    `${base}_frequency_units`
                ];
            }
            return [];
        }

        function bindSessionControls() {
            const container = document.getElementById('sessionControls');
            const shapingTimers = new Map();
            const patternDebugSeen = new Set();
            const logPatternOnce = (key, data) => {
                if (patternDebugSeen.has(key)) return;
                patternDebugSeen.add(key);
                logPatternDebug(key, data);
            };
            const scheduleShapingApply = (card) => {
                const sessionId = card.dataset.sessionId;
                if (shapingTimers.has(sessionId)) {
                    clearTimeout(shapingTimers.get(sessionId));
                }
                shapingTimers.set(sessionId, setTimeout(() => {
                    applyNetworkShaping(card);
                }, 250));
            };
            const getShapingPresets = (card) => {
                const raw = card.dataset.shapingPresets || '';
                if (!raw) {
                    logPatternOnce(`empty_shaping_presets_${card.dataset.sessionId || 'unknown'}`, {
                        sessionId: card.dataset.sessionId || null,
                        shapingPresetsRaw: raw
                    });
                    return [];
                }
                try {
                    const parsed = JSON.parse(decodeURIComponent(raw));
                    if (!Array.isArray(parsed)) return [];
                    return parsed;
                } catch (err) {
                    console.warn('Failed to parse shaping presets', err);
                    return [];
                }
            };
            const getShapingVideoPresets = (card) => {
                const raw = card.dataset.shapingVideoPresets || '';
                if (!raw) {
