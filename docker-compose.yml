services:
  # One-shot init container: pre-creates and chmods bind-mounted subdirs
  # under $CONTENT_DIR that other services need writable but cannot
  # create/chown themselves due to in-container UIDs (Grafana 472,
  # forwarder distroless-nonroot 65532). All services that write under
  # /media/logs or /media/grafana depend on this completing successfully
  # so the perms are guaranteed in place before they start. Keeps the
  # filesystem-prep concern out of go-server's launch.sh. See #383.
  init-permissions:
    image: alpine:3
    # No container_name — compose auto-generates `<project>-init-permissions-1`
    # so multiple test-deploy-* variants on the same host don't collide on
    # this one-shot init container's name.
    user: "0:0"
    volumes:
      - ${CONTENT_DIR:-./sample-content}:/media
      # Mounted to match the forwarder's /claude mount so this init
      # can pre-create + chmod the subdirs the forwarder (distroless
      # nonroot UID 65532) needs to write into. Host source comes
      # from FORWARDER_CLAUDE_DIR_HOST; defaults match the forwarder.
      - ${FORWARDER_CLAUDE_DIR_HOST:-./.claude}:/claude
    command: >-
      sh -c "mkdir -p /media/logs /media/grafana /claude/chats &&
             chmod 0777 /media/logs /media/grafana /claude/chats"
    restart: "no"
    networks:
      - app_network

  go-server:
    build:
      context: .
      args:
        VERSION: ${VERSION:-unknown}
    image: infinite-streaming
    container_name: infinite-streaming
    cap_add:
      - NET_ADMIN
    privileged: true
    entrypoint: /sbin/launch.sh
    command: ["1"]
    ports:
      - "30000:30000"
      - "30081:30081"
      - "30181:30181"
      - "30281:30281"
      - "30381:30381"
      - "30481:30481"
      - "30581:30581"
      - "30681:30681"
      - "30781:30781"
      - "30881:30881"
    volumes:
      - ./content:/content
      - ${CONTENT_DIR:-./sample-content}:/media
    environment:
      # Path Configuration - Single source of truth for all path references
      - INFINITE_STREAM_ROOT=/media
      - INFINITE_STREAM_UPLOADS_DIR=/media/uploads
      - INFINITE_STREAM_SOURCES_DIR=/media/originals
      - INFINITE_STREAM_OUTPUT_DIR=/media/dynamic_content
      - INFINITE_STREAM_DATABASE_DIR=/media/data
      - INFINITE_STREAM_TEMP_DIR=/media/tmp
      - INFINITE_STREAM_CONTENT_DIR=/content
      - TMPDIR=/media/tmp
      - GO_LIVE_OUTPUT_DIR=/go-live
      - GO_UPLOAD_ADDR=:8003
      - INFINITE_STREAM_LISTEN_PORT=30000
      # TLS toggle (default on = HTTPS+HTTP/2). Set INFINITE_STREAM_TLS=off
      # in .env to serve plain HTTP on the dashboard + shaper ports.
      - INFINITE_STREAM_TLS=${INFINITE_STREAM_TLS:-on}
      # SAN list for the auto-generated self-signed cert (used only when no
      # mkcert / Let's Encrypt cert is mounted into the certs dir). Comma-
      # separated openssl SAN entries — list every hostname/IP clients reach
      # this box by, since browsers match on SAN not CN. See docs/TLS.md.
      - INFINITE_STREAM_TLS_SAN=${INFINITE_STREAM_TLS_SAN:-DNS:localhost,IP:127.0.0.1}
      - INFINITE_STREAM_UPSTREAM_HOST=127.0.0.1
      - INFINITE_STREAM_UPSTREAM_PORT=30000
      - INFINITE_STREAM_MAX_SESSIONS=8
      - INFINITE_STREAM_TC_INTERFACE=eth0
      # Set this to your deployed Cloudflare Worker URL to enable the
      # dashboard's "Pair a TV" widget (cloudflare/pair-rendezvous/).
      - INFINITE_STREAM_RENDEZVOUS_URL=${INFINITE_STREAM_RENDEZVOUS_URL:-}
      # Set this to the URL clients should use to reach this server (e.g.
      # http://lenovo.local:30000) to publish it to the rendezvous so the
      # standalone /pair page lists it. Optional label overrides hostname.
      - INFINITE_STREAM_ANNOUNCE_URL=${INFINITE_STREAM_ANNOUNCE_URL:-}
      - INFINITE_STREAM_ANNOUNCE_LABEL=${INFINITE_STREAM_ANNOUNCE_LABEL:-}
      # Compose ships the analytics sidecar alongside (forwarder + ClickHouse
      # + Grafana), so wire the nginx /analytics/api/* and /grafana/* routes.
      # k3s deployments default this to 0 (off) until k8s-analytics.yaml is
      # also applied; the main image must boot regardless of the sidecar's
      # existence (#390).
      - INFINITE_STREAM_ENABLE_ANALYTICS=1
    tmpfs:
      - /go-live:size=4G,mode=755
    networks:
      - app_network
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    restart: unless-stopped
    stop_grace_period: 1s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: infinite-streaming-clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      # Bind-mount under $CONTENT_DIR so the analytics archive is
      # inspectable/portable from the host (single rm -rf for full reset)
      # and a soak run's data lives next to the originals it was generated
      # from. Docker creates the host dir with root:root; ClickHouse's
      # entrypoint chowns it to clickhouse:101 on first start. See #377.
      - ${CONTENT_DIR:-./sample-content}/clickhouse:/var/lib/clickhouse
      - ./analytics/clickhouse/init.d:/docker-entrypoint-initdb.d:ro
    environment:
      - CLICKHOUSE_DB=infinite_streaming
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    # Bind to loopback only — ClickHouse has no auth configured here,
    # so anyone on the LAN reaching :30123 would have full DROP/INSERT
    # rights. The forwarder + Grafana reach it via the docker bridge
    # (http://clickhouse:8123); host-side tools (e.g. `make
    # analytics-migrate`, ad-hoc curl) reach it via 127.0.0.1.
    ports:
      - "127.0.0.1:30123:8123"
    networks:
      - app_network
    restart: unless-stopped

  forwarder:
    # Build context is the repo root so the Dockerfile can COPY both
    # analytics/go-forwarder/ AND go-proxy/ — the forwarder's go.mod
    # uses a `replace` directive (../../go-proxy) to share the v2
    # translator + oapigen types with the proxy module. Without the
    # wider context that path doesn't exist inside the build container.
    build:
      context: .
      dockerfile: analytics/go-forwarder/Dockerfile
    image: infinite-streaming-forwarder
    container_name: infinite-streaming-forwarder
    volumes:
      # Mount the host media dir so the forwarder can append its stdout
      # log to /media/logs/forwarder.log (matches the pattern used by the
      # go-server backends in #377 and #383). go-server's launch.sh
      # chmods /media/logs to 0777 so the forwarder's distroless nonroot
      # user (UID 65532) can write.
      - ${CONTENT_DIR:-./sample-content}:/media
      # Project knowledge layer for the AI chat backend's Tier 2
      # tools (read_finding / read_standard / read_skill /
      # read_conventions) and propose_finding write target. Override
      # the host path with FORWARDER_CLAUDE_DIR_HOST; defaults to
      # the test-dev convention `./` + .claude. The container always
      # sees it at /claude so FORWARDER_CLAUDE_DIR env var (below)
      # can be a fixed value regardless of host layout.
      - ${FORWARDER_CLAUDE_DIR_HOST:-./.claude}:/claude
    environment:
      - FORWARDER_SSE_URL=http://go-server:30081/api/sessions/stream
      - FORWARDER_CLICKHOUSE_URL=http://clickhouse:8123
      - FORWARDER_CLICKHOUSE_DB=infinite_streaming
      - FORWARDER_CLICKHOUSE_TABLE=session_events
      - FORWARDER_LOG_FILE=/media/logs/forwarder.log
      - FORWARDER_CLAUDE_DIR=/claude
      # Per-template base_url overrides for the AI chat catalog
      # (#497). Lets a deploy point local-server templates (Ollama,
      # LiteLLM, MLX, …) at a real LAN address instead of the
      # container's localhost. Pattern:
      # FORWARDER_LLM_BASE_URL_<TEMPLATE_NAME_UPPERCASED>. See
      # llm_profiles.go applyEnvBaseURLOverrides.
      - FORWARDER_LLM_BASE_URL_OLLAMA=${FORWARDER_LLM_BASE_URL_OLLAMA:-}
      - FORWARDER_LLM_BASE_URL_MLX_LOCAL=${FORWARDER_LLM_BASE_URL_MLX_LOCAL:-}
      - FORWARDER_LLM_BASE_URL_CHATGPT_VIA_LITELLM=${FORWARDER_LLM_BASE_URL_CHATGPT_VIA_LITELLM:-}
    depends_on:
      clickhouse:
        condition: service_started
      go-server:
        condition: service_started
      init-permissions:
        condition: service_completed_successfully
    networks:
      - app_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:11.3.0
    container_name: infinite-streaming-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      # Viewer (not Editor) — anonymous LAN visitors can read
      # dashboards but can't edit them. To edit, log in via the form
      # in the bottom-right (default admin/admin on first login;
      # Grafana forces a password change). The new password persists
      # in the grafana_data volume.
      #
      # UI edits to dashboards are *per-instance only* — provisioning
      # rewrites them from analytics/grafana/provisioning/ on every
      # container restart and on the 30s auto-reload tick. Use the UI
      # to iterate on a layout, then export the panel JSON and paste
      # it into infinite-streaming.json so the change survives.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      # Grafana is reachable via the nginx /grafana/ prefix; the root
      # URL must reflect the user-facing host:port so OAuth / login
      # redirects land back on nginx, not Grafana's internal :3000.
      # Override INFINITE_STREAM_BASE_URL in your environment when the
      # public URL differs from the default localhost:30000.
      - GF_SERVER_ROOT_URL=${INFINITE_STREAM_BASE_URL:-http://localhost:30000}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      # Grafana Live's WebSocket handshake checks the browser's Origin
      # header against ROOT_URL by default. The dev box is reachable
      # at multiple hostnames (.local vs not, IP, Tailscale name) so
      # pinning ROOT_URL to one of them blocks WS from the others.
      # Wildcard the Live origins for dev — the WS endpoint serves
      # only data the user could already pull over HTTPS, so the
      # origin check is more about csrf-style replay than auth.
      - GF_LIVE_ALLOWED_ORIGINS=*
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      # Bind-mount under $CONTENT_DIR so dashboard tweaks, user accounts,
      # and panel preferences survive a `compose down -v` and can be
      # rsynced between deployments. Grafana's entrypoint chowns the
      # data dir to UID 472 at startup, so an empty host dir works on
      # first boot. See #383.
      - ${CONTENT_DIR:-./sample-content}/grafana:/var/lib/grafana
      - ./analytics/grafana/provisioning:/etc/grafana/provisioning:ro
    # No host-side port — reach Grafana through the nginx /grafana/
    # prefix so the same basic-auth and host firewall rules apply.
    depends_on:
      clickhouse:
        condition: service_started
      # /media/grafana must be 0777 before Grafana (UID 472) tries to
      # initialise its plugin / data dirs on the bind mount — see #383.
      init-permissions:
        condition: service_completed_successfully
    networks:
      - app_network
    restart: unless-stopped

  # #506 — scheduled per-row token derivation. Runs analytics/tools/
  # derive_tokens.py on a loop against ClickHouse, keeping derived_tokens
  # populated so the NetworkLog / PlayLog token columns stay fresh without
  # manual runs. NOT on the forwarder's hot ingest path (the delay is a
  # feature — resolves the tokenizer's lookahead; see #506).
  #
  # Bind-mounts the tools dir (no image rebuild when the still-evolving
  # tokenizer changes — just restart the service). stdlib-only Python, so a
  # stock slim image needs no pip install. Trailing-window re-scan +
  # ReplacingMergeTree(scored_at) dedup handles overlap and lateness.
  token-deriver:
    image: python:3.12-slim
    container_name: infinite-streaming-token-deriver
    volumes:
      - ./analytics/tools:/tools:ro
    environment:
      - FORWARDER_CLICKHOUSE_URL=http://clickhouse:8123
      - DERIVE_INTERVAL_SECONDS=${DERIVE_INTERVAL_SECONDS:-1800}
      - DERIVE_WINDOW_HOURS=${DERIVE_WINDOW_HOURS:-6}
      - DERIVE_MODEL_VERSION=${DERIVE_MODEL_VERSION:-vomm-tok-1}
    # Initial sleep lets ClickHouse finish init.d (incl. 04-derived.sql)
    # on a cold start; a failed run just logs and retries next tick.
    command:
      - sh
      - -c
      - |
        sleep 20
        while true; do
          python3 /tools/derive_tokens.py --hours "$$DERIVE_WINDOW_HOURS" --model-version "$$DERIVE_MODEL_VERSION" \
            || echo "[token-deriver] run failed (rc=$$?), retrying next tick"
          sleep "$$DERIVE_INTERVAL_SECONDS"
        done
    depends_on:
      clickhouse:
        condition: service_started
    networks:
      - app_network
    restart: unless-stopped

  # #506/#608 — anomaly LABEL derivation, SPLIT into train + score (the VOMM scorer's
  # verdicts). The reference model (typical-episode grammar) changes slowly, so it is
  # rebuilt slowly (label-trainer, nightly); scoring against it is cheap, so it runs often
  # (label-scorer, ~1 min) for low-latency unexpected_<condition> chips. They share the
  # model artifact through the `vomm-models` volume; both bind-mount the tools dir so the
  # model/tokenizer evolve without a rebuild. Neither is on the hot path.

  # TRAIN (slow): rebuild the full --train-days VOMM and write the gzipped-JSON artifact +
  # a derived_models manifest row per condition. Bootstraps once on start, then nightly.
  label-trainer:
    image: python:3.12-slim
    container_name: infinite-streaming-label-trainer
    volumes:
      - ./analytics/tools:/tools:ro
      - vomm-models:/models
    environment:
      - FORWARDER_CLICKHOUSE_URL=http://clickhouse:8123
      - LABEL_TRAIN_INTERVAL_SECONDS=${LABEL_TRAIN_INTERVAL_SECONDS:-86400}
      - LABEL_TRAIN_DAYS=${LABEL_TRAIN_DAYS:-7}
      - LABEL_MODEL_PATH=${LABEL_MODEL_PATH:-/models/labels-model.json.gz}
      - LABEL_MODEL_VERSION=${LABEL_MODEL_VERSION:-vomm-tok-1}
    command:
      - sh
      - -c
      - |
        sleep 25
        while true; do
          python3 /tools/derive_labels.py --mode train --train-days "$$LABEL_TRAIN_DAYS" --model-path "$$LABEL_MODEL_PATH" --model-version "$$LABEL_MODEL_VERSION" \
            || echo "[label-trainer] run failed (rc=$$?), retrying next tick"
          sleep "$$LABEL_TRAIN_INTERVAL_SECONDS"
        done
    depends_on:
      clickhouse:
        condition: service_started
    networks:
      - app_network
    restart: unless-stopped

  # SCORE (fast): load the latest artifact and score plays that post-date its trained_at
  # (out-of-sample), writing derived_labels. Skips gracefully until the trainer's first run
  # produces an artifact. ReplacingMergeTree(scored_at) supersedes re-scores within the window.
  label-scorer:
    image: python:3.12-slim
    container_name: infinite-streaming-label-scorer
    volumes:
      - ./analytics/tools:/tools:ro
      - vomm-models:/models
    environment:
      - FORWARDER_CLICKHOUSE_URL=http://clickhouse:8123
      - LABEL_SCORE_INTERVAL_SECONDS=${LABEL_SCORE_INTERVAL_SECONDS:-60}
      - LABEL_SCORE_HOURS=${LABEL_SCORE_HOURS:-2}
      - LABEL_MODEL_PATH=${LABEL_MODEL_PATH:-/models/labels-model.json.gz}
    command:
      - sh
      - -c
      - |
        sleep 35
        while true; do
          python3 /tools/derive_labels.py --mode score --score-hours "$$LABEL_SCORE_HOURS" --model-path "$$LABEL_MODEL_PATH" \
            || echo "[label-scorer] run failed (rc=$$?), retrying next tick"
          sleep "$$LABEL_SCORE_INTERVAL_SECONDS"
        done
    depends_on:
      clickhouse:
        condition: service_started
    networks:
      - app_network
    restart: unless-stopped


networks:
  app_network:
    driver: bridge

volumes:
  # Shared between label-trainer (writes) and label-scorer (reads): the serialized VOMM
  # artifact (#608). Decouples the slow nightly rebuild from the fast scoring loop.
  vomm-models:
