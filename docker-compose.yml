services:
  go-server:
    build: .
    image: infinite-streaming
    container_name: infinite-streaming
    cap_add:
      - NET_ADMIN
    entrypoint: /sbin/launch.sh
    command: ["1"]
    ports:
      - "30000:30000"
    volumes:
      - ./content:/content
      - ${BOSS_CONTENT_DIR:-./sample-content}:/boss
      - ./certs:/etc/nginx/certs:ro
    environment:
      # Path Configuration - Single source of truth for all path references
      - INFINITE_STREAM_ROOT=/boss
      - INFINITE_STREAM_UPLOADS_DIR=/boss/boss-uploads
      - INFINITE_STREAM_SOURCES_DIR=/boss/originals
      - INFINITE_STREAM_OUTPUT_DIR=/boss/dynamic_content
      - INFINITE_STREAM_DATABASE_DIR=/boss/boss-data
      - INFINITE_STREAM_TEMP_DIR=/boss/boss-tmp
      - INFINITE_STREAM_CONTENT_DIR=/content
      - TMPDIR=/boss/boss-tmp
      - GO_LIVE_OUTPUT_DIR=/go-live
      - GO_UPLOAD_ADDR=:8003
      - INFINITE_STREAM_LISTEN_PORT=30000
      - INFINITE_STREAM_PROXY_HOST=go-proxy
    tmpfs:
      - /var/cache/nginx/live_playlists:size=100M,mode=755
      - /go-live:size=4G,mode=755
    networks:
      - app_network
    depends_on:
      - go-proxy      
    restart: unless-stopped
    stop_grace_period: 1s

  go-proxy:
    build:
      context: ./go-proxy
      dockerfile: Dockerfile
    ports:
      - "30081:30081"
      - "30181:30181"
      - "30281:30281"
      - "30381:30381"
      - "30481:30481"
      - "30581:30581"
      - "30681:30681"
      - "30781:30781"
      - "30881:30881"
    networks:
      - app_network
    depends_on:
      - memcached
    environment:
      - MEMCACHED_ADDR=memcached:11211
      - INFINITE_STREAM_UPSTREAM_HOST=go-server
      - INFINITE_STREAM_UPSTREAM_PORT=30000
      - INFINITE_STREAM_MAX_SESSIONS=8
      - INFINITE_STREAM_TC_INTERFACE=eth0
    cap_add:
      - NET_ADMIN
    privileged: true

  memcached:
    image: memcached:latest
    ports:
      - "11211:11211"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
