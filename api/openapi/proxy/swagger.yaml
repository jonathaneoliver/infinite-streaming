components:
  schemas:
    main.BandwidthRequest:
      properties:
        rate_mbps:
          type: number
      type: object
    main.ConflictResponse:
      properties:
        control_revision:
          type: string
        error:
          type: string
        session:
          additionalProperties: {}
          type: object
      type: object
    main.HeaderPair:
      properties:
        name:
          type: string
        value:
          type: string
      type: object
    main.LossRequest:
      properties:
        loss_pct:
          type: number
      type: object
    main.NetworkLogEntry:
      properties:
        attempt_id:
          description: |-
            AttemptID identifies which playback attempt within a play this
            request belongs to. The player initialises it to 1 on every
            new play and increments by 1 at every `restart` event
            (user-reload OR auto-recovery), passing it as `?attempt_id=N`
            on every URL. PlayID stays the same across these attempts;
            AttemptID ticks up. Lets analytics ask both "how did this play
            perform" (group by play_id) and "how many recovery attempts
            within the play" (max attempt_id GROUP BY play_id).
          type: integer
        bytes_in:
          type: integer
        bytes_out:
          type: integer
        client_wait_ms:
          description: |-
            ClientWaitMs is the time from when the proxy received the request
            to when it sent the first response byte back to the client. It IS
            what the player perceived as `wait` (HAR's TTFB), modulo the
            network RTT in both directions which we don't capture server-side
            (issue #283).
          type: number
        connect_ms:
          type: number
        content_type:
          type: string
        dns_ms:
          description: |-
            Timing phases (milliseconds).

            The DNSMs/ConnectMs/TLSMs/TTFBMs fields measure the *upstream*
            connection (proxy → origin) — captured by httptrace during
            doRequestWithTracing. They're useful forensics ("was the origin
            slow?") but NOT what the player perceived. ClientWaitMs and
            TransferMs measure the player-perceived (downstream) view; see
            the explicit ClientWaitMs field below.
          type: number
        fault_action:
          type: string
        fault_category:
          description: '"http", "socket", "transport", "corruption"'
          type: string
        fault_type:
          type: string
        faulted:
          description: Fault injection metadata
          type: boolean
        method:
          type: string
        path:
          type: string
        play_id:
          description: |-
            PlayID identifies the playback episode this request belongs to.
            The player generates a fresh UUID at every content-selection
            boundary (new video / fresh page-load / app launch) and passes
            it as `?play_id=...` on every URL. Stable across in-app restart
            events (user-reload, auto-recovery). Issue #280.
          type: string
        query_string:
          items:
            $ref: '#/components/schemas/main.HeaderPair'
          type: array
          uniqueItems: false
        request_headers:
          description: |-
            HTTP-level metadata captured per-request. Sensitive headers
            (Cookie / Authorization / Set-Cookie) are filtered before they
            land here — see capturedHeaders.
          items:
            $ref: '#/components/schemas/main.HeaderPair'
          type: array
          uniqueItems: false
        request_kind:
          description: '"segment", "manifest", "master_manifest"'
          type: string
        request_range:
          description: |-
            Range-request metadata. RequestRange is the client's `Range:`
            header (e.g. "bytes=0-1023"); ResponseContentRange is the
            origin's `Content-Range:` header (e.g. "bytes 0-1023/5242880").
            Useful for telling apart partial-content fetches and continuation
            requests in the dashboard.
          type: string
        response_content_range:
          type: string
        response_headers:
          items:
            $ref: '#/components/schemas/main.HeaderPair'
          type: array
          uniqueItems: false
        status:
          type: integer
        timestamp:
          type: string
        tls_ms:
          type: number
        total_ms:
          type: number
        transfer_ms:
          description: Downstream write+flush time to client (= client-perceived `receive`)
          type: number
        ttfb_ms:
          description: Upstream time to first byte
          type: number
        upstream_url:
          type: string
        url:
          type: string
      type: object
    main.NetworkStreamFrame:
      properties:
        entry:
          $ref: '#/components/schemas/main.NetworkLogEntry'
        session_id:
          type: string
      type: object
    main.PatchSessionRequest:
      properties:
        base_revision:
          type: string
        fields:
          items:
            type: string
          type: array
          uniqueItems: false
        set:
          additionalProperties: {}
          type: object
      type: object
    main.PatchSessionResponse:
      properties:
        control_revision:
          type: string
        session:
          additionalProperties: {}
          type: object
      type: object
    main.PatternRequest:
      properties:
        delay_ms:
          type: number
        loss_pct:
          type: number
        steps:
          items:
            $ref: '#/components/schemas/main.PatternStep'
          type: array
          uniqueItems: false
        template_mode:
          type: string
      type: object
    main.PatternStep:
      properties:
        duration_seconds:
          type: integer
        enabled:
          type: boolean
        rate_mbps:
          type: number
      type: object
    main.SessionStreamFrame:
      properties:
        active_summary:
          description: |-
            ActiveSummary is the compact "what else is going on" list for
            the dashboard's filtered view. Present only when filtered.
          items:
            additionalProperties: {}
            type: object
          type: array
          uniqueItems: false
        revision:
          description: |-
            Revision is a monotonically increasing counter; useful for
            client-side dedup across reconnects.
          type: integer
        session:
          additionalProperties: {}
          description: Session is the single filtered record (player_id query present).
          type: object
        sessions:
          description: Sessions is the unfiltered list (player_id query absent).
          items:
            additionalProperties: {}
            type: object
          type: array
          uniqueItems: false
      type: object
    main.ShapeRequest:
      properties:
        delay_ms:
          type: number
        loss_pct:
          type: number
        rate_mbps:
          type: number
      type: object
externalDocs:
  description: ""
  url: ""
info:
  description: |-
    Per-session HTTP fault injection, transport faults via nftables,
    and live streams of session + network events. Sits behind
    nginx; clients reach it via http://<host>:21000/api/...
  title: go-proxy harness API
  version: "1.0"
openapi: 3.1.0
paths:
  /api/clear-sessions:
    post:
      description: 'Destructive: clears all sessions, fault config, and nftables shaping.
        Confirm before calling.'
      responses:
        "200":
          description: OK
      summary: Wipe every session
      tags:
      - sessions
  /api/external-ips:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
      summary: External IPs the harness is reachable from
      tags:
      - diagnostics
  /api/network/stream:
    get:
      description: |-
        Long-lived `text/event-stream` connection. Server emits one `data:` frame per HTTP request as it lands in any session's ring buffer.

        Each `data:` frame is a JSON-encoded `NetworkStreamFrame` (see schemas), shape `{session_id, entry: NetworkLogEntry}`.
        Heartbeat: comment line `: ping` every 15s. Reconnect on disconnect; nothing is replayed. Wrapped by `harness-cli tail`.
      responses:
        "200":
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/main.NetworkStreamFrame'
          description: JSON payload of one SSE data frame
      summary: Stream per-request network events (SSE)
      tags:
      - streams
  /api/nftables/bandwidth/{port}:
    post:
      parameters:
      - description: session-bound port
        in: path
        name: port
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/main.BandwidthRequest'
              description: '{rate_mbps}'
              summary: body
        description: '{rate_mbps}'
        required: true
      responses:
        "200":
          description: OK
      summary: Set port bandwidth alone
      tags:
      - shaping
  /api/nftables/capabilities:
    get:
      description: Reports whether netem, htb, and per-port rules are operational.
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
      summary: Kernel shaping primitives available
      tags:
      - shaping
  /api/nftables/loss/{port}:
    post:
      parameters:
      - description: session-bound port
        in: path
        name: port
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/main.LossRequest'
              description: '{loss_pct}'
              summary: body
        description: '{loss_pct}'
        required: true
      responses:
        "200":
          description: OK
      summary: Set port packet loss alone
      tags:
      - shaping
  /api/nftables/pattern/{port}:
    post:
      description: Time-boxed sequence of rate steps (ramp_up, square_wave, etc).
        steps=[] clears.
      parameters:
      - description: session-bound port
        in: path
        name: port
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/main.PatternRequest'
              description: steps + template_mode
              summary: body
        description: steps + template_mode
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
      summary: Install a step pattern on a port
      tags:
      - shaping
  /api/nftables/port/{port}:
    get:
      parameters:
      - description: session-bound port
        in: path
        name: port
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
      summary: Inspect current shaping for a port
      tags:
      - shaping
  /api/nftables/shape/{port}:
    post:
      description: nftables/tc rate + delay + loss on the proxy's egress for one session
        port. Setting any axis disables an active pattern on the same port.
      parameters:
      - description: session-bound port (e.g. 30281)
        in: path
        name: port
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/main.ShapeRequest'
              description: rate / delay / loss
              summary: body
        description: rate / delay / loss
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
      summary: Apply transport shaping to a port
      tags:
      - shaping
  /api/nftables/status:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
      summary: Global nftables status
      tags:
      - shaping
  /api/session/{id}:
    delete:
      description: Removes the session from the in-memory map and frees its dedicated
        proxy port.
      parameters:
      - description: session_id
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
      summary: Delete one session
      tags:
      - sessions
    get:
      parameters:
      - description: session_id
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: Full session record including fault counters, shaping state,
            player metrics, manifest_variants.
        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Not Found
      summary: Get one session
      tags:
      - sessions
    patch:
      description: |-
        Optimistic-concurrency PATCH used for fault config + shaping flags.
        Body envelope: `{set: {field: value, ...}, fields: [field, ...], base_revision: "<iso8601>"}`.
        Returns 409 with the current control_revision when base_revision is stale.
      parameters:
      - description: session_id
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/main.PatchSessionRequest'
              description: Set+fields+base_revision envelope
              summary: envelope
        description: Set+fields+base_revision envelope
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/main.PatchSessionResponse'
          description: OK
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/main.ConflictResponse'
          description: control_revision conflict
      summary: Patch session settings
      tags:
      - sessions
  /api/session/{id}/metrics:
    post:
      description: Players post their internal metrics here. Not for ops use.
      parameters:
      - description: session_id
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          text/plain:
            schema:
              title: body
              type: object
        description: player metrics
        required: true
      responses:
        "200":
          description: OK
      summary: Player-side metrics ingestion
      tags:
      - internal
  /api/session/{id}/network:
    get:
      description: One-shot snapshot of the per-session in-memory request log (HAR-shaped).
        Bounded; older entries fall off as new ones arrive.
      parameters:
      - description: session_id
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/main.NetworkLogEntry'
                type: array
          description: OK
      summary: Get one session's network ring buffer
      tags:
      - network
  /api/sessions:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  type: object
                type: array
          description: Each item is a normalized session record (~80 fields). Subset
            returned to the dashboard; harness-cli reads the full record from /api/session/{id}.
      summary: List active sessions
      tags:
      - sessions
  /api/sessions/stream:
    get:
      description: |-
        Long-lived `text/event-stream` connection. Server emits one `data:` frame per session-record change (debounced ~250ms). Optional `player_id` query param filters to one player.

        Each `data:` frame is a JSON-encoded `SessionStreamFrame` (see schemas).
        Heartbeat: comment line `: ping` every ~15s. Reconnect on disconnect; the proxy does not replay missed frames.
      parameters:
      - description: filter frames to one player_id
        in: query
        name: player_id
        schema:
          type: string
      responses:
        "200":
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/main.SessionStreamFrame'
          description: JSON payload of one SSE data frame
      summary: Stream session-state diffs (SSE)
      tags:
      - streams
  /api/version:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
      summary: Proxy version
      tags:
      - diagnostics
servers:
- description: Same origin as wherever this spec is served
  url: /
