[pytest]
# Pytest configuration for HLS failure injection tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum pytest version
minversion = 7.0

# Test paths
testpaths = .

# Output options
addopts =
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Strict config (fail on unknown config options)
    --strict-config
    # Capture output
    --capture=no
    # Display test durations
    --durations=10
    # Continue on collection errors
    --continue-on-collection-errors
    # Color output
    --color=yes

# Markers
markers =
    integration: Integration tests
    http: HTTP-level failure tests
    socket: Socket-level failure tests
    transport: Transport-level failure tests
    corruption: Content corruption tests
    manifest: Manifest failure tests
    segment: Segment failure tests
    master: Master manifest failure tests
    variant: Variant scoping tests
    slow: Slow-running tests (>30s)
    smoke: Quick smoke tests
    regression: Regression tests
    loop: Loop boundary health monitoring tests
    abrchar: ABR player characterization tests
    har: HAR snapshot endpoint tests (issue #272)

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = test_run.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s:%(lineno)d - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Test execution
# Fail on first failure (disable with -x flag)
# maxfail = 1

# Timeout for tests (requires pytest-timeout)
# timeout = 300

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage options (requires pytest-cov)
# [tool:pytest]
# coverage_options =
#     --cov=.
#     --cov-report=html
#     --cov-report=term-missing
#     --cov-branch

# Parallel execution (requires pytest-xdist)
# Run with: pytest -n auto
# Or configure here: addopts = -n auto
