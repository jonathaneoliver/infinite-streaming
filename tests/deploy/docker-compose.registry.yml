services:
  go-server:
    image: ${K3S_REGISTRY}/infinite-streaming:latest
    container_name: test-registry-server
    cap_add:
      - NET_ADMIN
    privileged: true
    entrypoint: /sbin/launch.sh
    command: ["1"]
    ports:
      - "25000:30000"
      - "25081:30081"
      - "25181:30181"
      - "25281:30281"
      - "25381:30381"
      - "25481:30481"
      - "25581:30581"
      - "25681:30681"
      - "25781:30781"
      - "25881:30881"
    volumes:
      - ${CONTENT_DIR:-./sample-content}:/media
    environment:
      - INFINITE_STREAM_MAX_SESSIONS=8
      - INFINITE_STREAM_TC_INTERFACE=eth0
    tmpfs:
      - /go-live:size=4G,mode=755
    restart: unless-stopped
    stop_grace_period: 1s
