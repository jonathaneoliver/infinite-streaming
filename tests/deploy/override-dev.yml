services:
  go-server:
    container_name: test-dev-server
    # Mount mkcert-signed certs over the auto-generated self-signed
    # pair so Chrome / Safari trust them without per-port click-through.
    # Drop localhost.pem + localhost-key.pem in ./certs/ on the host
    # (`scp` from a Mac that ran `mkcert -install` + `mkcert
    # jonathanoliver-ubuntu.local localhost 127.0.0.1`). launch.sh
    # skips its self-signed fallback when the files already exist at
    # /media/certs/, so the mounted cert wins.
    volumes:
      - ./certs:/media/certs:ro
    environment:
      # nginx's external listen on 30000 is now TLS-only. Internal
      # in-container calls from go-proxy → nginx use the cleartext
      # loopback listener on 30005 (see nginx-content.conf.template).
      - INFINITE_STREAM_UPSTREAM_PORT=30005
      # Baseline rate cap (#480) — new player sessions, plus any PATCH
      # that requests rate_mbps=0 / null / cleared, resolve to this rate
      # instead of unlimited. Models a realistic CDN baseline so the
      # ABR-fidelity / observability / cross-day-comparability problems
      # the issue describes don't recur. Prod-style deployments leave
      # this unset (= 0 = unlimited) to preserve today's behaviour.
      - INFINITE_STREAM_DEFAULT_RATE_MBPS=100
    ports:
      !override
      - "21000:30000"
      - "21081:30081"
      - "21181:30181"
      - "21281:30281"
      - "21381:30381"
      - "21481:30481"
      - "21581:30581"
      - "21681:30681"
      - "21781:30781"
      - "21881:30881"
  clickhouse:
    container_name: test-dev-clickhouse
    # Bind to loopback only — see docker-compose.yml. analytics-migrate
    # SSHes into the host and curls localhost:21123 so loopback is
    # sufficient; LAN access is blocked.
    ports:
      !override
      - "127.0.0.1:21123:8123"
  grafana:
    container_name: test-dev-grafana
    # No host port — reach Grafana via the test-dev nginx /grafana/
    # prefix (e.g. https://jonathanoliver-ubuntu.local:21000/grafana/).
    ports: !override []
    environment:
      # Public root URL for the test-deploy-dev box — overrides the
      # docker-compose default localhost:30000 so Grafana's own
      # redirects (login flow, etc.) land back on the right host:port.
      - GF_SERVER_ROOT_URL=https://jonathanoliver-ubuntu.local:21000/grafana/
  forwarder:
    container_name: test-dev-forwarder
    environment:
      - FORWARDER_SSE_URL=https://go-server:30081/api/sessions/stream
      - FORWARDER_CLICKHOUSE_URL=http://clickhouse:8123
      - FORWARDER_CLICKHOUSE_DB=infinite_streaming
      - FORWARDER_CLICKHOUSE_TABLE=session_events
