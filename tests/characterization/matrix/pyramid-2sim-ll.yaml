# 2-sim group, LL-HLS (master.m3u8, 200ms partials) — sibling of pyramid-2sim-s6
# /-s2 for the forward-buffer-cap / startup comparison. pyramid @ 1 Mbps initial
# cap + 1 Mbps client cap, NO live_offset, NO alternating. control=master arms the
# pyramid, 1 slave follows via proxy group propagation.
name: pyramid-2sim-ll
class: config
parallel: true
reps: 1
duration_s: 300
defaults:
  platform: ipad-sim
  is.segment: ll
  is.peak_bitrate_mbps: 1
  proxy.shape:
    rate_mbps: 1.5                  # CONSTANT 1.5 Mbps at config-on-connect, no pattern
groups:
  - id: pair
    control: { id: master }
    variants:
      - { id: slave1 }
