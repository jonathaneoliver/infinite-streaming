# Single-arm s2, CONSTANT 1.5 Mbps — START-ON-FIRST-VARIANT *plus* the 1 Mbps
# startup peak cap. Tests whether pinning the join (is.starts_first_variant) AND
# capping the ceiling (is.peak_bitrate_mbps) together is more robust than either
# alone (start-on-first was 0/5 wedge; the cap alone was 1-2/3 wedge).
name: pyramid-1-s2-firstvar-cap
class: config
parallel: true
reps: 1
duration_s: 120
defaults:
  platform: iphone
  content: insane_newer_p200_h264
  is.starts_first_variant: true
  is.peak_bitrate_mbps: 1
  proxy.shape:
    rate_mbps: 1.5
axes:
  is.segment: [s2]
