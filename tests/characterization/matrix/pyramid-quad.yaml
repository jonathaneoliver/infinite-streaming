# 4 IDENTICAL sessions in ONE group: same 2s segment, same pyramid, same initial
# network cap + client startup cap. NO live_offset, NO alternate variants — every
# arm inherits the identical defaults. One master arms the pyramid; the 3 slaves
# follow via the proxy's group propagation. Clean fleet-startup baseline.
name: pyramid-quad
class: config
parallel: true
reps: 1
duration_s: 150
defaults:
  platform: ipad-sim
  content: insane_new_p200_h264
  is.segment: s2                   # all 4 play 2s segments
  is.peak_bitrate_mbps: 1          # client startup cap (identical for all)
  proxy.shape:
    pattern: pyramid
    step_seconds: 18
    rate_mbps: 1                   # initial network cap (identical for all)
groups:
  - id: quad
    control: { id: master }        # arms the pyramid → proxy propagates to the group
    variants:
      - { id: slave1 }
      - { id: slave2 }
      - { id: slave3 }
