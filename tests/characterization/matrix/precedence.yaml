# Live-offset PRECEDENCE matrix (#811 namespaced-knob revision).
#
#     harness char matrix tests/characterization/matrix/precedence.yaml --dry-run
#
# The cell the old `lever` router could never reach: set the server manifest
# hold-back AND the client target-latency override at once and see which the
# player honours. proxy.live_offset and is.live_offset are orthogonal — 0 means
# "unset", so the cartesian product is the four precedence cells:
#
#   (0,0)   baseline — player default
#   (24,0)  server hold-back only
#   (0,18)  client override only
#   (24,18) BOTH — read the achieved offset to learn who wins
name: precedence
class: config
parallel: true        # the single-set cells are the controls for the both-set cell — run concurrently
reps: 2
duration_s: 90
defaults:
  platform: ipad-sim
  content: insane_new_p200_h264
  is.segment: s6
axes:
  proxy.live_offset: [0, 24]
  is.live_offset: [0, 18]
