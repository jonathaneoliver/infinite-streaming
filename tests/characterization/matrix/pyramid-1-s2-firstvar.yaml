# Single-arm s2, CONSTANT 1.5 Mbps — START-ON-FIRST-VARIANT instead of the peak cap.
# Tests the hypothesis that forcing the join onto the lowest manifest rung
# (is.starts_first_variant) gets to video more reliably under a 1.5 Mbps shape
# than preferredPeakBitRate (which AVPlayer ignores during the startup climb).
# NOTE: NO is.peak_bitrate_mbps here — the join-variant is the only constraint.
name: pyramid-1-s2-firstvar
class: config
parallel: true
reps: 1
duration_s: 120
defaults:
  platform: iphone
  content: insane_newer_p200_h264
  is.starts_first_variant: true
  proxy.shape:
    rate_mbps: 1.5
axes:
  is.segment: [s2]
