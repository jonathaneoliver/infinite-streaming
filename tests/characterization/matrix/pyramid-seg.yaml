# Grouped 2-sim test: pyramid bandwidth sweep, s2 vs s6 segments (#811).
#
#   harness char matrix tests/characterization/matrix/pyramid-seg.yaml
#
# compare: is.segment → s2 = control, s6 = variant (one group, pre-paired).
# parallel: true → both arms stream simultaneously, one DF sim each. The pyramid
# is generated by the harness/ladder from each session's live manifest variants
# and driven server-side by the proxy; the probe just arms it post-launch.
#
# rate_mbps is the INITIAL network cap: pyramid (like ramp_up) STARTS limited, but
# the pattern can't ride config-on-connect (it needs the live manifest ladder), so
# it's armed post-launch. Without an initial cap the player would stream
# unconstrained until then and cliff-dive. rate_mbps:1.5 is applied at
# config-on-connect (before the first segment), so playback starts cold under the
# constraint and the pyramid sweeps up from there. (The grammar now REQUIRES a
# rate_mbps on pyramid/ramp_up arms.)
name: pyramid-seg
class: config
parallel: true
reps: 1
duration_s: 120
compare: is.segment
defaults:
  platform: ipad-sim
  is.peak_bitrate_mbps: 2   # client startup cap → player joins on a LOW rung (app is integer Mbps; 1.5 truncates, so 2)
  proxy.shape:
    pattern: pyramid
    step_seconds: 12
    rate_mbps: 1.5          # initial NETWORK cap (config-on-connect), before the pattern arms
axes:
  is.segment: [s2, s6]
