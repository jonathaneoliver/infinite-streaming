# 4-sim grouped pyramid test: segment {s2,s6} × variant-list {full, every-other}.
#
# pyramid @ 16s steps, initial network cap 1 Mbps (config-on-connect) + initial
# client cap 1 Mbps (low start rung). One group of 4 arms → 4 DF sims in parallel.
#
# "full"                 = the complete variant ladder (no allowed_variants).
# "alternating_variants" = keep every 2nd rung of the ladder (#820 "keep every
#                          other (2x)"), resolved server-side from the live ladder
#                          at config-on-connect — content-agnostic, no hardcoded list.
name: pyramid-fill-alternating
class: config
parallel: true
reps: 1
duration_s: 240
defaults:
  platform: ipad-sim
  content: insane_new_p200_h264
  is.peak_bitrate_mbps: 1          # client startup cap → low start rung
  proxy.live_offset: 18            # 20 isn't a supported window (0|2|4|6|12|18|24|30|36|42); 18 is the nearest. Shallower hold-back than 30 → starts closer to the live edge
  proxy.shape:
    pattern: pyramid
    step_seconds: 18               # 16 isn't a valid step (only 6|12|18|24|60|120) → nearest is 18
    rate_mbps: 1                   # initial NETWORK cap (config-on-connect), before the pattern arms
groups:
  - id: full-vs-alternating
    control: { is.segment: s2 }    # s2, full ladder
    variants:
      - { is.segment: s6 }                                          # s6, full ladder
      - { is.segment: s2, proxy.allowed_variants: alternating_variants }   # s2, every other rung
      - { is.segment: s6, proxy.allowed_variants: alternating_variants }   # s6, every other rung
