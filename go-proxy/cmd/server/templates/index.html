<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Failure Management Dashboard</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-slider/11.0.2/css/bootstrap-slider.min.css" rel="stylesheet">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Restore the selected tab from localStorage
            var selectedTab = localStorage.getItem('selectedTab');
            if (selectedTab) {
                var tab = document.querySelector(`[data-tab="${selectedTab}"]`);
                if (tab) {
                    tab.click();
                }
            }

            // Save the selected tab to localStorage
            var tabs = document.querySelectorAll('.tab');
            tabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    localStorage.setItem('selectedTab', tab.getAttribute('data-tab'));
                });
            });
        });
    </script>
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Streaming Failure Management Dashboard</h1>
        <div class="custom-control custom-switch mb-3">
            <input type="checkbox" class="custom-control-input" id="darkModeSwitch">
            <label class="custom-control-label" for="darkModeSwitch">Dark Mode</label>
        </div>
        <div id="message" class="text-danger"></div>
        <ul class="nav nav-tabs" id="sessionTabs" role="tablist">
            <!-- Tabs will be populated by JavaScript -->
        </ul>
        <div class="tab-content" id="sessionTabsContent">
            <!-- Tab panes will be populated by JavaScript -->
        </div>
        <div id="sessionList" class="mt-5"></div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-slider/11.0.2/bootstrap-slider.min.js"></script>
    <script>
        $(document).ready(function() {
            const urlParams = new URLSearchParams(window.location.search);
            const isDevelopMode = urlParams.has('develop');

            function fetchSessions() {
                $.ajax({
                    url: '/api/sessions',
                    method: 'GET',
                    success: function(sessions) {
                        $('#message').text('');  // Clear error message on success
                        const recentSessions = sessions.slice(0, 10);

                        const sessionTabs = $('#sessionTabs');
                        const sessionTabsContent = $('#sessionTabsContent');
                        sessionTabs.empty();
                        sessionTabsContent.empty();
                        recentSessions.forEach(function(session, index) {
                            const sessionId = session.session_id;
                            const isActive = index === 0 ? 'active' : '';
                            sessionTabs.append(`
                                <li class="nav-item">
                                    <a class="nav-link ${isActive}" id="tab-${sessionId}" data-toggle="tab" href="#pane-${sessionId}" role="tab" aria-controls="pane-${sessionId}" aria-selected="${index === 0}">
                                        ${sessionId}
                                    </a>
                                </li>
                            `);
                            sessionTabsContent.append(`
                                <div class="tab-pane fade show ${isActive}" id="pane-${sessionId}" role="tabpanel" aria-labelledby="tab-${sessionId}">
                                    <p><strong>Player ID:</strong> ${session.player_id}</p>
                                    <p><strong>Player IP Address:</strong> ${session.player_ip}</p>
                                    <p><strong>Manifest URL:</strong> ${session.manifest_url}</p>
                                    <p><strong>Master Manifest URL:</strong> ${session.master_manifest_url}</p>
                                    <p><strong>Last Request Time:</strong> ${new Date(session.last_request).toISOString().slice(0, -1)}</p>
                                    <p><strong>First Request Time:</strong> ${new Date(session.first_request_time).toISOString().slice(0, -1)}</p>
                                    <p><strong>Session Duration:</strong> ${session.session_duration.toFixed(3)} seconds</p>
                                    <p><strong>Last Request URL:</strong> ${session.last_request_url}</p>
                                    <ul class="nav nav-tabs" id="failureTabs-${sessionId}" role="tablist">
                                        <li class="nav-item">
                                            <a class="nav-link active" id="segment-tab-${sessionId}" data-toggle="tab" href="#segment-pane-${sessionId}" role="tab" aria-controls="segment-pane-${sessionId}" aria-selected="true">Segments</a>
                                        </li>
                                        <!--
                                        <li class="nav-item">
                                            <a class="nav-link" id="manifest-tab-${sessionId}" data-toggle="tab" href="#manifest-pane-${sessionId}" role="tab" aria-controls="manifest-pane-${sessionId}" aria-selected="false">Manifests</a>
                                        </li>
                                        <li class="nav-item">
                                            <a class="nav-link" id="master-manifest-tab-${sessionId}" data-toggle="tab" href="#master-manifest-pane-${sessionId}" role="tab" aria-controls="master-manifest-pane-${sessionId}" aria-selected="false">Master Manifests</a>
                                        </li>
                                        -->
                                    </ul>
                                    <div class="tab-content" id="failureTabsContent-${sessionId}">
                                        <div class="tab-pane fade show active" id="segment-pane-${sessionId}" role="tabpanel" aria-labelledby="segment-tab-${sessionId}">
                                            <form id="segment-failure-settings-form-${sessionId}" class="mt-3">
                                                <div class="form-group">
                                                    <label for="segment_failure_type_${sessionId}">Segment Failure Type</label>
                                                    <div id="segment_failure_type_${sessionId}" class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="segment_failure_type_${sessionId}" id="segment_failure_type_none_${sessionId}" value="none" required checked>
                                                        <label class="form-check-label" for="segment_failure_type_none_${sessionId}">None</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="segment_failure_type_${sessionId}" id="segment_failure_type_404_${sessionId}" value="404" required>
                                                        <label class="form-check-label" for="segment_failure_type_404_${sessionId}">404 Not Found</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="segment_failure_type_${sessionId}" id="segment_failure_type_500_${sessionId}" value="500" required>
                                                        <label class="form-check-label" for="segment_failure_type_500_${sessionId}">500 Internal Server Error</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="segment_failure_type_${sessionId}" id="segment_failure_type_403_${sessionId}" value="403" required>
                                                        <label class="form-check-label" for="segment_failure_type_403_${sessionId}">403 Forbidden</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="segment_failure_type_${sessionId}" id="segment_failure_type_timeout_${sessionId}" value="timeout" required>
                                                        <label class="form-check-label" for="segment_failure_type_timeout_${sessionId}">Timeout</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="segment_failure_type_${sessionId}" id="segment_failure_type_connection_refused_${sessionId}" value="connection_refused" required>
                                                        <label class="form-check-label" for="segment_failure_type_connection_refused_${sessionId}">Connection Refused</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="segment_failure_type_${sessionId}" id="segment_failure_type_dns_failure_${sessionId}" value="dns_failure" required>
                                                        <label class="form-check-label" for="segment_failure_type_dns_failure_${sessionId}">DNS Failure</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="segment_failure_type_${sessionId}" id="segment_failure_type_rate_limiting_${sessionId}" value="rate_limiting" required>
                                                        <label class="form-check-label" for="segment_failure_type_rate_limiting_${sessionId}">Rate Limiting</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="segment_failure_type_${sessionId}" id="segment_failure_type_corrupted_${sessionId}" value="corrupted" required>
                                                        <label class="form-check-label" for="segment_failure_type_corrupted_${sessionId}">Corrupted</label>
                                                    </div>
                                                </div>
                                                <div class="form-group">
                                                    <label for="segment_failure_frequency_${sessionId}">Segment Failure Frequency</label>
                                                    <input id="segment_failure_frequency_${sessionId}" type="text" class="slider" data-slider-min="0" data-slider-max="10" data-slider-step="1" data-slider-value="10"/>
                                                    <span id="segment_frequency_value_${sessionId}" class="ml-2">10</span>
                                                </div>
                                                <div class="form-group">
                                                    <label for="consecutive_failures_${sessionId}">Consecutive Failures</label>
                                                    <input id="consecutive_failures_${sessionId}" type="text" class="slider" data-slider-min="1" data-slider-max="10" data-slider-step="1" data-slider-value="3"/>
                                                    <span id="consecutive_failures_value_${sessionId}" class="ml-2">3</span>
                                                </div>
                                                <div class="form-group">
                                                    <label>Units</label>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="segment_failure_mode_${sessionId}" id="segment_failure_mode_requests_${sessionId}" value="requests" checked>
                                                        <label class="form-check-label" for="segment_failure_mode_requests_${sessionId}">Requests</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="segment_failure_mode_${sessionId}" id="segment_failure_mode_seconds_${sessionId}" value="seconds">
                                                        <label class="form-check-label" for="segment_failure_mode_seconds_${sessionId}">Seconds</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="segment_failure_mode_${sessionId}" id="segment_failure_mode_failures_per_seconds_${sessionId}" value="failures_per_seconds">
                                                        <label class="form-check-label" for="segment_failure_mode_failures_per_seconds_${sessionId}">Failures / Seconds</label>
                                                    </div>
                                                </div>
                                            </form>
                                        </div>
                                        <!--
                                        <div class="tab-pane fade" id="manifest-pane-${sessionId}" role="tabpanel" aria-labelledby="manifest-tab-${sessionId}">
                                            <form id="manifest-failure-settings-form-${sessionId}" class="mt-3">
                                                <div class="form-group">
                                                    <label for="manifest_failure_type_${sessionId}">Manifest Failure Type</label>
                                                    <div id="manifest_failure_type_${sessionId}" class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="manifest_failure_type_${sessionId}" id="manifest_failure_type_none_${sessionId}" value="none" required checked>
                                                        <label class="form-check-label" for="manifest_failure_type_none_${sessionId}">None</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="manifest_failure_type_${sessionId}" id="manifest_failure_type_404_${sessionId}" value="404" required>
                                                        <label class="form-check-label" for="manifest_failure_type_404_${sessionId}">404 Not Found</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="manifest_failure_type_${sessionId}" id="manifest_failure_type_500_${sessionId}" value="500" required>
                                                        <label class="form-check-label" for="manifest_failure_type_500_${sessionId}">500 Internal Server Error</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="manifest_failure_type_${sessionId}" id="manifest_failure_type_403_${sessionId}" value="403" required>
                                                        <label class="form-check-label" for="manifest_failure_type_403_${sessionId}">403 Forbidden</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="manifest_failure_type_${sessionId}" id="manifest_failure_type_timeout_${sessionId}" value="timeout" required>
                                                        <label class="form-check-label" for="manifest_failure_type_timeout_${sessionId}">Timeout</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="manifest_failure_type_${sessionId}" id="manifest_failure_type_connection_refused_${sessionId}" value="connection_refused" required>
                                                        <label class="form-check-label" for="manifest_failure_type_connection_refused_${sessionId}">Connection Refused</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="manifest_failure_type_${sessionId}" id="manifest_failure_type_dns_failure_${sessionId}" value="dns_failure" required>
                                                        <label class="form-check-label" for="manifest_failure_type_dns_failure_${sessionId}">DNS Failure</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="manifest_failure_type_${sessionId}" id="manifest_failure_type_rate_limiting_${sessionId}" value="rate_limiting" required>
                                                        <label class="form-check-label" for="manifest_failure_type_rate_limiting_${sessionId}">Rate Limiting</label>
                                                    </div>
                                                </div>
                                                <div class="form-group">
                                                    <label for="manifest_failure_frequency_${sessionId}">Manifest Failure Frequency (every Nth request)</label>
                                                    <input id="manifest_failure_frequency_${sessionId}" type="text" class="slider" data-slider-min="0" data-slider-max="10" data-slider-step="1" data-slider-value="10"/>
                                                    <span id="manifest_frequency_value_${sessionId}" class="ml-2">10</span>
                                                </div>
                                                <div class="form-group">
                                                    <label for="manifest_consecutive_failures_${sessionId}">Consecutive Failures</label>
                                                    <input id="manifest_consecutive_failures_${sessionId}" type="text" class="slider" data-slider-min="1" data-slider-max="10" data-slider-step="1" data-slider-value="3"/>
                                                    <span id="manifest_consecutive_failures_value_${sessionId}" class="ml-2">3</span>
                                                </div>
                                            </form>
                                        </div>
                                        <div class="tab-pane fade" id="master-manifest-pane-${sessionId}" role="tabpanel" aria-labelledby="master-manifest-tab-${sessionId}">
                                            <form id="master-manifest-failure-settings-form-${sessionId}" class="mt-3">
                                                <div class="form-group">
                                                    <label for="master_manifest_failure_type_${sessionId}">Master Manifest Failure Type</label>
                                                    <div id="master_manifest_failure_type_${sessionId}" class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="master_manifest_failure_type_${sessionId}" id="master_manifest_failure_type_none_${sessionId}" value="none" required checked>
                                                        <label class="form-check-label" for="master_manifest_failure_type_none_${sessionId}">None</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="master_manifest_failure_type_${sessionId}" id="master_manifest_failure_type_404_${sessionId}" value="404" required>
                                                        <label class="form-check-label" for="master_manifest_failure_type_404_${sessionId}">404 Not Found</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="master_manifest_failure_type_${sessionId}" id="master_manifest_failure_type_500_${sessionId}" value="500" required>
                                                        <label class="form-check-label" for="master_manifest_failure_type_500_${sessionId}">500 Internal Server Error</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="master_manifest_failure_type_${sessionId}" id="master_manifest_failure_type_403_${sessionId}" value="403" required>
                                                        <label class="form-check-label" for="master_manifest_failure_type_403_${sessionId}">403 Forbidden</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="master_manifest_failure_type_${sessionId}" id="master_manifest_failure_type_timeout_${sessionId}" value="timeout" required>
                                                        <label class="form-check-label" for="master_manifest_failure_type_timeout_${sessionId}">Timeout</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="master_manifest_failure_type_${sessionId}" id="master_manifest_failure_type_connection_refused_${sessionId}" value="connection_refused" required>
                                                        <label class="form-check-label" for="master_manifest_failure_type_connection_refused_${sessionId}">Connection Refused</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="master_manifest_failure_type_${sessionId}" id="master_manifest_failure_type_dns_failure_${sessionId}" value="dns_failure" required>
                                                        <label class="form-check-label" for="master_manifest_failure_type_dns_failure_${sessionId}">DNS Failure</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio" name="master_manifest_failure_type_${sessionId}" id="master_manifest_failure_type_rate_limiting_${sessionId}" value="rate_limiting" required>
                                                        <label class="form-check-label" for="master_manifest_failure_type_rate_limiting_${sessionId}">Rate Limiting</label>
                                                    </div>
                                                </div>
                                                <div class="form-group">
                                                    <label for="master_manifest_failure_frequency_${sessionId}">Master Manifest Failure Frequency (every Nth request)</label>
                                                    <input id="master_manifest_failure_frequency_${sessionId}" type="text" class="slider" data-slider-min="0" data-slider-max="10" data-slider-step="1" data-slider-value="10"/>
                                                    <span id="master_manifest_frequency_value_${sessionId}" class="ml-2">10</span>
                                                </div>
                                                <div class="form-group">
                                                    <label for="master_manifest_consecutive_failures_${sessionId}">Consecutive Failures</label>
                                                    <input id="master_manifest_consecutive_failures_${sessionId}" type="text" class="slider" data-slider-min="1" data-slider-max="10" data-slider-step="1" data-slider-value="3"/>
                                                    <span id="master_manifest_consecutive_failures_value_${sessionId}" class="ml-2">3</span>
                                                </div>
                                            </form>
                                        </div>
                                        -->
                                    </div>
                                </div>
                            `);

                            // Initialize the sliders for each session
                            $(`#segment_failure_frequency_${sessionId}, #manifest_failure_frequency_${sessionId}, #master_manifest_failure_frequency_${sessionId}, #consecutive_failures_${sessionId}, #manifest_consecutive_failures_${sessionId}, #master_manifest_consecutive_failures_${sessionId}`).slider({
                                formatter: function(value) {
                                    console.log('Change value:', value);
                                    return 'Current value: ' + value;
                                }
                            }).on('change', function(event) {
                                const sliderId = event.target.id;
                                console.log('Change event:', event, 'Slider ID:', sliderId);
                                const valueSpanId = sliderId.includes('segment_failure_frequency') ? `#segment_frequency_value_${sessionId}` :
                                                sliderId.includes('master_manifest_failure_frequency') ? `#master_manifest_frequency_value_${sessionId}` :
                                                sliderId.includes('manifest_failure_frequency') ? `#manifest_frequency_value_${sessionId}` :
                                                sliderId.includes('consecutive_failures') ? `#consecutive_failures_value_${sessionId}` :
                                                sliderId.includes('master_manifest_consecutive_failures') ? `#master_manifest_consecutive_failures_value_${sessionId}` :
                                                `#manifest_consecutive_failures_value_${sessionId}`;
                                $(valueSpanId).text(event.value.newValue);
                                localStorage.setItem(sliderId, event.value.newValue);
                                saveSettings(sessionId);
                            }).on('slide', function(event) {
                                const sliderId = event.target.id;
                                console.log('Slide event:', event, 'Slider ID:', sliderId);
                                const valueSpanId = sliderId.includes('segment_failure_frequency') ? `#segment_frequency_value_${sessionId}` :
                                                sliderId.includes('master_manifest_failure_frequency') ? `#master_manifest_frequency_value_${sessionId}` :
                                                sliderId.includes('manifest_failure_frequency') ? `#manifest_frequency_value_${sessionId}` :
                                                sliderId.includes('consecutive_failures') ? `#consecutive_failures_value_${sessionId}` :
                                                sliderId.includes('master_manifest_consecutive_failures') ? `#master_manifest_consecutive_failures_value_${sessionId}` :
                                                `#manifest_consecutive_failures_value_${sessionId}`;
                                $(valueSpanId).text(event.value);
                            }).on('slideStop', function(event) {
                                console.log('SlideStop event:', event, 'Slider ID:', event.target.id);
                                saveSettings(sessionId);
                            }).on('change', function(event) {
                                console.log('change event:', event, 'Slider ID:', event.target.id);
                                if (event.target.id.includes('segment_failure_frequency')) {
                                    saveSettings(sessionId);
                                }
                            });

                            // Load saved settings from localStorage for each session
                            const savedSegmentFailureType = localStorage.getItem(`segment_failure_type_${sessionId}`);
                            if (savedSegmentFailureType) {
                                $(`input[name="segment_failure_type_${sessionId}"][value="${savedSegmentFailureType}"]`).prop('checked', true);
                            }
                            const savedManifestFailureType = localStorage.getItem(`manifest_failure_type_${sessionId}`);
                            if (savedManifestFailureType) {
                                $(`input[name="manifest_failure_type_${sessionId}"][value="${savedManifestFailureType}"]`).prop('checked', true);
                            }
                            const savedMasterManifestFailureType = localStorage.getItem(`master_manifest_failure_type_${sessionId}`);
                            if (savedMasterManifestFailureType) {
                                $(`input[name="master_manifest_failure_type_${sessionId}"][value="${savedMasterManifestFailureType}"]`).prop('checked', true);
                            }
                            $(`#segment_failure_frequency_${sessionId}`).slider('setValue', localStorage.getItem(`segment_failure_frequency_${sessionId}`) || 10);
                            $(`#manifest_failure_frequency_${sessionId}`).slider('setValue', localStorage.getItem(`manifest_failure_frequency_${sessionId}`) || 10);
                            $(`#master_manifest_failure_frequency_${sessionId}`).slider('setValue', localStorage.getItem(`master_manifest_failure_frequency_${sessionId}`) || 10);
                            $(`#consecutive_failures_${sessionId}`).slider('setValue', localStorage.getItem(`consecutive_failures_${sessionId}`) || 3);
                            const savedSegmentFailureMode = localStorage.getItem(`segment_failure_mode_${sessionId}`) || 'requests';
                            $(`input[name="segment_failure_mode_${sessionId}"][value="${savedSegmentFailureMode}"]`).prop('checked', true);

                            $(`input[name="segment_failure_type_${sessionId}"], input[name="manifest_failure_type_${sessionId}"], input[name="master_manifest_failure_type_${sessionId}"], input[name="segment_failure_mode_${sessionId}"]`).on('change', function() {
                                const name = $(this).attr('name');
                                localStorage.setItem(name, $(this).val());
                                saveSettings(sessionId);
                            });

                            // Fetch failure types from the server
                            $.ajax({
                                url: `/api/failure-settings/${sessionId}`,
                                method: 'GET',
                                success: function(failureTypes) {
                                    $(`input[name="segment_failure_type_${sessionId}"][value="${failureTypes.segment_failure_type}"]`).prop('checked', true);
                                    $(`input[name="manifest_failure_type_${sessionId}"][value="${failureTypes.manifest_failure_type}"]`).prop('checked', true);
                                    $(`input[name="master_manifest_failure_type_${sessionId}"][value="${failureTypes.master_manifest_failure_type}"]`).prop('checked', true);
                                },
                                error: function(error) {
                                    console.error('Error fetching failure types:', error);
                                }
                            });
                        });

                        if (isDevelopMode) {
                            const sessionList = $('#sessionList');
                            sessionList.empty();
                            sessionList.append('<h3>Session IDs</h3>');
                            recentSessions.forEach(function(session) {
                                $.ajax({
                                    url: `/api/session/${session.session_id}`,
                                    method: 'GET',
                                    success: function(sessionData) {
                                        const lastRequestTime = new Date(sessionData.last_request);
                                        const now = new Date();
                                        const secondsSinceLastRequest = Math.floor((now - lastRequestTime) / 1000);
                                        sessionList.append(`<p>${session.session_id} - ${secondsSinceLastRequest} seconds since last request</p>`);
                                    },
                                    error: function(error) {
                                        sessionList.append(`<p>${session.session_id} - Error fetching last request time</p>`);
                                    }
                                });
                            });
                        }
                    },
                    error: function(error) {
                        $('#message').text('Error fetching sessions.');
                    }
                });
            }

            // Fetch and populate session IDs initially and poll every 5 seconds
            fetchSessions();
            setInterval(fetchSessions, 5000);

            function saveSettings(sessionId) {
                const segmentFailureType = $(`input[name="segment_failure_type_${sessionId}"]:checked`).val();
                        const manifestFailureType = $(`input[name="manifest_failure_type_${sessionId}"]:checked`).val();
                        const masterManifestFailureType = $(`input[name="master_manifest_failure_type_${sessionId}"]:checked`).val();
                const segmentFailureFrequency = $(`#segment_failure_frequency_${sessionId}`).slider('getValue');
                        const manifestFailureFrequency = $(`#manifest_failure_frequency_${sessionId}`).slider('getValue');
                        const masterManifestFailureFrequency = $(`#master_manifest_failure_frequency_${sessionId}`).slider('getValue');
                const consecutiveFailures = $(`#consecutive_failures_${sessionId}`).slider('getValue');
                const segmentFailureMode = $(`input[name="segment_failure_mode_${sessionId}"]:checked`).val() || 'requests';
                const segmentConsecutiveUnits = segmentFailureMode === 'seconds' ? 'seconds' : 'requests';
                const segmentFrequencyUnits = segmentFailureMode === 'requests' ? 'requests' : 'seconds';

                // Save settings to localStorage
                localStorage.setItem(`segment_failure_type_${sessionId}`, segmentFailureType);
                        localStorage.setItem(`manifest_failure_type_${sessionId}`, manifestFailureType);
                        localStorage.setItem(`master_manifest_failure_type_${sessionId}`, masterManifestFailureType);
                localStorage.setItem(`segment_failure_frequency_${sessionId}`, segmentFailureFrequency);
                        localStorage.setItem(`manifest_failure_frequency_${sessionId}`, manifestFailureFrequency);
                        localStorage.setItem(`master_manifest_failure_frequency_${sessionId}`, masterManifestFailureFrequency);
                localStorage.setItem(`consecutive_failures_${sessionId}`, consecutiveFailures);
                localStorage.setItem(`segment_failure_mode_${sessionId}`, segmentFailureMode);

                $.ajax({
                    // URL for the management interface
                    url: `/api/failure-settings/${sessionId}`,
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        session_id: sessionId,
                        segment_failure_type: segmentFailureType,
                            manifest_failure_type: manifestFailureType,
                            master_manifest_failure_type: masterManifestFailureType,
                        segment_failure_frequency: segmentFailureFrequency,
                        segment_consecutive_units: segmentConsecutiveUnits,
                        segment_frequency_units: segmentFrequencyUnits,
                        segment_failure_mode: segmentFailureMode,
                            manifest_failure_frequency: manifestFailureFrequency,
                            master_manifest_failure_frequency: masterManifestFailureFrequency,
                        consecutive_failures: consecutiveFailures
                    }),
                    success: function(response) {
                        $('#message').text('');
                    },
                    error: function(error) {
                        $('#message').text('Error saving settings.');
                    }
                });
            }

            // Load dark mode setting from localStorage
            if (localStorage.getItem('darkMode') === 'true') {
                $('body').addClass('bg-dark text-white');
                $('.form-control, .custom-control-label, .form-check-label').addClass('text-white');
                $('#darkModeSwitch').prop('checked', true);
            }

            // Dark mode switch
            $('#darkModeSwitch').on('change', function() {
                if ($(this).is(':checked')) {
                    $('body').addClass('bg-dark text-white');
                    $('.form-control, .custom-control-label, .form-check-label').addClass('text-white');
                    localStorage.setItem('darkMode', 'true');
                } else {
                    $('body').removeClass('bg-dark text-white');
                    $('.form-control, .custom-control-label, .form-check-label').removeClass('text-white');
                    localStorage.setItem('darkMode', 'false');
                }
            });
        });
    </script>
</body>
</html>
